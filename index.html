<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Predictor Maestro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --red: #ef4444; --yellow: #f59e0b; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 5px; color: white; }
        h1 span { color: var(--red); }
        .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
        label { display: block; margin: 12px 0 5px; color: var(--muted); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; font-size: 1rem; }
        button { background: var(--red); border: none; font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .market-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .line-val { font-size: 2rem; font-weight: 800; color: var(--yellow); margin: 5px 0; }
        .pct-row { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; }
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CornerIQ <span>Pro</span></h1>
        <p class="subtitle">Análisis Estadístico Avanzado</p>
        <div class="card">
            <label>Liga (Competencia)</label>
            <select id="league-select"></select>
            <label>Equipo Local</label>
            <select id="home-team"><option value="">Selecciona una liga</option></select>
            <label>Equipo Visitante</label>
            <select id="away-team"><option value="">Selecciona una liga</option></select>
            <button id="calc-btn">Calcular Probabilidades</button>
        </div>
        <div id="results" class="hidden">
            <div id="markets-container"></div>
            <div id="verdict-container"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c'; 

        const LIGAS = [
            { id: 2014, name: 'LaLiga', country: 'España' },
            { id: 2021, name: 'Premier League', country: 'Inglaterra' },
            { id: 2002, name: 'Bundesliga', country: 'Alemania' },
            { id: 2019, name: 'Serie A', country: 'Italia' },
            { id: 2013, name: 'Série A', country: 'Brasil' },
            { id: 2001, name: 'Champions League', country: 'Europa' }
        ];

        // DATOS DE RESPALDO (Si la API falla, usamos estos equipos)
        const BACKUP_TEAMS = [
            "Real Madrid CF", "FC Barcelona", "Levante UD", "Real Oviedo", 
            "Manchester City FC", "Liverpool FC", "Arsenal FC", "Bayern München", 
            "Atlético de Madrid", "Girona FC", "Real Sociedad", "Inter Milano"
        ];

        const cornerPower = {
            "Real Madrid CF": 6.8, "FC Barcelona": 6.5, "Levante UD": 5.8, "Real Oviedo": 5.4,
            "Manchester City FC": 7.8, "Liverpool FC": 7.3, "Arsenal FC": 6.7
        };

        const lSel = document.getElementById('league-select');
        const hSel = document.getElementById('home-team');
        const aSel = document.getElementById('away-team');
        const btn = document.getElementById('calc-btn');

        window.onload = () => {
            lSel.innerHTML = '<option value="">-- Seleccionar Liga --</option>';
            LIGAS.forEach(l => lSel.add(new Option(`${l.name} - ${l.country}`, l.id)));
        };

        function cargarEquiposManual() {
            hSel.innerHTML = aSel.innerHTML = '<option value="">Seleccionar Equipo</option>';
            BACKUP_TEAMS.sort().forEach(t => {
                hSel.add(new Option(t, t));
                aSel.add(new Option(t, t));
            });
        }

        lSel.onchange = async () => {
            if (!lSel.value) return;
            hSel.innerHTML = aSel.innerHTML = '<option>Cargando...</option>';
            
            try {
                const res = await fetch(`https://api.football-data.org/v4/competitions/${lSel.value}/teams`, {
                    mode: 'cors',
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!res.ok) throw new Error("API Limitada");

                const data = await res.json();
                hSel.innerHTML = aSel.innerHTML = '<option value="">Seleccionar Equipo</option>';
                data.teams.forEach(t => {
                    hSel.add(new Option(t.name, t.name));
                    aSel.add(new Option(t.name, t.name));
                });
            } catch (e) {
                console.log("Usando modo de respaldo por error de conexión.");
                cargarEquiposManual();
            }
        };

        btn.onclick = () => {
            if (!hSel.value || !aSel.value) return;
            const hP = cornerPower[hSel.value] || 4.8;
            const aP = cornerPower[aSel.value] || 4.8;
            const lambda = hP + aP;

            document.getElementById('results').classList.remove('hidden');
            let html = '';
            [7.5, 8.5, 9.5, 10.5].forEach(line => {
                let prob = (lambda / (line + 1.15)) * 95;
                prob = Math.min(98.5, Math.max(12, prob)).toFixed(1);
                const color = prob > 70 ? 'var(--green)' : (prob > 50 ? 'var(--yellow)' : 'var(--red)');
                html += `
                <div class="market-card">
                    <div class="line-val">+${line}</div>
                    <div class="pct-row"><span style="color:${color}">${prob}% OVER</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${prob}%; background:${color}"></div></div>
                </div>`;
            });
            document.getElementById('markets-container').innerHTML = html;
        };
    </script>
</body>
</html>
