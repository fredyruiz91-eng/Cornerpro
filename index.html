        .header>*{position:relative;z-index:1;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:white;line-height:1;text-shadow:0 0 30px var(--accent-glow),0 2px 4px rgba(0,0,0,0.5);background:linear-gradient(135deg,#ffffff 0%,#ff8a95 50%,#ffffff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

        .card{background:var(--card);backdrop-filter:blur(24px);border-radius:20px;padding:22px;border:1px solid var(--border);margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:all 0.3s ease;}

        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--yellow),var(--green),transparent);opacity:0.7;}
        .card::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at top left,rgba(255,255,255,0.02) 0%,transparent 50%);pointer-events:none;}
        .api-status{display:flex;align-items:center;gap:10px;font-size:0.66rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);}
        .api-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all 0.3s;}
        .api-dot.live{background:var(--green);box-shadow:0 0 10px var(--green-glow),0 0 20px var(--green-glow);}
        .api-dot.error{background:var(--yellow);box-shadow:0 0 10px var(--yellow-glow);}

        .league-pill:hover{border-color:var(--accent);color:var(--text);background:rgba(255,77,90,0.1);transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,77,90,0.2);}

        label{display:block;margin:14px 0 5px;color:var(--muted);font-size:0.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

        select:disabled{opacity:0.4;cursor:not-allowed;}
        .team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .team-col label{margin-top:0;}
        .vs-divider{display:flex;align-items:center;justify-content:center;margin:6px 0;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;gap:12px;}

        .markets-label{display:block;margin:14px 0 8px;color:var(--muted);font-size:0.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

        .mkt-toggle{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--glass-bg);color:var(--muted);font-size:0.7rem;font-weight:700;cursor:pointer;transition:all 0.25s ease;letter-spacing:0.5px;backdrop-filter:blur(10px);}

        .calc-btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(255,77,90,0.5);}
        .calc-btn:active{transform:scale(0.97);}

        .form-row{display:flex;gap:3px;justify-content:center;margin-top:4px;}
        .form-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:700;backdrop-filter:blur(5px);}

        .form-dot.d{background:rgba(255,182,39,0.25);color:var(--yellow);box-shadow:0 0 6px rgba(255,182,39,0.2);}
        .form-dot.l{background:rgba(255,77,90,0.25);color:var(--accent);box-shadow:0 0 6px rgba(255,77,90,0.2);}

        .data-tag.off{background:rgba(255,182,39,0.12);color:var(--yellow);border:1px solid rgba(255,182,39,0.25);}
        .result-boxes{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-top:16px;}
        .result-box{background:var(--glass-bg);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(15px);transition:all 0.3s ease;}

        .result-box.rb-center{border-color:rgba(255,182,39,0.3);background:rgba(255,182,39,0.05);min-width:80px;}
        .rb-label{font-size:0.62rem;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
        .rb-pct{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;line-height:1;}
        .section-header{display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
        .section-icon{font-size:1.1rem;}
        .section-title{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--text);}
        .section-lambda{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px;color:var(--muted);}

        .rc-label{font-size:0.62rem;color:var(--muted);font-weight:700;letter-spacing:1px;}
        .disclaimer{text-align:center;color:var(--muted);font-size:0.63rem;margin-top:20px;line-height:1.6;opacity:0.6;}
        .hidden{display:none;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .animate-in{animation:fadeUp 0.5s ease-out forwards;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
        .pulse{animation:pulse 2s ease-in-out infinite;}
    </style>
</head>

async function bsdFetch(path,ms=API_TIMEOUT){
    const fp=fetch(`${BSD_BASE}${path}`,{headers:{'Authorization':`Token ${BSD_TOKEN}`}});
    const tp=new Promise((_,reject)=>setTimeout(()=>reject(new Error('Timeout')),ms));
    const r=await Promise.race([fp,tp]);
    if(!r.ok)throw new Error(`BSD ${r.status}`);
    return r.json();
}
async function bsdFetchAll(path,ms=API_TIMEOUT){
    let res=[],url=`${BSD_BASE}${path}`,p=0;
    while(url&&p<5){try{const fp=fetch(url,{headers:{'Authorization':`Token ${BSD_TOKEN}`}});const tp=new Promise((_,reject)=>setTimeout(()=>reject(new Error('Timeout')),ms));const r=await Promise.race([fp,tp]);if(!r.ok)break;const d=await r.json();res=res.concat(d.results||[]);url=d.next||null;p++;if(res.length>=200)break;}catch(e){break;}}
    return res;
}

function matchLeagueName(n,k){const l=LIGAS[k];if(!l)return false;const norm=s=>s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');const bn=norm(n);if(bn===norm(l.bsdName))return true;if(l.bsdNameAlt){for(const a of l.bsdNameAlt)if(bn===norm(a))return true;}return norm(l.bsdName).split(' ').every(w=>bn.includes(w));}

function normalizeTeamName(s) {
    return s.trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/\b(fc|cf|sc|ac|as|ss|rc|rb|kv|krc|kaa|afc|rcd|ud|ca|oh|sv|vfl|vfb|fsv|tsg|rkc|pec|nec|ssc|acf|cd|og|aj|sl|ae|bv|sv|bayer|borussia|atletico|olympique|deportivo|real|club|sporting|sport)\b/gi, '')
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ').trim();
}
function tokenOverlap(a,b){const tA=new Set(a.split(' ').filter(t=>t.length>2));const tB=new Set(b.split(' ').filter(t=>t.length>2));if(!tA.size||!tB.size)return 0;let s=0;tA.forEach(t=>{if(tB.has(t))s++;});return s/Math.min(tA.size,tB.size);}
function findTeamInAPI(offlineName,apiTeams){
    const norm=normalizeTeamName;const tn=norm(offlineName);const aliases=(TEAM_ALIASES[currentLeagueKey]?.[offlineName])||[];
    let f=apiTeams.find(t=>t.name.trim().toLowerCase()===offlineName.trim().toLowerCase());if(f)return f;
    f=apiTeams.find(t=>norm(t.name)===tn);if(f)return f;
    for(const a of aliases){f=apiTeams.find(t=>t.name.trim().toLowerCase()===a.trim().toLowerCase()||norm(t.name)===norm(a));if(f)return f;}
    f=apiTeams.find(t=>{const n=norm(t.name);return n.length>3&&tn.length>3&&(n.includes(tn)||tn.includes(n));});if(f)return f;
    for(const a of aliases){const an=norm(a);f=apiTeams.find(t=>{const n=norm(t.name);return n.length>3&&an.length>3&&(n.includes(an)||an.includes(n));});if(f)return f;}
    let best=0,bestT=null;apiTeams.forEach(t=>{const sc=tokenOverlap(tn,norm(t.name));if(sc>best){best=sc;bestT=t;}});if(best>=0.65){console.log(`[FUZZY] "${offlineName}" -> "${bestT.name}" (${best.toFixed(2)})`);return bestT;}
    for(const a of aliases){const an=norm(a);let as=0,at=null;apiTeams.forEach(t=>{const sc=tokenOverlap(an,norm(t.name));if(sc>as){as=sc;at=t;}});if(as>=0.5&&as>best){console.log(`[ALIAS FUZZY] "${offlineName}" via "${a}" -> "${at.name}" (${as.toFixed(2)})`);return at;}}
    console.warn(`[MATCH FAIL] "${offlineName}" best=${best.toFixed(2)}`);return null;
}

function isValidTeamName(name){if(!name||name.trim().length<4)return false;const c=name.trim().toLowerCase();if(/^\d{1,2}[a-zA-Z]$/.test(c))return false;if(/^[a-zA-Z]\d{1,2}$/.test(c))return false;if(/^[a-zA-Z]{2}\s?[a-zA-Z]{2,}$/.test(c)&&c.length<=6)return false;if(!/[aeiouáéíóú]/.test(c))return false;return true;}

async function loadTeams(key){
    const hSel=document.getElementById('home-team'),aSel=document.getElementById('away-team');
    hSel.innerHTML=aSel.innerHTML='<option value="">— Cargando... —</option>';
    hSel.disabled=aSel.disabled=true;
    const liga=LIGAS[key];
    const teams=[...liga.teams].sort();
    teamMap={};

    if(apiAvailable && bsdLeagueMap[key]){
        try{
            setApiStatus('live','🟢 Buscando IDs de equipos...');
            let apiTeams=[];
            try{const d=await bsdFetch('/teams/?league='+bsdLeagueMap[key].bsdId+'&page_size=200');apiTeams=d.results||[];}catch(e){}
            try{const d=await bsdFetch('/teams/?season='+bsdLeagueMap[key].seasonId+'&page_size=200');const extra=d.results||[];const ids=new Set(apiTeams.map(t=>t.id));extra.forEach(t=>{if(!ids.has(t.id))apiTeams.push(t);});}catch(e){}
            if(apiTeams.length<6){try{const ev=await bsdFetchAll('/events/?season='+bsdLeagueMap[key].seasonId+'&limit=100');const m=new Map();ev.forEach(e=>{if(e.home_team_obj?.id)m.set(e.home_team_obj.id,e.home_team_obj);if(e.away_team_obj?.id)m.set(e.away_team_obj.id,e.away_team_obj);});const fe=[...m.values()];const ids=new Set(apiTeams.map(t=>t.id));fe.forEach(t=>{if(!ids.has(t.id))apiTeams.push(t);});}catch(e){}}
            const uniq=Array.from(new Map(apiTeams.map(t=>[t.id,t])).values());
            let matched=0;
            teams.forEach(offName=>{
                const apiTeam=findTeamInAPI(offName,uniq);
                if(apiTeam && isValidTeamName(apiTeam.name)){
                    teamMap[offName]={bsdId:apiTeam.id,offlineName:offName};
                    matched++;
                }else{
                    teamMap[offName]={bsdId:'',offlineName:offName};
                }
            });
            fillSelects(teams,teamMap);
            setApiStatus('live',`🟢 ${matched}/${teams.length} equipos vinculados a API`);
            if(matched>4){
                try{await calculateEloAndSeasonStats(bsdLeagueMap[key].bsdId,bsdLeagueMap[key].seasonId);}catch(e){}
            }
            return;
        }catch(e){console.error(e);}
    }
    setApiStatus('error','🟡 Equipos offline');
    teams.forEach(name=>{teamMap[name]={bsdId:'',offlineName:name};});
    fillSelects(teams,teamMap);
}

function fillSelects(teamList,metaMap={}){
    const h=document.getElementById('home-team'),a=document.getElementById('away-team');
    h.innerHTML=a.innerHTML='<option value="">— Seleccionar —</option>';

}

async function calculateEloAndSeasonStats(leagueId,seasonId){
    const ck=`${leagueId}_${seasonId}`;
    if(eloRatings[ck])return;
    try{
        const events=await bsdFetchAll(`/events/?season=${seasonId}&league=${leagueId}&limit=500`);
        if(!events||events.length<10)return;
        events.sort((a,b)=>new Date(a.start_date||a.date)-new Date(b.start_date||b.date));
        const ratings={}, goals={};
        events.forEach(m=>{
            const hn=m.home_team_obj?.name,an=m.away_team_obj?.name;
            if(!hn||!an)return;
            const hs=Number(m.home_score||0),as=Number(m.away_score||0);
            const st=(m.status||'').toUpperCase();
            if(!['FT','FINISHED','AET','PEN','FULL_TIME'].includes(st)&&!st.includes('FT'))return;
            if(!ratings[hn])ratings[hn]={elo:1500,m:0};if(!ratings[an])ratings[an]={elo:1500,m:0};
            const eH=ratings[hn].elo,eA=ratings[an].elo,expH=1/(1+Math.pow(10,(eA-eH)/400));
            const actH=hs>as?1:hs===as?0.5:0;
            ratings[hn].elo=eH+32*(actH-expH);ratings[an].elo=eA+32*((1-actH)-(1-expH));
            ratings[hn].m++;ratings[an].m++;
            if(!goals[hn])goals[hn]={gf:0,ga:0,p:0};if(!goals[an])goals[an]={gf:0,ga:0,p:0};
            goals[hn].gf+=hs;goals[hn].ga+=as;goals[hn].p++;
            goals[an].gf+=as;goals[an].ga+=hs;goals[an].p++;
        });
        eloRatings[ck]=ratings;
        teamSeasonStats[ck]={};
        for(const[t,s]of Object.entries(goals))if(s.p>0)teamSeasonStats[ck][t]={gf:s.gf/s.p,ga:s.ga/s.p};
    }catch(e){}
}

function plattCalibrate(raw,type){const p=Math.max(0.001,Math.min(0.999,raw/100));const logit=Math.log(p/(1-p));const par=PLATT_PARAMS[type]||{A:0.93,B:-0.04};const cp=1/(1+Math.exp(-(par.A*logit+par.B)));return Math.min(98,Math.max(2,cp*100));}
function formMultiplier(form){if(!form||form.length===0)return 1;const s=form.reduce((a,r)=>a+(r==='w'?3:r==='d'?1:0),0);const adj=(s/(form.length*3)-0.38)*0.23;return Math.max(0.88,Math.min(1.12,1+adj));}
function uncertaintyBand(p,n){const se=Math.sqrt((p/100)*(1-p/100)/Math.max(5,n));return{low:Math.max(0,p-1.282*se*100).toFixed(0),high:Math.min(100,p+1.282*se*100).toFixed(0)};}
function regressionBlend(tv,lm,n){const trust=Math.min(0.85,0.4+(n/MATCHES_TO_USE)*0.45);return tv*trust+lm*(1-trust);}
function poissonExact(lambda,k){let t=Math.exp(-lambda);for(let i=0;i<k;i++)t*=lambda/(i+1);return t;}
function poissonProb(lambda,k){let p=Math.exp(-lambda),t=p;for(let i=1;i<=k;i++){t*=lambda/i;p+=t;}return p;}
function poissonOver(lambda,th){return Math.min(98,Math.max(2,(1-poissonProb(lambda,Math.floor(th)))*100));}
function negBinExact(mu,r,k){const p=r/(r+mu);let logP=0;for(let i=0;i<k;i++)logP+=Math.log(r+i)-Math.log(i+1);logP+=r*Math.log(p)+k*Math.log(1-p);return Math.exp(logP);}
function negBinOver(mu,th,r=6.0){const k=Math.floor(th);let cdf=0;for(let i=0;i<=k;i++)cdf+=negBinExact(mu,r,i);return Math.min(98,Math.max(2,(1-cdf)*100));}
function dixonColesTau(x,y,lH,lA,rho){if(x===0&&y===0)return 1-lH*lA*rho;if(x===0&&y===1)return 1+lH*rho;if(x===1&&y===0)return 1+lA*rho;if(x===1&&y===1)return 1-rho;return 1;}
function calcBTTS(lH,lA,lk='default'){const rho=DIXON_COLES_RHO[lk]||DIXON_COLES_RHO.default;const p00=poissonExact(lH,0)*poissonExact(lA,0)*dixonColesTau(0,0,lH,lA,rho);return Math.min(98,Math.max(2,(1-Math.exp(-lH)-Math.exp(-lA)+p00)*100));}
function calcResultProbs(lH,lA,lk='default'){const rho=DIXON_COLES_RHO[lk]||DIXON_COLES_RHO.default;let pH=0,pD=0,pA=0;for(let h=0;h<=10;h++)for(let a=0;a<=10;a++){let p=poissonExact(lH,h)*poissonExact(lA,a);if(h<=1&&a<=1)p*=dixonColesTau(h,a,lH,lA,rho);if(h>a)pH+=p;else if(h===a)pD+=p;else pA+=p;}const t=pH+pD+pA;return{home:+(pH/t*100).toFixed(1),draw:+(pD/t*100).toFixed(1),away:+(pA/t*100).toFixed(1)};}

function buildRecommendation(mkts){

        diamond: c.prob >= 80 ? '💎' : c.prob >= 72 ? '⭐' : c.prob >= 64 ? '🔥' : ''
    }));
    if (top3.length === 0) {
        const best = mkts.reduce((a,b) => a.prob > b.prob ? a : b, mkts[0]);
        return { top: best, top3: [best], isAggressive: true };
    }
    const top = top3[0];
    const isAggressive = top.prob < 55;
    return { top, top3, isAggressive };
}

document.getElementById('calc-btn').onclick=async()=>{
    const hSel=document.getElementById('home-team'),aSel=document.getElementById('away-team');
    const home=hSel.value,away=aSel.value;

    const bsdInfo=bsdLeagueMap[currentLeagueKey];
    const homeOpt=hSel.selectedOptions[0],awayOpt=aSel.selectedOptions[0];
    const homeId=homeOpt?.dataset?.bsdId||teamMap[home]?.bsdId;
    const awayId=awayOpt?.dataset?.bsdId||teamMap[away]?.bsdId;

    const awayOff=awayOpt?.dataset?.offlineName||teamMap[away]?.offlineName||away;
    const seasonId=bsdInfo?.seasonId;

    if(bsdInfo){const ck=`${bsdInfo.bsdId}_${bsdInfo.seasonId}`;if(!eloRatings[ck]){loadText('Calculando ratings Elo...','Análisis histórico');try{await calculateEloAndSeasonStats(bsdInfo.bsdId,bsdInfo.seasonId);}catch(e){}}const elos=eloRatings[ck]||{};if(elos[homeOff])hElo=elos[homeOff].elo;if(elos[awayOff])aElo=elos[awayOff].elo;const savg=teamSeasonStats[ck]||{};if(savg[homeOff]){hSgf=savg[homeOff].gf;hSga=savg[homeOff].ga;}if(savg[awayOff]){aSgf=savg[awayOff].gf;aSga=savg[awayOff].ga;}}

    const hMC=hStats?.matches||0,aMC=aStats?.matches||0;const lgm=goalsAvg/2;
    let hGf=(hStats?.fromApi&&hStats.xG&&hMC>=5)?regressionBlend(hStats.xG,lgm*1.1,hMC):(hStats?.fromApi&&hStats.goalsFull)?regressionBlend(hStats.goalsFull,lgm*1.1,hMC):hSgf!=null?regressionBlend(hSgf,lgm*1.1,10):fallbackGoals(homeOff,'home',liga,currentLeagueKey);
    let aGf=(aStats?.fromApi&&aStats.xG&&aMC>=5)?regressionBlend(aStats.xG,lgm*0.9,aMC):(aStats?.fromApi&&aStats.goalsFull)?regressionBlend(aStats.goalsFull,lgm*0.9,aMC):aSgf!=null?regressionBlend(aSgf,lgm*0.9,10):fallbackGoals(awayOff,'away',liga,currentLeagueKey);
    let hG1t=hStats?.fromApi?regressionBlend(hStats.goals1t??fallbackGoals1T(homeOff,'home',liga,currentLeagueKey),lgm*1.1,hMC):fallbackGoals1T(homeOff,'home',liga,currentLeagueKey);
    let aG1t=aStats?.fromApi?regressionBlend(aStats.goals1t??fallbackGoals1T(awayOff,'away',liga,currentLeagueKey),lgm*0.9,aMC):fallbackGoals1T(awayOff,'away',liga,currentLeagueKey);
    let hGc=(hStats?.fromApi&&hStats.goalsConceded)?regressionBlend(hStats.goalsConceded,lgm*0.9,hMC):hSga!=null?regressionBlend(hSga,lgm*0.9,10):lgm*0.9;
    let aGc=(aStats?.fromApi&&aStats.goalsConceded)?regressionBlend(aStats.goalsConceded,lgm*1.1,aMC):aSga!=null?regressionBlend(aSga,lgm*1.1,10):lgm*1.1;
    let hC=hStats?.fromApi?regressionBlend(hStats.corners??fallbackCorners(homeOff,'home',liga),cornersAvg/2*1.1,hMC):fallbackCorners(homeOff,'home',liga);

function loadText(t,s){document.getElementById('loading-text').textContent=t;document.getElementById('loading-sub').textContent=s;}
function getAltitudeAdjustment(h,a){const ha=ALTITUDE_TEAMS[h];let adv=1.08,tags=[];if(ha){adv=ha.advantage;tags.push({text:`🏔 Altitud local: ${ha.altitude}`,type:'altitude'});}return{homeAdv:adv,contextTags:tags};}
async function getTeamStats(tid,tn,role,sid){
    const key=`${tid}_${sid}_${role}`;if(statsCache[key])return statsCache[key];
    try{let ev=await bsdFetchAll(`/events/?team=${tid}&season=${sid}&limit=300`);if(!ev||ev.length<3)return null;
    const fin=ev.filter(m=>{const st=(m.status||'').toUpperCase();if(!['FT','FINISHED','AET','PEN','FULL_TIME'].includes(st)&&!st.includes('FT'))return false;const mtid=role==='home'?(m.home_team_obj?.id??m.home_team):(m.away_team_obj?.id??m.away_team);return mtid==tid;}).slice(-MATCHES_TO_USE);
    if(fin.length<3)return null;const w=fin.map((_,i)=>Math.exp(0.15*i));let tC=0,wC=0,tG=0,wG=0,tGF=0,wGF=0,tGC=0,wGC=0,tXG=0,wXG=0;const form=[];
    fin.slice(-5).forEach(m=>{const hs=Number(m.home_score||0),as=Number(m.away_score||0);if(role==='home'){if(hs>as)form.push('w');else if(hs===as)form.push('d');else form.push('l');}else{if(as>hs)form.push('w');else if(as===hs)form.push('d');else form.push('l');}});
    fin.forEach((m,i)=>{const wt=w[i],st=extractMatchStats(m,role);if(st.corners!=null){tC+=Number(st.corners)*wt;wC+=wt;}if(st.goals1t!=null){tG+=Number(st.goals1t)*wt;wG+=wt;}if(st.goalsFull!=null){tGF+=Number(st.goalsFull)*wt;wGF+=wt;}if(st.goalsConceded!=null){tGC+=Number(st.goalsConceded)*wt;wGC+=wt;}if(st.xG!=null){tXG+=Number(st.xG)*wt;wXG+=wt;}});
    const res={corners:wC>0?tC/wC:null,goals1t:wG>0?tG/wG:null,goalsFull:wGF>0?tGF/wGF:null,goalsConceded:wGC>0?tGC/wGC:null,xG:wXG>0?tXG/wXG:null,matches:fin.length,form,fromApi:true};statsCache[key]=res;return res;}catch(e){return null;}
}
function extractMatchStats(m,role){const s=m.stats||m.statistics||{},ls=m.live_stats||{};let c=null,g1=null,gf=null,xg=null,gc=null;if(s[role]?.corner_kicks!=null)c=s[role].corner_kicks;else if(ls[role]?.corner_kicks!=null)c=ls[role].corner_kicks;else if(role==='home'&&m.home_corners!=null)c=m.home_corners;else if(role==='away'&&m.away_corners!=null)c=m.away_corners;if(role==='home'&&m.home_score_ht!=null)g1=m.home_score_ht;if(role==='away'&&m.away_score_ht!=null)g1=m.away_score_ht;if(role==='home'){if(m.home_score!=null)gf=m.home_score;if(m.away_score!=null)gc=m.away_score;}if(role==='away'){if(m.away_score!=null)gf=m.away_score;if(m.home_score!=null)gc=m.home_score;}if(s[role]?.expected_goals!=null)xg=s[role].expected_goals;else if(ls[role]?.expected_goals!=null)xg=ls[role].expected_goals;else if(role==='home'&&m.home_xg!=null)xg=m.home_xg;else if(role==='away'&&m.away_xg!=null)xg=m.away_xg;return{corners:c,goals1t:g1,goalsFull:gf,xG:xg,goalsConceded:gc};}
