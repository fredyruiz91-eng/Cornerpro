            "LIB": { name: "🏆 Libertadores", goalsAvg: 2.50, negBinR: 6.1, markets: { goles: true, ht: true, btts: true, corn: true } },
            "MLS": { name: "🇺🇸 MLS", goalsAvg: 2.85, negBinR: 6.2, markets: { goles: true, ht: true, btts: true, corn: false } },

        };

        let TEAM_STRENGTH_DB = {
            "PL": {
                "Arsenal FC": { atk: 1.32, def: 0.88 }, "Manchester City FC": { atk: 1.35, def: 0.82 }, "Liverpool FC": { atk: 1.28, def: 0.85 },
                // ... (todos los demás equipos como en tu versión original, los dejamos igual por brevedad)
            },
            // ... resto de ligas (tu base original)
        };

        // ========== VARIABLES GLOBALES ==========
        let currentLeagueKey = null;
        let activeMarkets = { goles: true, ht: true, btts: true, corn: true };
        let ultimoCalculo = null;
        let isUpdating = false;

        // ========== FUNCIONES API ==========
        async function apiFetch(endpoint) {
            const res = await fetch(API_BASE + endpoint, {
                headers: { 'x-apisports-key': API_KEY }
            });
            if (!res.ok) throw new Error(`Error API: ${res.status}`);
            return res.json();
        }

        async function updateLeagueData(leagueKey, showAlert = true) {
            if (isUpdating) return;
            if (!API_KEY) {
                if (showAlert) alert('API key no configurada');
                return;
            }
            const leagueId = LEAGUE_IDS[leagueKey];
            if (!leagueId) {
                if (showAlert) alert('Liga no soportada en API-Football');
                return;
            }

            isUpdating = true;
            document.getElementById('api-text').textContent = '⏳ Actualizando datos...';
            document.getElementById('api-dot').classList.add('warning');

            try {
                // 1. Obtener equipos de la liga en la temporada 2026
                const teamsRes = await apiFetch(`/teams?league=${leagueId}&season=${CURRENT_SEASON}`);
                const teams = teamsRes.response;

                const teamStats = {};
                let totalGoals = 0;
                let totalMatches = 0;

                // 2. Estadísticas de cada equipo
                for (let t of teams) {
                    const statsRes = await apiFetch(`/teams/statistics?league=${leagueId}&season=${CURRENT_SEASON}&team=${t.team.id}`);
                    const stats = statsRes.response;
                    const played = stats.fixtures.played.total;
                    if (played === 0) continue;

                    const goalsFor = stats.goals.for.total.total;
                    const goalsAgainst = stats.goals.against.total.total;
                    const avgFor = goalsFor / played;
                    const avgAgainst = goalsAgainst / played;

                    const rawName = t.team.name;
                    const mappedName = normalizeTeamName(rawName);
                    teamStats[mappedName] = {
                        avgFor: avgFor,
                        avgAgainst: avgAgainst,
                        played: played
                    };
                    totalGoals += goalsFor;
                    totalMatches += played;
                }

                if (totalMatches === 0) throw new Error('No hay partidos jugados en esta temporada');

                const leagueAvgGoals = totalGoals / totalMatches;

                // 3. Construir nuevo TEAM_STRENGTH_DB para esta liga
                const newTeamDB = {};
                for (let [name, data] of Object.entries(teamStats)) {
                    newTeamDB[name] = {
                        atk: +(data.avgFor / leagueAvgGoals).toFixed(3),
                        def: +(data.avgAgainst / leagueAvgGoals).toFixed(3)
                    };
                }

                // 4. Actualizar estructuras globales
                TEAM_STRENGTH_DB[leagueKey] = newTeamDB;
                LIGAS[leagueKey].goalsAvg = +leagueAvgGoals.toFixed(2);

                // 5. Guardar en localStorage para referencia
                localStorage.setItem(`last_update_${leagueKey}`, Date.now());
                localStorage.setItem(`team_db_${leagueKey}`, JSON.stringify(newTeamDB));
                localStorage.setItem(`goals_avg_${leagueKey}`, leagueAvgGoals.toFixed(2));

                document.getElementById('api-text').textContent = '✅ Datos actualizados (temp. 2026)';
                document.getElementById('api-dot').classList.remove('warning');
                if (showAlert) alert(`Datos de ${LIGAS[leagueKey].name} actualizados.\nMedia: ${leagueAvgGoals.toFixed(2)} goles/partido`);

                // Recargar equipos en los selectores
                loadTeams(leagueKey);
            } catch (error) {
                console.error(error);
                document.getElementById('api-text').textContent = '❌ Error al actualizar';
                document.getElementById('api-dot').classList.add('warning');
                if (showAlert) alert('Error al conectar con la API: ' + error.message);
            } finally {
                isUpdating = false;
            }
        }

        // ========== FUNCIONES MATEMÁTICAS (sin cambios) ==========
        const PLATT_PARAMS = {
            goals15: { A: 0.951, B: -0.038 }, goals25: { A: 0.933, B: -0.055 }, btts: { A: 0.956, B: -0.034 },
            corners: { A: 0.970, B: -0.022 }, goals_ht05: { A: 0.960, B: -0.030 }, goals_ht15: { A: 0.938, B: -0.048 },
            resultado: { A: 0.918, B: -0.068 }
        };
        const DIXON_COLES_RHO = {
            "PL": -0.065, "BL1": -0.085, "SA": -0.130, "PD": -0.098, "FL1": -0.105, "DED": -0.072,
            "BSA": -0.090, "ELC": -0.078, "JPL": -0.082, "MXL": -0.095, "LIB": -0.088, "MLS": -0.070,
            "BSB": -0.092, "PPT": -0.080, "EKS": -0.085, "SLG": -0.100, "WC26": -0.055, "default": -0.13
        };
        const HOME_ADVANTAGE = {
            "PL": 1.08, "BL1": 1.09, "SA": 1.04, "PD": 1.05, "FL1": 1.06, "DED": 1.08,
            "BSA": 1.12, "ELC": 1.07, "JPL": 1.07, "MXL": 1.06, "LIB": 1.10, "MLS": 1.11,
            "BSB": 1.10, "PPT": 1.06, "EKS": 1.05, "SLG": 1.05, "WC26": 1.04
        };

        function plattCalibrate(raw, type) {
            const p = Math.max(0.001, Math.min(0.999, raw / 100));
            const logit = Math.log(p / (1 - p));
            const params = PLATT_PARAMS[type] || { A: 0.93, B: -0.04 };
            const calibrated = 1 / (1 + Math.exp(-(params.A * logit + params.B)));
            return Math.min(98, Math.max(2, calibrated * 100));
        }
        function poissonExact(lambda, k) { let t = Math.exp(-lambda); for (let i = 0; i < k; i++) t *= lambda / (i + 1); return t; }
        function poissonProb(lambda, k) { let p = Math.exp(-lambda), t = p; for (let i = 1; i <= k; i++) { t *= lambda / i; p += t; } return p; }
        function poissonOver(lambda, th) { return Math.min(98, Math.max(2, (1 - poissonProb(lambda, Math.floor(th))) * 100)); }
        function negBinExact(mu, r, k) { const p = r / (r + mu); let logP = 0; for (let i = 0; i < k; i++) logP += Math.log(r + i) - Math.log(i + 1); logP += r * Math.log(p) + k * Math.log(1 - p); return Math.exp(logP); }
        function negBinOver(mu, th, r = 6.0) { const k = Math.floor(th); let cdf = 0; for (let i = 0; i <= k; i++) cdf += negBinExact(mu, r, i); return Math.min(98, Math.max(2, (1 - cdf) * 100)); }
        function dixonColesTau(x, y, lH, lA, rho) { if (x === 0 && y === 0) return 1 - lH * lA * rho; if (x === 0 && y === 1) return 1 + lH * rho; if (x === 1 && y === 0) return 1 + lA * rho; if (x === 1 && y === 1) return 1 - rho; return 1; }
        function calcBTTS(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; const p00 = poissonExact(lH, 0) * poissonExact(lA, 0) * dixonColesTau(0, 0, lH, lA, rho); return Math.min(98, Math.max(2, (1 - Math.exp(-lH) - Math.exp(-lA) + p00) * 100)); }
        function calcResultProbs(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; let pH = 0, pD = 0, pA = 0; for (let h = 0; h <= 10; h++) { for (let a = 0; a <= 10; a++) { let p = poissonExact(lH, h) * poissonExact(lA, a); if (h <= 1 && a <= 1) p *= dixonColesTau(h, a, lH, lA, rho); if (h > a) pH += p; else if (h === a) pD += p; else pA += p; } } const t = pH + pD + pA; return { home: +(pH / t * 100).toFixed(1), draw: +(pD / t * 100).toFixed(1), away: +(pA / t * 100).toFixed(1) }; }
        function colorFor(p) { return p >= 65 ? 'var(--green)' : p >= 42 ? 'var(--yellow)' : 'var(--accent)'; }
        function cardClassFor(p) { return p >= 65 ? 'high' : p >= 42 ? 'mid' : 'low'; }

        // ========== INTERFAZ ==========
        function renderLeaguePills() {
            const c = document.getElementById('league-pills');
            c.innerHTML = '';
            for (const [k, v] of Object.entries(LIGAS)) {
                const b = document.createElement('button');
                b.className = 'league-pill';
                b.textContent = v.name;
                b.dataset.league = k;
                b.addEventListener('click', (e) => selectLeague(k, e.target));
                c.appendChild(b);
            }
        }

        function renderMarketToggles() {
            const c = document.getElementById('market-toggles');
            const options = [{ key: 'goles', label: '⚽ Goles' }, { key: 'ht', label: '⏱ HT' }, { key: 'btts', label: '🤝 BTTS' }, { key: 'corn', label: '⬡ Corn' }];
            c.innerHTML = '';
            const liga = currentLeagueKey ? LIGAS[currentLeagueKey] : null;
            options.forEach(x => {
                const b = document.createElement('button');
                b.className = 'mkt-toggle';
                b.textContent = x.label;
                const avail = !liga || (liga.markets[x.key] === true);
                if (!avail) { b.classList.add('unavailable'); activeMarkets[x.key] = false; }
                else { if (activeMarkets[x.key]) b.classList.add('on'); b.onclick = () => { activeMarkets[x.key] = !activeMarkets[x.key]; b.classList.toggle('on'); }; }
                c.appendChild(b);
            });
        }

        function selectLeague(key, pillElement) {
            if (currentLeagueKey === key) return;
            currentLeagueKey = key;
            document.querySelectorAll('.league-pill').forEach(p => p.classList.remove('active'));
            if (pillElement) pillElement.classList.add('active');
            const liga = LIGAS[key];
            activeMarkets = { goles: liga.markets.goles, ht: liga.markets.ht, btts: liga.markets.btts, corn: liga.markets.corn };
            renderMarketToggles();
            loadTeams(key);
            document.getElementById('results').classList.add('hidden');
            document.getElementById('output').classList.add('hidden');
            ultimoCalculo = null;

            // Verificar si actualizar automáticamente
            const lastUpdate = localStorage.getItem(`last_update_${key}`);
            const now = Date.now();
            if (!lastUpdate || (now - parseInt(lastUpdate)) > 86400000) {
                if (confirm(`¿Actualizar datos de ${liga.name} con la API?`)) {
                    updateLeagueData(key, false);
                }
            }
        }

        function loadTeams(key) {
            const hSel = document.getElementById('home-team');
            const aSel = document.getElementById('away-team');
            const db = TEAM_STRENGTH_DB[key];
            if (!db) {
                hSel.innerHTML = aSel.innerHTML = '<option value="">— Sin datos —</option>';
                hSel.disabled = aSel.disabled = true;
                return;
            }
            const teams = Object.keys(db).sort();
            hSel.innerHTML = aSel.innerHTML = '<option value="">— Seleccionar —</option>';
            teams.forEach(name => {
                hSel.add(new Option(name, name));
                aSel.add(new Option(name, name));
            });
            hSel.disabled = aSel.disabled = false;
        }

        // ========== GESTIÓN DE APUESTAS ==========
        const STORAGE_KEY = 'data_predict_apuestas_v27';
        function getApuestas() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch (e) { return []; } }
        function saveApuestas(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
        function guardarApuesta(datos) {
            const apuestas = getApuestas();
            const nueva = {
                id: Date.now(),
                fecha: new Date().toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                liga: datos.ligaName,
                ligaKey: datos.ligaKey,
                home: datos.home,
                away: datos.away,
                mercado: datos.mercado,
                probabilidad: datos.probabilidad,
                estado: 'pendiente',
                lambdaHome: datos.lambdaHome,
                lambdaAway: datos.lambdaAway
            };
            apuestas.unshift(nueva);
            saveApuestas(apuestas);
            renderApuestas();
            return nueva;
        }
        function actualizarEstadoApuesta(id, nuevoEstado) {
            const apuestas = getApuestas();
            const idx = apuestas.findIndex(a => a.id === id);
            if (idx !== -1) {
                apuestas[idx].estado = apuestas[idx].estado === nuevoEstado ? 'pendiente' : nuevoEstado;
                saveApuestas(apuestas);
                renderApuestas();
            }
        }
        function eliminarApuesta(id) {
            if (confirm('¿Eliminar esta apuesta?')) {
                let apuestas = getApuestas();
                apuestas = apuestas.filter(a => a.id !== id);
                saveApuestas(apuestas);
                renderApuestas();
            }
        }
        function renderApuestas() {
            const container = document.getElementById('apuestas-container');
            const countEl = document.getElementById('apuestas-count');
            const apuestas = getApuestas();
            countEl.textContent = apuestas.length + ' guardada' + (apuestas.length !== 1 ? 's' : '');
            if (apuestas.length === 0) {
                container.innerHTML = '<div class="empty-apuestas">No hay apuestas guardadas aún.</div>';
                return;
            }
            container.innerHTML = apuestas.map(a => {
                let estadoClass = a.estado === 'ganada' ? 'ganada' : a.estado === 'perdida' ? 'perdida' : '';
                let btnGanadaClass = a.estado === 'ganada' ? 'btn-ganada activo' : 'btn-ganada';
                let btnPerdidaClass = a.estado === 'perdida' ? 'btn-perdida activo' : 'btn-perdida';
                return `
                    <div class="apuesta-card ${estadoClass} animate-in">
                        <div class="apuesta-info">
                            <span class="apuesta-match">${a.home} vs ${a.away}</span>
                            <span class="apuesta-mercado">${a.mercado} → ${a.probabilidad.toFixed(0)}%</span>
                        </div>
                        <div class="apuesta-fecha">${a.fecha} · ${a.liga} · λ ${a.lambdaHome}/${a.lambdaAway} · ${a.estado === 'pendiente' ? '⏳ Pendiente' : a.estado === 'ganada' ? '✅ Ganada' : '❌ Perdida'}</div>
                        <div class="apuesta-actions">
                            <button class="btn-accion ${btnGanadaClass}" onclick="actualizarEstadoApuesta(${a.id}, 'ganada')">✅ Ganada</button>
                            <button class="btn-accion ${btnPerdidaClass}" onclick="actualizarEstadoApuesta(${a.id}, 'perdida')">❌ Perdida</button>
                            <button class="btn-accion btn-eliminar" onclick="eliminarApuesta(${a.id})">🗑️ Eliminar</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== CÁLCULO PRINCIPAL ==========
        document.getElementById('calc-btn').addEventListener('click', () => {
            const hSel = document.getElementById('home-team'), aSel = document.getElementById('away-team');
            const home = hSel.value, away = aSel.value;
            if (!currentLeagueKey) { alert('Selecciona liga'); return; }
            if (!home || !away) { alert('Selecciona equipos'); return; }
            if (home === away) { alert('Equipos diferentes'); return; }

            const liga = LIGAS[currentLeagueKey];
            const hStr = TEAM_STRENGTH_DB[currentLeagueKey][home] || { atk: 1, def: 1 };
            const aStr = TEAM_STRENGTH_DB[currentLeagueKey][away] || { atk: 1, def: 1 };
            const baseGoals = liga.goalsAvg / 2;
            const hAdv = HOME_ADVANTAGE[currentLeagueKey] || 1.08;

            const lH = +(baseGoals * hStr.atk * aStr.def * hAdv).toFixed(2);
            const lA = +(baseGoals * aStr.atk * hStr.def).toFixed(2);
            const lHT = +((baseGoals * hStr.atk * aStr.def * hAdv * 0.40) + (baseGoals * aStr.atk * hStr.def * 0.40)).toFixed(2);
            const lCorn = +((baseGoals * hStr.atk * 1.2) + (baseGoals * aStr.atk * 0.95)).toFixed(2);

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('loading-indicator').classList.remove('hidden');
            document.getElementById('output').classList.add('hidden');
            document.getElementById('save-btn-container').innerHTML = '';

            setTimeout(() => {
                document.getElementById('loading-indicator').classList.add('hidden');
                const outEl = document.getElementById('output');

                document.getElementById('match-header-container').innerHTML = `
                    <div class="match-header animate-in">
                        <div style="text-align:center;font-size:0.7rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;">${liga.name}</div>
                        <div class="teams-row">
                            <div class="team-side"><div class="team-name">${home}</div></div>
                            <div class="vs-center">VS</div>
                            <div class="team-side"><div class="team-name">${away}</div></div>
                        </div>
                    </div>`;

                const rp = calcResultProbs(lH, lA, currentLeagueKey);
                const h = +plattCalibrate(rp.home, 'resultado').toFixed(1);
                const d = +plattCalibrate(rp.draw, 'resultado').toFixed(1);
                const a = +plattCalibrate(rp.away, 'resultado').toFixed(1);

                document.getElementById('match-header-container').innerHTML += `
                    <div class="result-boxes animate-in">
                        <div class="result-box"><div class="rb-label">LOCAL</div><div class="rb-pct" style="color:${colorFor(h)}">${h}%</div></div>
                        <div class="result-box"><div class="rb-label">X</div><div class="rb-pct" style="color:var(--yellow)">${d}%</div></div>
                        <div class="result-box"><div class="rb-label">VISIT</div><div class="rb-pct" style="color:${colorFor(a)}">${a}%</div></div>
                    </div>`;

                let html = '';
                if (activeMarkets.goles) {
                    const l = lH + lA;
                    const g15 = plattCalibrate(poissonOver(l, 1.5), 'goals15');
                    const g25 = plattCalibrate(poissonOver(l, 2.5), 'goals25');
                    html += `<div class="section-header animate-in"><span class="section-title">⚽ GOLES</span><span class="section-lambda">λ <span>${l.toFixed(2)}</span></span></div>
                        <div class="market-card ${cardClassFor(g15)} animate-in"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15}" style="background:${colorFor(g15)};"></div></div><div class="bar-sub">Under: ${(100-g15).toFixed(1)}%</div></div><div class="pct-label" style="color:${colorFor(g15)}">${g15.toFixed(0)}%</div></div>
                        <div class="market-card ${cardClassFor(g25)} animate-in"><div class="line-label">+2.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g25}" style="background:${colorFor(g25)};"></div></div><div class="bar-sub">Under: ${(100-g25).toFixed(1)}%</div></div><div class="pct-label" style="color:${colorFor(g25)}">${g25.toFixed(0)}%</div></div>`;
                }
                if (activeMarkets.ht) {
                    const g05 = plattCalibrate(poissonOver(lHT, 0.5), 'goals_ht05');
                    const g15 = plattCalibrate(poissonOver(lHT, 1.5), 'goals_ht15');
                    html += `<div class="section-header animate-in"><span class="section-title">⏱ 1er TIEMPO</span><span class="section-lambda">λ <span>${lHT.toFixed(2)}</span></span></div>
                        <div class="market-card ${cardClassFor(g05)} animate-in"><div class="line-label">+0.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g05}" style="background:${colorFor(g05)};"></div></div></div><div class="pct-label" style="color:${colorFor(g05)}">${g05.toFixed(0)}%</div></div>
                        <div class="market-card ${cardClassFor(g15)} animate-in"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15}" style="background:${colorFor(g15)};"></div></div></div><div class="pct-label" style="color:${colorFor(g15)}">${g15.toFixed(0)}%</div></div>`;
                }
                if (activeMarkets.btts) {
                    const btts = plattCalibrate(calcBTTS(lH, lA, currentLeagueKey), 'btts');
                    html += `<div class="section-header animate-in"><span class="section-title">🤝 AMBOS MARCAN</span></div>
                        <div class="market-card ${cardClassFor(btts)} animate-in"><div class="line-label">BTTS</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${btts}" style="background:${colorFor(btts)};"></div></div></div><div class="pct-label" style="color:${colorFor(btts)}">${btts.toFixed(0)}%</div></div>`;
                }
                if (activeMarkets.corn) {
                    html += `<div class="section-header animate-in"><span class="section-title">⬡ CÓRNERS</span><span class="section-lambda">λ <span>${lCorn.toFixed(2)}</span></span></div>`;
                    [7.5, 8.5, 9.5, 10.5].forEach(line => {
                        const corn = plattCalibrate(negBinOver(lCorn, line, liga.negBinR), 'corners');
                        html += `<div class="market-card ${cardClassFor(corn)} animate-in"><div class="line-label">+${line}</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${corn}" style="background:${colorFor(corn)};"></div></div></div><div class="pct-label" style="color:${colorFor(corn)}">${corn.toFixed(0)}%</div></div>`;
                    });
                }

                document.getElementById('all-markets-container').innerHTML = html;
                const probG15 = plattCalibrate(poissonOver(lH + lA, 1.5), 'goals15');
                document.getElementById('recomendacion-container').innerHTML = `<div class="recomendacion animate-in"><div class="rec-main" style="color:${colorFor(probG15)}">OVER 1.5</div></div>`;

                document.getElementById('save-btn-container').innerHTML = `
                    <button class="save-btn animate-in" id="save-apuesta-btn">💾 GUARDAR ESTA APUESTA</button>
                `;
                document.getElementById('save-apuesta-btn').addEventListener('click', function() {
                    guardarApuesta({
                        ligaName: liga.name,
                        ligaKey: currentLeagueKey,
                        home: home,
                        away: away,
                        mercado: 'Over 1.5 Goles',
                        probabilidad: probG15,
                        lambdaHome: lH,
                        lambdaAway: lA
                    });
                    this.textContent = '✅ ¡APUESTA GUARDADA!';
                    this.style.background = 'rgba(46, 204, 113, 0.3)';
                    this.style.borderColor = 'var(--green)';
                    this.style.color = 'white';
                    this.disabled = true;
                    setTimeout(() => {
                        this.textContent = '💾 GUARDAR ESTA APUESTA';
                        this.style.background = 'rgba(46, 204, 113, 0.1)';
                        this.style.borderColor = 'rgba(46, 204, 113, 0.4)';
                        this.style.color = 'var(--green)';
                        this.disabled = false;
                    }, 2000);
                });

                outEl.classList.remove('hidden');
                setTimeout(() => document.querySelectorAll('.bar-fill').forEach(bar => {
                    const t = bar.dataset.target;
                    if (t) bar.style.width = t + '%';
                }), 50);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 800);
        });

        // Botón de actualización forzada
        document.getElementById('force-update-btn').addEventListener('click', () => {
            if (!currentLeagueKey) { alert('Selecciona una liga'); return; }
            updateLeagueData(currentLeagueKey, true);
        });

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            renderLeaguePills();
            renderMarketToggles();
            selectLeague('PL');
            renderApuestas();
            // Cargar datos guardados en localStorage si existen
            for (let key of Object.keys(LIGAS)) {
                const savedDB = localStorage.getItem(`team_db_${key}`);
                const savedAvg = localStorage.getItem(`goals_avg_${key}`);
                if (savedDB && savedAvg) {
                    TEAM_STRENGTH_DB[key] = JSON.parse(savedDB);
                    LIGAS[key].goalsAvg = parseFloat(savedAvg);
                }
            }
        });
    </script>
</body>
</html>
