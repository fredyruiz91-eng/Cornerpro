<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Full Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; text-align: center; margin-bottom: 20px; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; cursor: pointer; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; margin-top: 20px; color: white; }
        .market-header { font-family: 'Bebas Neue', sans-serif; color: var(--accent); margin: 15px 0 5px; font-size: 1.1rem; border-left: 3px solid var(--accent); padding-left: 10px; }
        .market-card { background: var(--card2); padding: 12px 15px; border-radius: 10px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
        .status { font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Corner<span>IQ</span> Pro</div>

    <div class="card">
        <label>Liga</label>
        <select id="league-select"></select>

        <label>Local</label>
        <select id="home-team"></select>

        <label>Visitante</label>
        <select id="away-team"></select>

        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
        <div id="status" class="status">Sistema Híbrido Activo</div>
    </div>

    <div id="results" class="hidden">
        <div class="card">
            <div class="market-header">CÓRNERS TOTALES</div>
            <div id="corners-markets"></div>
            
            <div class="market-header">GOLES 1ER TIEMPO</div>
            <div id="goals-markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

const LIGAS = {
    "PD": { 
        name: "🇪🇸 La Liga", id: "PD", avgC: 9.5, avgG: 1.05, 
        teams: ["Alavés", "Athletic Club", "Atlético Madrid", "FC Barcelona", "Celta Vigo", "Espanyol", "Getafe", "Girona", "Las Palmas", "Leganés", "Levante UD", "Mallorca", "Osasuna", "Rayo Vallecano", "Real Betis", "Real Madrid", "Real Oviedo", "Real Sociedad", "Sevilla FC", "Valencia CF", "Valladolid", "Villarreal"] 
    },
    "PL": { 
        name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", id: "PL", avgC: 10.1, avgG: 1.15, 
        teams: ["Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton", "Chelsea", "Crystal Palace", "Everton", "Fulham", "Ipswich Town", "Leicester City", "Liverpool", "Man City", "Man United", "Newcastle", "Nott'm Forest", "Southampton", "Tottenham", "West Ham", "Wolves"] 
    },
    "V1": { 
        name: "🇩🇪 Bundesliga", id: "V1", avgC: 9.8, avgG: 1.35, 
        teams: ["Bayer Leverkusen", "Bayern München", "Borussia Dortmund", "Eintracht Frankfurt", "Heidenheim", "Hoffenheim", "Holstein Kiel", "Mainz 05", "Mönchengladbach", "RB Leipzig", "SC Freiburg", "St. Pauli", "Stuttgart", "Union Berlin", "VfL Bochum", "VfL Wolfsburg", "Werder Bremen"] 
    },
    "SA": { 
        name: "🇮🇹 Serie A", id: "SA", avgC: 9.0, avgG: 1.0, 
        teams: ["Atalanta", "Bologna", "Cagliari", "Como", "Empoli", "Fiorentina", "Genoa", "Inter Milan", "Juventus", "Lazio", "Lecce", "Milan", "Monza", "Napoli", "Parma", "Roma", "Torino", "Udinese", "Venezia", "Verona"] 
    },
    "EEB": { 
        name: "🇧🇷 Brasileirão", id: "EEB", avgC: 9.4, avgG: 0.95, 
        teams: ["Athletico-PR", "Atlético-MG", "Bahia", "Botafogo", "Corinthians", "Criciúma", "Cruzeiro", "Cuiabá", "Flamengo", "Fluminense", "Fortaleza", "Grêmio", "Internacional", "Juventude", "Palmeiras", "RB Bragantino", "São Paulo", "Vasco da Gama", "Vitória"] 
    },
    "CL": { 
        name: "🇪🇺 Champions League", id: "CL", avgC: 9.8, avgG: 1.25, 
        teams: ["Real Madrid", "Man City", "Bayern München", "PSG", "Liverpool", "Inter Milan", "Arsenal", "Barcelona", "Bayer Leverkusen", "Dortmund", "Atletico Madrid", "Juventus", "AC Milan", "Benfica"] 
    }
};

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const status = document.getElementById('status');

window.onload = () => {
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
    loadTeams();
};

async function loadTeams() {
    const code = lSel.value;
    status.innerText = "Sincronizando con API...";
    
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!response.ok) throw new Error();
        const data = await response.json();
        renderTeams(data.teams.map(t => t.name));
        status.innerText = "Datos Actualizados (API)";
    } catch (e) {
        renderTeams(LIGAS[code].teams);
        status.innerText = "Datos de Respaldo (Local)";
    }
}

function renderTeams(teamList) {
    hSel.innerHTML = aSel.innerHTML = '';
    teamList.sort().forEach(name => {
        hSel.add(new Option(name, name));
        aSel.add(new Option(name, name));
    });
}

lSel.onchange = loadTeams;

document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    document.getElementById('results').classList.remove('hidden');

    // Córners
    let cHtml = '';
    [7.5, 8.5, 9.5].forEach(line => {
        const p = poisson(liga.avgC, Math.floor(line));
        cHtml += `<div class="market-card"><span>+${line} Córners</span><span class="pct" style="color:${p > 60 ? 'var(--green)' : 'var(--yellow)'}">${p.toFixed(0)}%</span></div>`;
    });
    document.getElementById('corners-markets').innerHTML = cHtml;

    // Goles HT
    const pG = poisson(liga.avgG, 0);
    document.getElementById('goals-markets').innerHTML = `
        <div class="market-card"><span>+0.5 Goles HT</span><span class="pct" style="color:${pG > 60 ? 'var(--green)' : 'var(--yellow)'}">${pG.toFixed(0)}%</span></div>
    `;
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
