<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Predictor Maestro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --red: #ef4444; --yellow: #f59e0b; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 5px; color: white; }
        h1 span { color: var(--red); }
        .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
        label { display: block; margin: 12px 0 5px; color: var(--muted); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; font-size: 1rem; }
        button { background: var(--red); border: none; font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .market-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .line-val { font-size: 2rem; font-weight: 800; color: var(--yellow); margin: 5px 0; }
        .pct-row { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; }
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .verdict-card { background: #111827; border-radius: 16px; padding: 20px; border: 1px solid #374151; margin-top: 10px; text-align: center;}
        .risk-bar { height: 6px; background: linear-gradient(90deg, var(--green), var(--yellow), var(--red)); border-radius: 3px; margin-top: 20px; position: relative; }
        .risk-pointer { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: -3px; transform: translateX(-50%); box-shadow: 0 0 8px white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CornerIQ <span>Pro</span></h1>
        <p class="subtitle">Análisis Estadístico de Córners</p>
        <div class="card">
            <label>Liga (Competencia)</label>
            <select id="league-select"></select>
            <label>Equipo Local</label>
            <select id="home-team"><option value="">Selecciona liga</option></select>
            <label>Equipo Visitante</label>
            <select id="away-team"><option value="">Selecciona liga</option></select>
            <button id="calc-btn">Calcular Probabilidades</button>
        </div>
        <div id="results" class="hidden">
            <div id="markets-container"></div>
            <div id="verdict-container"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c'; 
        const LIGAS = [
            { id: 2014, name: 'LaLiga', country: 'España' },
            { id: 2021, name: 'Premier League', country: 'Inglaterra' },
            { id: 2002, name: 'Bundesliga', country: 'Alemania' },
            { id: 2019, name: 'Serie A', country: 'Italia' },
            { id: 2015, name: 'Ligue 1', country: 'Francia' },
            { id: 2013, name: 'Série A', country: 'Brasil' },
            { id: 2001, name: 'Champions League', country: 'Europa' }
        ];

        // Ajuste de "Poder de Córners" para evitar inflar los resultados
        const cornerPower = {
            "Real Madrid CF": 6.2, "FC Barcelona": 5.9, "Levante UD": 5.1, "Real Oviedo": 4.9,
            "Manchester City FC": 7.1, "Liverpool FC": 6.8, "Arsenal FC": 6.2, "Girona FC": 5.4,
            "Atlético de Madrid": 4.8, "Bayern München": 6.5, "Inter Milano": 5.7
        };

        const lSel = document.getElementById('league-select');
        const hSel = document.getElementById('home-team');
        const aSel = document.getElementById('away-team');
        const btn = document.getElementById('calc-btn');

        window.onload = () => {
            lSel.innerHTML = '<option value="">-- Seleccionar Liga --</option>';
            LIGAS.forEach(l => lSel.add(new Option(`${l.name} - ${l.country}`, l.id)));
        };

        lSel.onchange = async () => {
            if (!lSel.value) return;
            hSel.innerHTML = aSel.innerHTML = '<option>Cargando...</option>';
            try {
                const res = await fetch(`https://api.football-data.org/v4/competitions/${lSel.value}/teams`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await res.json();
                hSel.innerHTML = aSel.innerHTML = '<option value="">Seleccionar Equipo</option>';
                
                let teams = data.teams;
                if(lSel.value == "2014") {
                    if(!teams.find(t => t.name.includes("Levante"))) teams.push({name: "Levante UD"});
                    if(!teams.find(t => t.name.includes("Oviedo"))) teams.push({name: "Real Oviedo"});
                }

                teams.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
                    hSel.add(new Option(t.name, t.name));
                    aSel.add(new Option(t.name, t.name));
                });
            } catch (e) {
                hSel.innerHTML = '<option>Error de API</option>';
            }
        };

        btn.onclick = () => {
            if (!hSel.value || !aSel.value) return;
            const hP = cornerPower[hSel.value] || 4.5;
            const aP = cornerPower[aSel.value] || 4.5;
            const lambda = hP + aP; // Promedio esperado real

            document.getElementById('results').classList.remove('hidden');
            let html = '';
            
            [7.5, 8.5, 9.5, 10.5].forEach(line => {
                // Nueva lógica de probabilidad más estricta
                let factor = line === 7.5 ? 0.95 : (line === 8.5 ? 0.88 : (line === 9.5 ? 0.78 : 0.65));
                let prob = (lambda / (line + 0.5)) * factor * 100;
                prob = Math.min(94.5, Math.max(10, prob)).toFixed(1);
                
                const color = prob > 75 ? 'var(--green)' : (prob > 55 ? 'var(--yellow)' : 'var(--red)');
                html += `
                <div class="market-card">
                    <div class="line-val">+${line}</div>
                    <div class="pct-row"><span style="color:${color}">${prob}% PROBABILIDAD</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${prob}%; background:${color}"></div></div>
                </div>`;
            });
            document.getElementById('markets-container').innerHTML = html;
            
            // Sección de Veredicto Inferior
            const riskPos = Math.min(95, Math.max(5, (10.5 - lambda) * 20));
            document.getElementById('verdict-container').innerHTML = `
                <div class="verdict-card">
                    <div style="color:var(--red); font-weight:800; font-size:1.1rem; letter-spacing:1px;">VERDICTO MAESTRO</div>
                    <p style="margin:10px 0; font-size:0.95rem;">Promedio Esperado: <b>${lambda.toFixed(2)}</b> córners.</p>
                    <div style="font-size:0.8rem; color:var(--muted); margin-bottom:5px;">INDICADOR DE RIESGO</div>
                    <div class="risk-bar"><div class="risk-pointer" style="left:${100 - riskPos}%"></div></div>
                    <p style="margin-top:15px; color:${lambda > 10 ? 'var(--green)' : 'var(--yellow)'}; font-weight:bold;">
                        ${lambda > 10.5 ? '¡ALTA PROBABILIDAD DE OVER!' : (lambda > 8.5 ? 'CONFIANZA MEDIA - LÍNEA MODERADA' : 'CUIDADO: PARTIDO CERRADO')}
                    </p>
                </div>`;
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };
    </script>
</body>
</html>
