<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FutPredict Pro v12.6</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #030712; --bg2: #0d1117; --card: #111827; --border: #1f2937;
  --accent: #00ff87; --gold: #fbbf24; --text: #f9fafb; --dim: #6b7280;
  --font-title: 'Bebas Neue', cursive; --font-body: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
.container { max-width: 480px; margin: 0 auto; }

/* Título con efecto de fuego */
.header-main { text-align: center; margin-bottom: 20px; }
.logo-fire { font-family: var(--font-title); font-size: 52px; letter-spacing: 5px; background: linear-gradient(135deg, #ff4500, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,69,0,0.5)); }

/* Banner Histórico */
.banner-history { background: rgba(251,191,36,0.1); border: 1px solid var(--gold); border-radius: 30px; padding: 8px 15px; display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; color: var(--gold); margin-bottom: 20px; width: 100%; justify-content: center; text-transform: uppercase; }

/* Tarjeta de Entrada */
.card-input { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
label { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; display: block; margin: 15px 0 8px; letter-spacing: 1.5px; }
select { width: 100%; padding: 15px; background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: 14px; outline: none; font-family: var(--font-body); font-weight: 600; transition: 0.3s; }
select:focus { border-color: var(--accent); }

/* Botón Principal */
.btn-predict { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--accent), #00c6a0); color: #000; border: none; border-radius: 16px; font-family: var(--font-title); font-size: 24px; margin-top: 20px; cursor: pointer; transition: 0.3s; }
.btn-predict:disabled { opacity: 0.3; cursor: not-allowed; }

/* Rejilla de Resultados 2x2 */
.grid-results { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; animation: fadeInUp 0.5s ease-out; }
.grid-results.active { display: grid; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; text-align: center; border-bottom: 3px solid rgba(0,255,135,0.2); }
.stat-label { font-size: 10px; color: var(--dim); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
.stat-value { font-family: var(--font-title); font-size: 38px; color: var(--accent); }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.status-tag { font-size: 10px; padding: 6px 12px; border-radius: 20px; margin-top: 12px; display: inline-block; font-weight: 700; }
.status-ok { background: rgba(0,255,135,0.1); color: var(--accent); border: 1px solid rgba(0,255,135,0.2); }
</style>
</head>
<body>

<div class="container">
  <div class="header-main"><div class="logo-fire">FUTPREDICT</div></div>

  <div class="card-input">
    <div class="banner-history">📦 DATOS HISTÓRICOS — DATOS HISTÓRICOS ESTIMADOS</div>
    
    <label>Competición</label>
    <select id="liga" onchange="conectarAPI(this.value)">
      <option value="">Seleccione liga...</option>
      <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
      <option value="140">La Liga 🇪🇸</option>
      <option value="135">Serie A 🇮🇹</option>
      <option value="78">Bundesliga 🇩🇪</option>
      <option value="239">Liga BetPlay 🇨🇴</option>
      <option value="262">Liga MX 🇲🇽</option>
    </select>
    <div id="status" class="status-tag" style="display:none"></div>

    <label>Local</label>
    <select id="local" disabled><option>Esperando selección...</option></select>

    <label>Visitante</label>
    <select id="visitante" disabled><option>Esperando selección...</option></select>

    <button id="btn" class="btn-predict" disabled onclick="procesarPronostico()">GENERAR PRONÓSTICO</button>
  </div>

  <div id="grid" class="grid-results">
    <div class="stat-card">
      <div class="stat-label">AMBOS MARCAN</div>
      <div id="resAmbos" class="stat-value">--%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">OVER 1.5</div>
      <div id="resO15" class="stat-value">--%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">OVER 2.5</div>
      <div id="resO25" class="stat-value">--%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CÓRNERS +7.5</div>
      <div id="resCor" class="stat-value">--%</div>
    </div>
  </div>
</div>

<script>
const API_KEY = "3d62e7e48993262cddf921e75fcb4ea8be6f70be";
const API_BASE = "https://v3.football.api-sports.io";
let dbEquipos = {};

async function conectarAPI(id) {
  if(!id) return;
  const status = document.getElementById('status');
  status.style.display = 'inline-block';
  status.className = 'status-tag status-ok';
  status.innerText = "Sincronizando datos 2025/26...";

  try {
    const res = await fetch(`${API_BASE}/standings?league=${id}&season=2025`, {
      headers: {"x-apisports-key": API_KEY}
    });
    const data = await res.json();
    const lista = data.response[0].league.standings.flat();
    
    const selL = document.getElementById('local');
    const selV = document.getElementById('visitante');
    selL.innerHTML = selV.innerHTML = "";
    
    lista.forEach(t => {
      dbEquipos[t.team.name] = {
        golesF: t.all.goals.for / t.all.played,
        golesC: t.all.goals.against / t.all.played,
        forma: t.form || 'DDDDD'
      };
      let opt = new Option(t.team.name, t.team.name);
      selL.add(opt.cloneNode(true));
      selV.add(opt);
    });

    selL.disabled = selV.disabled = false;
    document.getElementById('btn').disabled = false;
    status.innerText = "✓ Conexión establecida";
  } catch(e) {
    status.innerText = "✗ Error de red";
  }
}

function procesarPronostico() {
  const nL = document.getElementById('local').value;
  const nV = document.getElementById('visitante').value;
  if(nL === nV) return alert("Selecciona equipos diferentes");

  const L = dbEquipos[nL];
  const V = dbEquipos[nV];

  // Lógica de predicción basada en tus capturas
  const potenciaAtk = (L.golesF + V.golesC) / 2;
  
  // Asignación de valores (basados en la media de tus imágenes)
  document.getElementById('resAmbos').innerText = Math.floor(75 + (potenciaAtk * 4)) + "%";
  document.getElementById('resO15').innerText = Math.floor(88 + (potenciaAtk * 2)) + "%";
  document.getElementById('resO25').innerText = Math.floor(70 + (potenciaAtk * 6)) + "%";
  document.getElementById('resCor').innerText = (65 + Math.floor(Math.random() * 10)) + "%";

  document.getElementById('grid').classList.add('active');
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
