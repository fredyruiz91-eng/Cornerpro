<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CornerIQ <span>Pro</span></h1>
            <p>Análisis Estadístico de Córners</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label>Liga:</label>
                <select id="league-select">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div class="teams-grid">
                <div class="input-group">
                    <label>Local:</label>
                    <select id="home-team" disabled></select>
                </div>
                <div class="input-group">
                    <label>Visitante:</label>
                    <select id="away-team" disabled></select>
                </div>
            </div>

            <button id="calculate-btn">CALCULAR</button>
        </div>

        <div id="results-container" class="results-area hidden">
            <div class="summary-bar">
                <span>Promedio: <strong id="total-c-val">--</strong></span>
            </div>
            <div id="markets-area"></div>
            <div id="verdict-area" class="verdict-card"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
