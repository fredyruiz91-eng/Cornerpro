        .header>*{position:relative;z-index:1;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:white;line-height:1;text-shadow:0 0 30px var(--accent-glow),0 2px 4px rgba(0,0,0,0.5);background:linear-gradient(135deg,#ffffff 0%,#ff8a95 50%,#ffffff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

        .card{background:var(--card);backdrop-filter:blur(24px);border-radius:20px;padding:22px;border:1px solid var(--border);margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:all 0.3s ease;}

        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--yellow),var(--green),transparent);opacity:0.7;}

        .api-status{display:flex;align-items:center;gap:10px;font-size:0.66rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);}

        .api-dot.live{background:var(--green);box-shadow:0 0 10px var(--green-glow),0 0 20px var(--green-glow);}

        label{display:block;margin:14px 0 5px;color:var(--muted);font-size:0.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

        select:disabled{opacity:0.4;cursor:not-allowed;}
        .team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

        .vs-divider{display:flex;align-items:center;justify-content:center;margin:6px 0;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;gap:12px;}

        .markets-label{display:block;margin:14px 0 8px;color:var(--muted);font-size:0.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

        .mkt-toggle{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--glass-bg);color:var(--muted);font-size:0.7rem;font-weight:700;cursor:pointer;transition:all 0.25s ease;letter-spacing:0.5px;backdrop-filter:blur(10px);}

        .calc-btn:active{transform:scale(0.97);}

        .form-row{display:flex;gap:3px;justify-content:center;margin-top:4px;}
        .form-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:700;backdrop-filter:blur(5px);}

        .form-dot.d{background:rgba(255,182,39,0.25);color:var(--yellow);box-shadow:0 0 6px rgba(255,182,39,0.2);}

        .result-boxes{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-top:16px;}
        .result-box{background:var(--glass-bg);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(15px);transition:all 0.3s ease;}

        .result-box.rb-center{border-color:rgba(255,182,39,0.3);background:rgba(255,182,39,0.05);min-width:80px;}
        .rb-label{font-size:0.62rem;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
        .rb-pct{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;line-height:1;}
        .section-header{display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
        .section-icon{font-size:1.1rem;}
        .section-title{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--text);}
        .section-lambda{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px;color:var(--muted);}

        .rc-label{font-size:0.62rem;color:var(--muted);font-weight:700;letter-spacing:1px;}
        .disclaimer{text-align:center;color:var(--muted);font-size:0.63rem;margin-top:20px;line-height:1.6;opacity:0.6;}
        .hidden{display:none;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .animate-in{animation:fadeUp 0.5s ease-out forwards;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
        .pulse{animation:pulse 2s ease-in-out infinite;}
    </style>
</head>

function normalizeTeamName(s) {
    return s.trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        // Quita prefijos/sufijos comunes que confunden
        .replace(/\b(fc|cf|sc|ac|as|ss|rc|rb|kv|krc|kaa|afc|rcd|ud|ca|oh|sv|vfl|vfb|fsv|tsg|rkc|pec|nec|ssc|acf|cd|og|aj|sl|ae|bv|sv|bayer|borussia|atletico|olympique|deportivo|real|club|sporting|sport)\b/gi, '')
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ').trim();
}

function tokenOverlap(a, b) {
    const tokA = new Set(a.split(' ').filter(t => t.length > 2));
    const tokB = new Set(b.split(' ').filter(t => t.length > 2));
    if (tokA.size === 0 || tokB.size === 0) return 0;
    let shared = 0;
    tokA.forEach(t => { if (tokB.has(t)) shared++; });
    return shared / Math.min(tokA.size, tokB.size);
}

function findTeamInAPI(offlineName, apiTeams) {
    const norm = normalizeTeamName;
    const targetNorm = norm(offlineName);
    const aliases = (TEAM_ALIASES[currentLeagueKey]?.[offlineName]) || [];

    // 1. Exact match (original name)
    let found = apiTeams.find(t => t.name.trim().toLowerCase() === offlineName.trim().toLowerCase());
    if (found) return found;

    // 2. Exact match normalizado
    found = apiTeams.find(t => norm(t.name) === targetNorm);
    if (found) return found;

    // 3. Alias exact match
    for (const alias of aliases) {
        found = apiTeams.find(t =>
            t.name.trim().toLowerCase() === alias.trim().toLowerCase() ||
            norm(t.name) === norm(alias)
        );
        if (found) return found;
    }

    // 4. Substring bidireccional (normalized)
    found = apiTeams.find(t => {
        const n = norm(t.name);
        return (n.length > 3 && targetNorm.length > 3) &&
               (n.includes(targetNorm) || targetNorm.includes(n));
    });
    if (found) return found;

    // 5. Alias substring bidireccional
    for (const alias of aliases) {
        const aliasNorm = norm(alias);
        found = apiTeams.find(t => {
            const n = norm(t.name);
            return (n.length > 3 && aliasNorm.length > 3) &&
                   (n.includes(aliasNorm) || aliasNorm.includes(n));
        });
        if (found) return found;
    }

    // 6. Token overlap ≥ 0.65 con el nombre original
    let bestScore = 0, bestTeam = null;
    apiTeams.forEach(t => {
        const score = tokenOverlap(targetNorm, norm(t.name));
        if (score > bestScore) { bestScore = score; bestTeam = t; }
    });
    if (bestScore >= 0.65) {
        console.log(`[FUZZY ✅] "${offlineName}" → "${bestTeam.name}" (score: ${bestScore.toFixed(2)})`);
        return bestTeam;
    }

    // 7. Token overlap ≥ 0.5 con aliases
    for (const alias of aliases) {
        const aliasNorm = norm(alias);
        let aliasScore = 0, aliasTeam = null;
        apiTeams.forEach(t => {
            const score = tokenOverlap(aliasNorm, norm(t.name));
            if (score > aliasScore) { aliasScore = score; aliasTeam = t; }
        });
        if (aliasScore >= 0.5 && aliasScore > bestScore) {
            console.log(`[ALIAS FUZZY ✅] "${offlineName}" via alias "${alias}" → "${aliasTeam.name}" (score: ${aliasScore.toFixed(2)})`);
            return aliasTeam;
        }
    }

    console.warn(`[MATCH ❌] Sin match para: "${offlineName}" (best: ${bestScore.toFixed(2)})`);
    return null;
}

function plattCalibrate(rawProb,marketType){const p=Math.max(0.001,Math.min(0.999,rawProb/100));const logit=Math.log(p/(1-p));const params=PLATT_PARAMS[marketType]||{A:0.93,B:-0.04};const calibP=1/(1+Math.exp(-(params.A*logit+params.B)));return Math.min(98,Math.max(2,calibP*100));}
function formMultiplier(form){if(!form||form.length===0)return 1.0;const score=form.reduce((acc,r)=>acc+(r==='w'?3:r==='d'?1:0),0);const adj=(score/(form.length*3)-0.38)*0.23;return Math.max(0.88,Math.min(1.12,1.0+adj));}
function uncertaintyBand(prob,nMatches){const p=prob/100,se=Math.sqrt(p*(1-p)/Math.max(5,nMatches));const low=Math.max(0,(p-1.282*se)*100),high=Math.min(100,(p+1.282*se)*100);return{low:low.toFixed(0),high:high.toFixed(0)};}
// ── MOTOR DE LAMBDAS ────────────────────────────────────────────────────────
// Calcula medias de corners por rol en la liga (para normalizar)
function getLeagueCornerMeans(ligaKey) {
    const liga = LIGAS[ligaKey];
    if (!liga) return { homeMean: 5.5, awayMean: 4.5 };
    const homeVals = liga.teams.map(t => CORNER_POWER[t]?.home).filter(v => v != null);
    const awayVals = liga.teams.map(t => CORNER_POWER[t]?.away).filter(v => v != null);
    if (homeVals.length < 2) return { homeMean: liga.cornersAvg * 0.55, awayMean: liga.cornersAvg * 0.45 };
    const homeMean = homeVals.reduce((a,b)=>a+b,0)/homeVals.length;
    const awayMean = awayVals.reduce((a,b)=>a+b,0)/awayVals.length;
    return { homeMean, awayMean };
}

// Ratio de fuerza de ataque relativa a la liga (1.0 = promedio)
function attackRatio(name, role, ligaKey) {
    const cp = CORNER_POWER[name];
    const { homeMean, awayMean } = getLeagueCornerMeans(ligaKey);
    if (!cp) return 1.0;
    const val = cp[role];
    const mean = role === 'home' ? homeMean : awayMean;
    // Suavizado: ratio con raíz cuadrada para no exagerar diferencias
    return Math.pow(val / mean, 0.55);
}

// lambdaH = leagueMean * atkRatioHome * (1/atkRatioAway)^0.4 * homeAdv
// Esto produce λ diferente por partido manteniendo el total ~goalsAvg
function computeLambdas(homeTeam, awayTeam, goalsAvg, homeAdv, ligaKey) {
    const leagueMean = goalsAvg / 2;
    const hAtk = attackRatio(homeTeam, 'home', ligaKey);
    const aAtk = attackRatio(awayTeam, 'away', ligaKey);
    // Defensa: proxy inverso del ataque (equipo fuerte ataca Y defiende mejor)
    const hDef = Math.pow(1/hAtk, 0.40); // mayor ataque → mejor defensa → menos goles en contra
    const aDef = Math.pow(1/aAtk, 0.40);
    const lH = leagueMean * hAtk * aDef * homeAdv;
    const lA = leagueMean * aAtk * hDef;
    return { home: Math.max(0.30, lH), away: Math.max(0.20, lA) };
}

// Versión con datos API (attack = xG/goals scored, defense = goals conceded)
function computeLambdasFromStats(homeGoalF, homeGC, awayGoalF, awayGC, goalsAvg, homeAdv) {
    const leagueMean = goalsAvg / 2;
    // Dixon-Coles estándar: λH = leagueMean * (homeAtk/mean) * (awayDef/mean) * homeAdv
    const lH = (homeGoalF / leagueMean) * (awayGC / leagueMean) * leagueMean * homeAdv;
    const lA = (awayGoalF / leagueMean) * (homeGC / leagueMean) * leagueMean;
    return { home: Math.max(0.30, lH), away: Math.max(0.20, lA) };
}

// Fallback corners (sin cambio)
function fallbackCorners(name, role, liga) {
    if (CORNER_POWER[name]?.[role]) return CORNER_POWER[name][role];
    const base = liga.cornersAvg / 2;
    return role === 'home' ? base * 1.10 : base * 0.90;
}

// Fallback goals HT usando attackRatio
function fallbackGoals1T(name, role, liga) {
    const ratio = attackRatio(name, role, currentLeagueKey || 'PL');
    const base = liga.goalsAvg / 2;
    const htPct = role === 'home' ? 0.44 : 0.40;
    return base * ratio * htPct;
}

async function bsdFetch(path,timeoutMs=API_TIMEOUT){const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),timeoutMs);try{const res=await fetch(`${BSD_BASE}${path}`,{headers:{'Authorization':`Token ${BSD_TOKEN}`},signal:controller.signal});clearTimeout(timeout);if(!res.ok)throw new Error(`BSD ${res.status}`);return res.json();}catch(e){clearTimeout(timeout);throw e;}}
async function bsdFetchAll(path,timeoutMs=API_TIMEOUT){let results=[],url=`${BSD_BASE}${path}`;let pageCount=0;while(url&&pageCount<5){try{const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),timeoutMs);const res=await fetch(url,{headers:{'Authorization':`Token ${BSD_TOKEN}`},signal:controller.signal});clearTimeout(timeout);if(!res.ok)break;const data=await res.json();results=results.concat(data.results||[]);url=data.next||null;pageCount++;if(results.length>=200)break;}catch(e){break;}}return results;}

async function calculateEloRatings(leagueId,seasonId){const cacheKey=`${leagueId}_${seasonId}`;if(eloRatings[cacheKey])return eloRatings[cacheKey];try{const events=await bsdFetchAll(`/events/?season=${seasonId}&league=${leagueId}&limit=500`);if(!events||events.length<10)throw new Error('Pocos eventos');events.sort((a,b)=>new Date(a.start_date||a.date)-new Date(b.start_date||b.date));const ratings={};const K=32;events.forEach(match=>{const home=match.home_team_obj?.name||match.home_team;const away=match.away_team_obj?.name||match.away_team;if(!home||!away)return;const homeScore=Number(match.home_score||0);const awayScore=Number(match.away_score||0);const status=(match.status||'').toUpperCase();if(!['FT','FINISHED','AET','PEN','FULL_TIME'].includes(status)&&!status.includes('FT'))return;if(!ratings[home])ratings[home]={elo:1500,matches:0};if(!ratings[away])ratings[away]={elo:1500,matches:0};const homeElo=ratings[home].elo;const awayElo=ratings[away].elo;const expectedHome=1/(1+Math.pow(10,(awayElo-homeElo)/400));let actualHome=homeScore>awayScore?1:homeScore===awayScore?0.5:0;ratings[home].elo=homeElo+K*(actualHome-expectedHome);ratings[away].elo=awayElo+K*((1-actualHome)-(1-expectedHome));ratings[home].matches++;ratings[away].matches++;});eloRatings[cacheKey]=ratings;return ratings;}catch(e){return{};}}

function extractMatchStats(match,role){const s=match.stats||match.statistics||{},ls=match.live_stats||{};let corners=null,goals1t=null,goalsFull=null,xG=null,goalsConceded=null;if(s[role]?.corner_kicks!=null)corners=s[role].corner_kicks;else if(ls[role]?.corner_kicks!=null)corners=ls[role].corner_kicks;else if(role==='home'&&match.home_corners!=null)corners=match.home_corners;else if(role==='away'&&match.away_corners!=null)corners=match.away_corners;if(role==='home'&&match.home_score_ht!=null)goals1t=match.home_score_ht;if(role==='away'&&match.away_score_ht!=null)goals1t=match.away_score_ht;if(role==='home'){if(match.home_score!=null)goalsFull=match.home_score;if(match.away_score!=null)goalsConceded=match.away_score;}if(role==='away'){if(match.away_score!=null)goalsFull=match.away_score;if(match.home_score!=null)goalsConceded=match.home_score;}if(s[role]?.expected_goals!=null)xG=s[role].expected_goals;else if(ls[role]?.expected_goals!=null)xG=ls[role].expected_goals;else if(role==='home'&&match.home_xg!=null)xG=match.home_xg;else if(role==='away'&&match.away_xg!=null)xG=match.away_xg;return{corners,goals1t,goalsFull,xG,goalsConceded};}
async function getTeamStats(teamId,teamName,role,seasonId){const key=`${teamId}_${seasonId}_${role}`;if(statsCache[key])return statsCache[key];try{let events=[];try{events=await bsdFetchAll(`/events/?team=${teamId}&season=${seasonId}&limit=300`);}catch(e){return null;}const finished=events.filter(m=>{const st=(m.status||'').toUpperCase();const ok=['FT','FINISHED','AET','PEN','FULL_TIME'].includes(st)||st.includes('FT');if(!ok)return false;return role==='home'?(m.home_team_obj?.id===teamId||m.home_team===teamName):(m.away_team_obj?.id===teamId||m.away_team===teamName);}).slice(-MATCHES_TO_USE);if(finished.length<3)return null;const weights=finished.map((_,i)=>Math.exp(0.15*i));let tC=0,wC=0,tG=0,wG=0,tGF=0,wGF=0,tGC=0,wGC=0,tXG=0,wXG=0;const form=[];finished.slice(-5).forEach(m=>{const hs=Number(m.home_score||0),as=Number(m.away_score||0);if(role==='home'){if(hs>as)form.push('w');else if(hs===as)form.push('d');else form.push('l');}else{if(as>hs)form.push('w');else if(as===hs)form.push('d');else form.push('l');}});finished.forEach((m,i)=>{const w=weights[i],stats=extractMatchStats(m,role);if(stats.corners!=null){tC+=Number(stats.corners)*w;wC+=w;}if(stats.goals1t!=null){tG+=Number(stats.goals1t)*w;wG+=w;}if(stats.goalsFull!=null){tGF+=Number(stats.goalsFull)*w;wGF+=w;}if(stats.goalsConceded!=null){tGC+=Number(stats.goalsConceded)*w;wGC+=w;}if(stats.xG!=null){tXG+=Number(stats.xG)*w;wXG+=w;}});const result={corners:wC>0?tC/wC:null,goals1t:wG>0?tG/wG:null,goalsFull:wGF>0?tGF/wGF:null,goalsConceded:wGC>0?tGC/wGC:null,xG:wXG>0?tXG/wXG:null,matches:finished.length,form,fromApi:true};statsCache[key]=result;return result;}catch{return null;}}
// Calcula el rango de corners de la liga para normalizar
function getLeagueCornerRange(ligaKey) {
    const liga = LIGAS[ligaKey];
    if (!liga) return { minV: 3.5, maxV: 7.5 };
    const allVals = liga.teams
        .map(t => CORNER_POWER[t])
        .filter(Boolean)
        .flatMap(v => [v.home, v.away]);
    if (allVals.length < 2) return { minV: liga.cornersAvg * 0.45, maxV: liga.cornersAvg * 0.75 };
    return { minV: Math.min(...allVals), maxV: Math.max(...allVals) };
}

// Fuerza relativa del equipo [0.70, 1.30] basada en corners (proxy de calidad)
function teamStrength(name, role, ligaKey) {
    const cp = CORNER_POWER[name];
    if (!cp) return role === 'home' ? 1.05 : 0.95;
    const val = cp[role];
    const { minV, maxV } = getLeagueCornerRange(ligaKey);
    const span = maxV - minV;
    if (span < 0.1) return role === 'home' ? 1.05 : 0.95;
    // Mapeo a [0.70, 1.30]
    return 0.70 + ((val - minV) / span) * 0.60;
}

function fallbackCorners(name, role, liga) {
    if (CORNER_POWER[name]?.[role]) return CORNER_POWER[name][role];
    const base = liga.cornersAvg / 2;
    return role === 'home' ? base * 1.10 : base * 0.90;
}

// CORREGIDO: usa teamStrength para diferenciar equipos en modo offline
function fallbackGoals(name, role, liga) {
    const leagueKey = currentLeagueKey || 'default';
    const str = teamStrength(name, role, leagueKey);
    const base = liga.goalsAvg / 2;
    const homeAdv = role === 'home' ? 1.08 : 1.0;
    return base * str * homeAdv;
}

function fallbackGoals1T(name, role, liga) {
    const leagueKey = currentLeagueKey || 'default';
    const str = teamStrength(name, role, leagueKey);
    const base = liga.goalsAvg / 2;
    const htRatio = role === 'home' ? 0.44 : 0.40;
    const homeAdv = role === 'home' ? 1.05 : 1.0;
    return base * str * homeAdv * htRatio;
}
function regressionBlend(teamVal,leagueMean,nMatches){const trust=Math.min(0.85,0.40+(nMatches/MATCHES_TO_USE)*0.45);return teamVal*trust+leagueMean*(1-trust);}
function poissonProb(lambda,k){let p=Math.exp(-lambda),term=p;for(let i=1;i<=k;i++){term*=lambda/i;p+=term;}return p;}
function poissonExact(lambda,k){let term=Math.exp(-lambda);for(let i=0;i<k;i++)term*=lambda/(i+1);return term;}
function poissonOver(lambda,threshold){return Math.min(98,Math.max(2,(1-poissonProb(lambda,Math.floor(threshold)))*100));}
function negBinExact(mu,r,k){const p=r/(r+mu);let logP=0;for(let i=0;i<k;i++)logP+=Math.log(r+i)-Math.log(i+1);logP+=r*Math.log(p)+k*Math.log(1-p);return Math.exp(logP);}
function negBinOver(mu,threshold,r=6.0){const k=Math.floor(threshold);let cdf=0;for(let i=0;i<=k;i++)cdf+=negBinExact(mu,r,i);return Math.min(98,Math.max(2,(1-cdf)*100));}
function dixonColesTau(x,y,lH,lA,rho){if(x===0&&y===0)return 1-lH*lA*rho;if(x===0&&y===1)return 1+lH*rho;if(x===1&&y===0)return 1+lA*rho;if(x===1&&y===1)return 1-rho;return 1;}
function calcResultProbs(lambdaH,lambdaA,leagueKey='default'){const rho=DIXON_COLES_RHO[leagueKey]||DIXON_COLES_RHO.default;let pH=0,pD=0,pA=0;for(let h=0;h<=10;h++)for(let a=0;a<=10;a++){let p=poissonExact(lambdaH,h)*poissonExact(lambdaA,a);if(h<=1&&a<=1)p*=dixonColesTau(h,a,lambdaH,lambdaA,rho);if(h>a)pH+=p;else if(h===a)pD+=p;else pA+=p;}const t=pH+pD+pA;return{home:+(pH/t*100).toFixed(1),draw:+(pD/t*100).toFixed(1),away:+(pA/t*100).toFixed(1)};}
function calcBTTS(lambdaH,lambdaA,leagueKey='default'){const rho=DIXON_COLES_RHO[leagueKey]||DIXON_COLES_RHO.default;const p00=poissonExact(lambdaH,0)*poissonExact(lambdaA,0)*dixonColesTau(0,0,lambdaH,lambdaA,rho);return Math.min(98,Math.max(2,(1-Math.exp(-lambdaH)-Math.exp(-lambdaA)+p00)*100));}
function buildRecommendation(markets){const thresholds={resultado:55,btts:58,goles:62,corners:67,ht:62};const minMargin={resultado:10,btts:10,goles:10,corners:8,ht:15};const reliability={corners:0.92,btts:0.88,goles:0.85,ht:0.82,resultado:0.78};const candidates=markets.filter(m=>m.prob>=(thresholds[m.type]||55)+(minMargin[m.type]||10)).map(m=>{const sameGroup=markets.filter(x=>x.type===m.type&&x!==m&&x.prob>=55);return{...m,score:m.prob*(reliability[m.type]||0.80)+sameGroup.length*1.5};}).sort((a,b)=>b.score-a.score);if(!candidates.length)return{top:null,second:null};return{top:{...candidates[0],diamond:candidates[0].prob>=80?'💎':candidates[0].prob>=72?'⭐':''},second:candidates[1]||null};}

function normStr(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function matchLeagueName(bsdLeagueName,ligaKey){
    const apiNorm=normStr(bsdLeagueName);
    const fps=LEAGUE_FINGERPRINTS[ligaKey]||[];
    const blockers=LEAGUE_BLOCKERS[ligaKey]||[];
    if(blockers.some(b=>apiNorm.includes(normStr(b))))return false;
    return fps.some(fp=>apiNorm.includes(normStr(fp)));
}

async function initBsdApi(){
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),12000);
    try{
        // Fetch ALL leagues (paginate up to 500)
        let allLeagues=[],url=BSD_BASE+'/leagues/?page_size=200',pageCount=0;
        while(url&&pageCount<5){
            const res=await fetch(url,{headers:{'Authorization':'Token '+BSD_TOKEN},signal:controller.signal});
            if(!res.ok)throw new Error('BSD '+res.status);
            const data=await res.json();
            allLeagues=allLeagues.concat(data.results||[]);
            url=data.next||null;
            pageCount++;
        }
        clearTimeout(timeoutId);

        // Log all available league names for debugging
        const active=allLeagues.filter(l=>!l.is_women&&l.current_season?.id);
        console.log('[BSD] Total active leagues:',active.length);
        active.forEach(l=>console.log(' -',JSON.stringify(l.name),'| season:',l.current_season?.id));

        // Match each liga
        active.forEach(l=>{
            for(const code of Object.keys(LIGAS)){
                if(!bsdLeagueMap[code]&&matchLeagueName(l.name,code)){
                    bsdLeagueMap[code]={bsdId:l.id,seasonId:l.current_season.id};
                    console.log('[LIGA ✅]',code,'→',l.name,'(season:',l.current_season.id+')');
                }
            }
        });

        // Log unmatched ligas
        Object.keys(LIGAS).forEach(code=>{
            if(!bsdLeagueMap[code]) console.warn('[LIGA ❌] Sin match:',code,LIGAS[code].name);
        });

        const mapped=Object.keys(bsdLeagueMap).length;
        const total=Object.keys(LIGAS).length;
        if(mapped>0){
            setApiStatus('live','🟢 BSD API — '+mapped+'/'+total+' ligas activas');
            apiAvailable=true;
            document.getElementById('engine-badge').textContent='🛰 BSD Live · '+mapped+'/'+total+' ligas · v2.1';
        } else {
            setApiStatus('error','🟡 Modo offline — sin conexión API');
        }
    }catch(e){
        clearTimeout(timeoutId);
        console.warn('[BSD] initBsdApi error:',e.message);
        setApiStatus('error','🟡 Modo offline — '+e.message.substring(0,30));
    }
}

    const lFull2=lambdaH+lambdaA;const allMkts=[];
    if(mkt.goles){allMkts.push({label:'GOLES OVER 1.5',prob:+plattCalibrate(poissonOver(lFull2,1.5),'goals_over15').toFixed(0),desc:'Alta prob. de partido con goles',type:'goles'});allMkts.push({label:'GOLES OVER 2.5',prob:+plattCalibrate(poissonOver(lFull2,2.5),'goals_over25').toFixed(0),desc:'3+ goles en el partido',type:'goles'});}
    if(mkt.ht){allMkts.push({label:'GOL HT OVER 0.5',prob:+plattCalibrate(poissonOver(lambdaGoal,0.5),'goals_ht05').toFixed(0),desc:'Al menos un gol antes del descanso',type:'ht'});allMkts.push({label:'GOL HT OVER 1.5',prob:+plattCalibrate(poissonOver(lambdaGoal,1.5),'goals_ht15').toFixed(0),desc:'2+ goles en el primer tiempo',type:'ht'});}
    if(mkt.btts){const bp=+plattCalibrate(calcBTTS(lambdaH,lambdaA,currentLeagueKey),'btts').toFixed(0);allMkts.push({label:'AMBOS MARCAN',prob:bp,desc:`${bp}% de prob. que ambos anoten`,type:'btts'});}
    if(mkt.corn){[7.5,8.5,9.5].forEach(line=>{allMkts.push({label:`CÓRNERS OVER ${line}`,prob:+plattCalibrate(negBinOver(lambdaCorn,line,negBinR),'corners').toFixed(0),desc:`Sobre ${line} córners`,type:'corners'});});}
    const rpRaw=calcResultProbs(lambdaH,lambdaA,currentLeagueKey);const rp={home:+plattCalibrate(rpRaw.home,'resultado').toFixed(1),draw:+plattCalibrate(rpRaw.draw,'resultado').toFixed(1),away:+plattCalibrate(rpRaw.away,'resultado').toFixed(1)};
    allMkts.push({label:'VICTORIA LOCAL',prob:rp.home,desc:`${home.split(' ').slice(-1)[0]} favorito`,type:'resultado'});allMkts.push({label:'VICTORIA VISITANTE',prob:rp.away,desc:`${away.split(' ').slice(-1)[0]} favorito`,type:'resultado'});
    const rec=buildRecommendation(allMkts);
    if(!rec.top){document.getElementById('recomendacion-container').innerHTML=`<div class="recomendacion animate-in" style="border-color:rgba(255,77,90,0.25);"><div class="rec-title" style="color:var(--accent);">RECOMENDACIÓN DE VALOR</div><div class="rec-main" style="color:var(--accent);font-size:1.2rem;">SIN APUESTA CLARA</div><div class="rec-sub">Ningún mercado supera el umbral de confianza mínimo</div></div>`;}
    else{const t=rec.top;const clsColor=t.prob>=70?'var(--green)':t.prob>=60?'var(--yellow)':'var(--accent)';const secondHtml=rec.second?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);"><div style="font-size:0.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">SEGUNDA OPCIÓN</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1px;color:var(--muted);">${rec.second.label} <span style="color:${colorFor(rec.second.prob)};margin-left:6px;">${rec.second.prob}%</span></div></div>`:'';document.getElementById('recomendacion-container').innerHTML=`<div class="recomendacion animate-in"><div class="rec-title">RECOMENDACIÓN DE VALOR</div><div class="rec-main" style="color:${clsColor};text-shadow:0 0 20px ${clsColor==='var(--green)'?'rgba(46,204,113,0.4)':clsColor==='var(--yellow)'?'rgba(255,182,39,0.4)':'rgba(255,77,90,0.4)'};">${t.label} ${t.diamond||''}</div><div class="rec-sub">${t.desc}</div><div class="rec-confidence"><span class="rc-pct" style="color:${clsColor}">${t.prob.toFixed(0)}%</span><span class="rc-label">MODELO CALIBRADO</span></div>${secondHtml}</div>`;}
}

function renderResultBoxes(lambdaH,lambdaA){const rpRaw=calcResultProbs(lambdaH,lambdaA,currentLeagueKey);const rp={home:+plattCalibrate(rpRaw.home,'resultado').toFixed(1),draw:+plattCalibrate(rpRaw.draw,'resultado').toFixed(1),away:+plattCalibrate(rpRaw.away,'resultado').toFixed(1)};const maxRP=Math.max(rp.home,rp.draw,rp.away);const rpColor=v=>v===maxRP?'var(--green)':v>=30?'var(--yellow)':'var(--accent)';const rpGlow=v=>v===maxRP?'rgba(46,204,113,0.3)':v>=30?'rgba(255,182,39,0.3)':'rgba(255,77,90,0.3)';return`<div class="result-boxes"><div class="result-box"><div class="rb-label">🏠 Local</div><div class="rb-pct" style="color:${rpColor(rp.home)};text-shadow:0 0 15px ${rpGlow(rp.home)};">${rp.home}%</div></div><div class="result-box rb-center"><div class="rb-label">🟡 Empate</div><div class="rb-pct" style="color:${rpColor(rp.draw)};text-shadow:0 0 15px ${rpGlow(rp.draw)};">${rp.draw}%</div></div><div class="result-box"><div class="rb-label">✈️ Visitante</div><div class="rb-pct" style="color:${rpColor(rp.away)};text-shadow:0 0 15px ${rpGlow(rp.away)};">${rp.away}%</div></div></div>`;}

function animateBars(){document.querySelectorAll('.bar-fill[data-target]').forEach(b=>{b.style.width=b.dataset.target+'%';});}
</script>
