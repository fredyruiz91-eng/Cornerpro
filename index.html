<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - API & Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942; --red: #ff4d4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; text-align: center; margin-bottom: 20px; color: white; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select, button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; cursor: pointer; font-size: 0.95rem; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; margin-top: 20px; color: white; transition: 0.3s; width: 100%; }
        .calc-btn:active { transform: scale(0.98); }
        .market-header { font-family: 'Bebas Neue', sans-serif; color: var(--accent); margin: 20px 0 8px; font-size: 1.2rem; border-left: 4px solid var(--accent); padding-left: 12px; }
        .market-row { padding: 14px 5px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid transparent; transition: 0.4s ease; }
        .market-name { font-weight: 500; font-size: 1rem; color: #fff; }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; }
        .status { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 12px; font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">CORNER<span>IQ</span> PRO</div>
    <div class="card">
        <label>Competición</label>
        <select id="league-select"></select>
        <label>Equipo Local</label>
        <select id="home-team"></select>
        <label>Equipo Visitante</label>
        <select id="away-team"></select>
        <button class="calc-btn" id="calc-btn">CALCULAR CON API</button>
        <div id="status" class="status">Iniciando sistema...</div>
    </div>
    <div id="results" class="hidden">
        <div class="card">
            <div class="market-header">Mercado de Córners</div>
            <div id="corners-markets"></div>
            <div class="market-header" style="margin-top: 30px;">Mercado de Goles</div>
            <div id="goals-markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

const LIGAS = {
    "PD": { name: "🇪🇸 La Liga", id: "PD", avgC: 9.3, avgG: 1.02 },
    "PL": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", id: "PL", avgC: 10.8, avgG: 1.25 },
    "V1": { name: "🇩🇪 Bundesliga", id: "V1", avgC: 10.1, avgG: 1.40 },
    "SA": { name: "🇮🇹 Serie A", id: "SA", avgC: 9.4, avgG: 1.05 },
    "DED": { name: "🇳🇱 Eredivisie", id: "DED", avgC: 10.2, avgG: 1.35 },
    "EEB": { name: "🇧🇷 Brasileirão", id: "EEB", avgC: 10.5, avgG: 0.98 },
    "CL": { name: "🇪🇺 Champions League", id: "CL", avgC: 9.8, avgG: 1.30 }
};

// Lógica de Poder de Equipo para diferenciar predicciones
function getTeamWeight(name) {
    const elite = ["Madrid", "City", "Bayern", "Liverpool", "Arsenal", "Inter", "Barcelona", "PSG", "PSV", "Feyenoord"];
    const fuerte = ["Atletico", "Milan", "Dortmund", "Ajax", "Sevilla", "Bayer", "Juventus", "Sporting"];
    if (elite.some(e => name.includes(e))) return 1.30;
    if (fuerte.some(f => name.includes(f))) return 1.10;
    return 0.85;
}

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const statusBox = document.getElementById('status');

window.onload = () => {
    Object.keys(LIGAS).forEach(code => lSel.add(new Option(LIGAS[code].name, code)));
    loadTeamsFromAPI();
};

lSel.onchange = loadTeamsFromAPI;

async function loadTeamsFromAPI() {
    const ligaCode = lSel.value;
    statusBox.innerText = "⚡ Conectando con API...";
    try {
        const res = await fetch(`${BASE_URL}competitions/${LIGAS[ligaCode].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        fillSelects(data.teams.map(t => t.name));
        statusBox.innerText = "🟢 Conexión API Exitosa (2026)";
    } catch (e) {
        statusBox.innerText = "🔴 Error API: Usando Base Local";
        // Aquí podrías añadir una lista local de respaldo si lo deseas
    }
}

function fillSelects(teams) {
    hSel.innerHTML = aSel.innerHTML = '';
    teams.sort().forEach(t => {
        hSel.add(new Option(t, t));
        aSel.add(new Option(t, t));
    });
}

function getTrafficColor(p) {
    if (p >= 70) return 'var(--green)';
    if (p >= 50) return 'var(--yellow)';
    return 'var(--red)';
}

document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    const wH = getTeamWeight(hSel.value);
    const wA = getTeamWeight(aSel.value);
    
    // Cálculo Dinámico: Ya no se repite el resultado en la misma liga
    const dAvgC = liga.avgC * ((wH + wA) / 2) * 1.05; // 1.05 es bono de ataque
    const dAvgG = liga.avgG * wH * (1.15); // Bono localía para goles HT

    document.getElementById('results').classList.remove('hidden');

    // Córners
    let cHtml = '';
    [7.5, 8.5, 9.5].forEach(line => {
        const p = poisson(dAvgC, Math.floor(line));
        const color = getTrafficColor(p);
        cHtml += `<div class="market-row" style="border-bottom-color: ${color}">
            <span class="market-name">+${line} Córners</span>
            <span class="pct" style="color:${color}">${p.toFixed(0)}%</span>
        </div>`;
    });
    document.getElementById('corners-markets').innerHTML = cHtml;

    // Goles HT
    const pG = poisson(dAvgG, 0);
    const colorG = getTrafficColor(pG);
    document.getElementById('goals-markets').innerHTML = `<div class="market-row" style="border-bottom-color: ${colorG}">
        <span class="market-name">+0.5 Goles HT (1er T)</span>
        <span class="pct" style="color:${colorG}">${pG.toFixed(0)}%</span>
    </div>`;
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    let res = (1 - cdf) * 100;
    return Math.min(96, Math.max(4, res)); 
}
</script>
</body>
</html>
