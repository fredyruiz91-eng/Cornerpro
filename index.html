<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Fix Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; text-align: center; margin-bottom: 20px; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; cursor: pointer; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; margin-top: 20px; }
        .market-card { background: var(--card2); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--green); }
        .status { font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Corner<span>IQ</span> Pro</div>

    <div class="card">
        <label>Liga</label>
        <select id="league-select"></select>

        <label>Local</label>
        <select id="home-team"></select>

        <label>Visitante</label>
        <select id="away-team"></select>

        <button class="calc-btn" id="calc-btn">CALCULAR</button>
        <div id="status" class="status">Cargando sistema...</div>
    </div>

    <div id="results" class="hidden">
        <div class="card">
            <h3 style="font-family: 'Bebas Neue'; color: var(--accent);">Resultados</h3>
            <div id="markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

// LIGAS CON LOS IDs DE TU IMAGEN
const LIGAS = {
    "PD":  { name: "🇪🇸 La Liga", id: "PD", avgC: 9.5, avgG: 1.05, teams: ["Real Madrid", "FC Barcelona", "Atlético Madrid", "Levante UD", "Real Oviedo", "Sevilla FC", "Valencia CF", "Villarreal CF"] },
    "PL":  { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", id: "PL", avgC: 10.1, avgG: 1.15, teams: ["Man City", "Arsenal", "Liverpool", "Man United", "Chelsea", "Tottenham"] },
    "V1":  { name: "🇩🇪 Bundesliga", id: "V1", avgC: 9.8, avgG: 1.35, teams: ["Bayern München", "Dortmund", "Leverkusen", "RB Leipzig"] },
    "SA":  { name: "🇮🇹 Serie A", id: "SA", avgC: 9.0, avgG: 1.0, teams: ["Inter", "Milan", "Juventus", "Napoli", "Roma"] },
    "EEB": { name: "🇧🇷 Brasileirão", id: "EEB", avgC: 9.4, avgG: 0.95, teams: ["Flamengo", "Palmeiras", "Botafogo", "Sao Paulo"] },
    "CL":  { name: "🇪🇺 Champions League", id: "CL", avgC: 9.8, avgG: 1.25, teams: ["Real Madrid", "Man City", "Bayern", "PSG"] }
};

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const status = document.getElementById('status');

// 1. Iniciar App
window.onload = () => {
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
    loadTeams();
};

// 2. Cargar equipos (API con caída a Local)
async function loadTeams() {
    const code = lSel.value;
    status.innerText = "Conectando con API...";
    
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });

        if (!response.ok) throw new Error("Acceso denegado");

        const data = await response.json();
        renderTeams(data.teams.map(t => t.name));
        status.innerText = "Datos actualizados vía API";

    } catch (e) {
        console.warn("Usando datos de respaldo para " + code);
        renderTeams(LIGAS[code].teams);
        status.innerText = "Modo Local (API en espera o bloqueada)";
    }
}

function renderTeams(teamList) {
    hSel.innerHTML = aSel.innerHTML = '';
    teamList.sort().forEach(name => {
        hSel.add(new Option(name, name));
        aSel.add(new Option(name, name));
    });
}

lSel.onchange = loadTeams;

// 3. Cálculo
document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    const p85 = poisson(liga.avgC, 8);
    const pHT = poisson(liga.avgG, 0);

    document.getElementById('results').classList.remove('hidden');
    document.getElementById('markets').innerHTML = `
        <div class="market-card"><span>+8.5 CÓRNERS</span><span class="pct">${p85.toFixed(0)}%</span></div>
        <div class="market-card"><span>+0.5 GOLES HT</span><span class="pct">${pHT.toFixed(0)}%</span></div>
    `;
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
