<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Predictor Maestro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --red: #ef4444; --yellow: #f59e0b; --green: #4ade80; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 5px; color: white; }
        h1 span { color: var(--red); }
        label { display: block; margin: 12px 0 5px; color: var(--muted); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; font-size: 1rem; margin-bottom: 10px; }
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .market-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .line-val { font-size: 2rem; font-weight: 800; color: var(--yellow); margin: 5px 0; }
        .pct-row { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; }
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .verdict-card { background: #111827; border-radius: 16px; padding: 20px; border: 1px solid #374151; margin-top: 20px; text-align: center; border-left: 4px solid var(--red); }
        .risk-bar { height: 6px; background: linear-gradient(90deg, var(--green), var(--yellow), var(--red)); border-radius: 3px; margin: 20px 0; position: relative; }
        .risk-pointer { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: -4px; transform: translateX(-50%); box-shadow: 0 0 10px white; transition: 0.8s ease-out; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CornerIQ <span>Pro</span></h1>
        <div class="card">
            <label>Liga (Competencia)</label>
            <select id="league-select"></select>
            <label>Equipo Local</label>
            <select id="home-team" disabled><option value="">Selecciona liga</option></select>
            <label>Equipo Visitante</label>
            <select id="away-team" disabled><option value="">Selecciona liga</option></select>
            <button id="calc-btn">Calcular Probabilidades</button>
        </div>
        <div id="results" class="hidden">
            <div id="markets-container"></div>
            <div id="verdict-container"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c'; 

        // Listado completo de ligas solicitado
        const LIGAS = {
            "WC": { name: "FIFA World Cup", teams: ["Argentina", "Francia", "Brasil", "España"] },
            "CL": { name: "UEFA Champions League", teams: ["Real Madrid CF", "Manchester City FC", "FC Bayern München"] },
            "BL1": { name: "Bundesliga (Alemania)", teams: ["Bayer Leverkusen", "Bayern München", "Dortmund"] },
            "DED": { name: "Eredivisie (Países Bajos)", teams: ["PSV", "Feyenoord", "Ajax"] },
            "BSA": { name: "Campeonato Brasileiro Série A", teams: ["Flamengo", "Palmeiras", "Botafogo"] },
            "PD": { name: "Primera Division (España)", teams: ["Real Madrid CF", "FC Barcelona", "Levante UD", "Real Oviedo"] },
            "FL1": { name: "Ligue 1 (Francia)", teams: ["PSG", "Monaco", "Marseille"] },
            "ELC": { name: "Championship (Inglaterra)", teams: ["Leeds United", "Leicester City"] },
            "PPL": { name: "Primeira Liga (Portugal)", teams: ["Sporting CP", "Benfica", "FC Porto"] },
            "EC": { name: "European Championship", teams: ["España", "Inglaterra", "Francia"] },
            "SA": { name: "Serie A (Italia)", teams: ["Inter Milano", "AC Milan", "Juventus FC"] },
            "PL": { name: "Premier League (Inglaterra)", teams: ["Manchester City FC", "Liverpool FC", "Arsenal FC"] }
        };

        const cornerPower = {
            "Real Madrid CF": 6.2, "FC Barcelona": 5.9, "Levante UD": 5.3, "Real Oviedo": 4.9,
            "Manchester City FC": 7.4, "Liverpool FC": 6.9, "Arsenal FC": 6.4, "PSG": 6.1
        };

        const lSel = document.getElementById('league-select');
        const hSel = document.getElementById('home-team');
        const aSel = document.getElementById('away-team');
        const btn = document.getElementById('calc-btn');

        window.onload = () => {
            lSel.innerHTML = '<option value="">-- Seleccionar Liga --</option>';
            for (let code in LIGAS) {
                lSel.add(new Option(LIGAS[code].name, code));
            }
        };

        lSel.onchange = async () => {
            const code = lSel.value;
            if (!code) return;
            hSel.innerHTML = aSel.innerHTML = '<option>Cargando equipos...</option>';
            
            try {
                const res = await fetch(`https://api.football-data.org/v4/competitions/${code}/teams`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                let teams = data.teams.map(t => t.name);
                
                // Inyección de equipos promocionados/faltantes en España
                if(code === "PD") {
                    if(!teams.includes("Levante UD")) teams.push("Levante UD");
                    if(!teams.includes("Real Oviedo")) teams.push("Real Oviedo");
                }
                llenarSelects(teams);
            } catch (e) {
                llenarSelects(LIGAS[code].teams);
            }
            hSel.disabled = aSel.disabled = false;
        };

        function llenarSelects(teams) {
            hSel.innerHTML = aSel.innerHTML = '<option value="">Seleccionar Equipo</option>';
            teams.sort().forEach(name => {
                hSel.add(new Option(name, name));
                aSel.add(new Option(name, name));
            });
        }

        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }

        function getPoisson(lambda, k) {
            let prob = 0;
            for (let i = 0; i <= Math.floor(k); i++) {
                prob += (Math.pow(lambda, i) * Math.exp(-lambda)) / factorial(i);
            }
            return (1 - prob) * 100;
        }

        btn.onclick = () => {
            if (!hSel.value || !aSel.value) return;
            const lambda = (cornerPower[hSel.value] || 4.7) + (cornerPower[aSel.value] || 4.5);

            document.getElementById('results').classList.remove('hidden');
            let html = '';
            
            [7.5, 8.5, 9.5, 10.5].forEach(line => {
                let prob = getPoisson(lambda, line);
                prob = Math.min(98, Math.max(5, prob)).toFixed(1);
                const color = prob > 70 ? 'var(--green)' : (prob > 45 ? 'var(--yellow)' : 'var(--red)');
                html += `
                <div class="market-card">
                    <div class="line-val">+${line}</div>
                    <div class="pct-row"><span style="color:${color}">${prob}% PROBABILIDAD</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${prob}%; background:${color}"></div></div>
                </div>`;
            });
            document.getElementById('markets-container').innerHTML = html;

            const risk = Math.min(95, Math.max(5, (11 - lambda) * 22));
            document.getElementById('verdict-container').innerHTML = `
                <div class="verdict-card">
                    <div style="color:var(--red); font-weight:800; font-size:1.1rem;">VERDICTO FINAL</div>
                    <p>Promedio Esperado: <b style="color:white; font-size:1.4rem;">${lambda.toFixed(2)}</b></p>
                    <div class="risk-bar"><div class="risk-pointer" style="left:${risk}%"></div></div>
                    <p style="font-weight:bold; margin-top:10px; color:${lambda > 10 ? 'var(--green)' : 'var(--yellow)'}">
                        ${lambda > 10.5 ? '¡ALTA PROBABILIDAD DE OVER!' : 'CONFIANZA MODERADA'}
                    </p>
                </div>`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };
    </script>
</body>
</html>
