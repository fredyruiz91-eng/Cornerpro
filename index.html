<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - API Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .header { text-align: center; padding-bottom: 20px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; color: var(--muted); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(230,57,70,0.3); }
        .market-card { background: var(--card2); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }
        .hidden { display: none; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><div class="logo">Corner<span>IQ</span> API</div></div>

    <div class="card">
        <label>COMPETICIÓN (API LIVE)</label>
        <select id="league-select"></select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
            <div><label>LOCAL</label><select id="home-team"></select></div>
            <div><label>VISITANTE</label><select id="away-team"></select></div>
        </div>

        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
    </div>

    <div id="results" class="hidden">
        <div class="card" id="loading" style="text-align: center;"><div class="spinner"></div>Conectando con la API...</div>
        <div id="output" class="hidden">
            <h3 style="font-family: 'Bebas Neue'; color: var(--accent); margin-bottom: 10px;">Análisis de Probabilidades</h3>
            <div id="markets"></div>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN API
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

// Las 12 Ligas con sus IDs oficiales para la API
const LIGAS = {
    "PL":  { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", id: "PL", avgC: 10.1, avgG: 1.15 },
    "CL":  { name: "🇪🇺 Champions League", id: "CL", avgC: 9.8, avgG: 1.25 },
    "BL1": { name: "🇩🇪 Bundesliga", id: "BL1", avgC: 9.8, avgG: 1.35 },
    "PD":  { name: "🇪🇸 La Liga", id: "PD", avgC: 9.5, avgG: 1.05 },
    "SA":  { name: "🇮🇹 Serie A", id: "SA", avgC: 9.0, avgG: 1.0 },
    "FL1": { name: "🇫🇷 Ligue 1", id: "FL1", avgC: 9.3, avgG: 1.1 },
    "DED": { name: "🇳🇱 Eredivisie", id: "DED", avgC: 9.6, avgG: 1.3 },
    "PPL": { name: "🇵🇹 Primeira Liga", id: "PPL", avgC: 9.1, avgG: 1.0 },
    "BSA": { name: "🇧🇷 Brasileirão Serie A", id: "BSA", avgC: 9.4, avgG: 0.95 },
    "ELC": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship", id: "ELC", avgC: 9.7, avgG: 1.1 },
    "WC":  { name: "🌍 FIFA World Cup", id: "WC", avgC: 9.2, avgG: 1.0 },
    
};

function poisson(lambda, k) {
    let cdf = 0, term = Math.exp(-lambda);
    for (let i = 0; i <= k; i++) { cdf += term; term *= lambda / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const btn = document.getElementById('calc-btn');

// Inicializar lista de ligas
window.onload = () => {
    for (let code in LIGAS) {
        lSel.add(new Option(LIGAS[code].name, code));
    }
    loadTeams();
};

// Cargar equipos vía API
async function loadTeams() {
    const code = lSel.value;
    hSel.innerHTML = aSel.innerHTML = '<option>Cargando...</option>';
    
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        const data = await response.json();
        
        hSel.innerHTML = aSel.innerHTML = '';
        data.teams.sort((a, b) => a.name.localeCompare(b.name)).forEach(team => {
            hSel.add(new Option(team.name, team.id));
            aSel.add(new Option(team.name, team.id));
        });

        // Forzar Levante y Oviedo en España por si la API no los trae (Segunda División)
        if(code === 'PD') {
            hSel.add(new Option("Levante UD", "levante"));
            aSel.add(new Option("Real Oviedo", "oviedo"));
        }
    } catch (e) {
        hSel.innerHTML = '<option>Error API</option>';
        console.error("Error cargando equipos:", e);
    }
}

lSel.addEventListener('change', loadTeams);

btn.onclick = () => {
    const ligaData = LIGAS[lSel.value];
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('output').classList.add('hidden');

    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('output').classList.remove('hidden');

        // Cálculo basado en promedios de la liga seleccionada
        const lCorners = ligaData.avgC;
        const lGoals = ligaData.avgG;

        const p85 = poisson(lCorners, 8);
        const p95 = poisson(lCorners, 9);
        const pHT = poisson(lGoals, 0);

        document.getElementById('markets').innerHTML = `
            <div class="market-card">
                <span>+8.5 CÓRNERS</span>
                <span class="pct" style="color:${p85 > 60 ? 'var(--green)' : 'var(--yellow)'}">${p85.toFixed(0)}%</span>
            </div>
            <div class="market-card">
                <span>+9.5 CÓRNERS</span>
                <span class="pct" style="color:${p95 > 50 ? 'var(--green)' : 'var(--yellow)'}">${p95.toFixed(0)}%</span>
            </div>
            <div class="market-card">
                <span>+0.5 GOLES HT</span>
                <span class="pct" style="color:${pHT > 65 ? 'var(--green)' : 'var(--yellow)'}">${pHT.toFixed(0)}%</span>
            </div>
        `;
    }, 800);
};
</script>
</body>
</html>
