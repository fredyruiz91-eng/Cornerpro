<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
           --bg:#08090d; --card:#10131a; --card2:#161b26; --border:#1e2535;
           --text:#e8eaf0; --muted:#5a6480; --accent:#e63946;
           --yellow:#f4b942; --green:#3dd68c; --blue:#2563eb; --purple:#8b5cf6;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:20px 15px;}
        .container{width:100%;max-width:440px;margin:0 auto;}
        .header{text-align:center;padding:24px 0 18px;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:3px;color:white;line-height:1;}
        .logo span{color:var(--accent);}
        .card{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border);margin-bottom:12px;}
        .api-status{display:flex;align-items:center;gap:8px;font-size:0.66rem;font-weight:700;margin-bottom:14px;}
        .api-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
        .api-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
        .api-dot.error{background:var(--yellow);}
        label{display:block;margin:12px 0 5px;color:var(--muted);font-size:0.66rem;font-weight:700;text-transform:uppercase;}
        select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:white;}
        .calc-btn{width:100%;padding:15px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;margin-top:20px;cursor:pointer;}
        #output{margin-top:20px; animation: fadeIn 0.5s;}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        .res-card{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;text-align:center;}
        .val{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--green);}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Corner<span>IQ</span> Pro</div>
    </div>

    <div class="card">
        <div class="api-status">
            <div class="api-dot" id="api-dot"></div>
            <span id="api-text">CONECTANDO...</span>
        </div>
        
        <label>Liga</label>
        <select id="league-select"><option value="">Cargando...</option></select>
        
        <label>Local</label>
        <select id="home-team" disabled><option>Selecciona liga</option></select>
        
        <label>Visitante</label>
        <select id="away-team" disabled><option>Selecciona liga</option></select>

        <button class="calc-btn" onclick="calcular()">CALCULAR PROBABILIDADES</button>
    </div>

    <div id="output"></div>
</div>

<script>
const LIGAS_OFFLINE = {
    "PL": {name:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", avg:10.1, teams:["Arsenal FC","Manchester City FC","Liverpool FC","Chelsea FC","Aston Villa FC","Tottenham Hotspur FC","Newcastle United FC","Manchester United FC","Brighton & Hove Albion FC","West Ham United FC","Fulham FC","Brentford FC","AFC Bournemouth","Crystal Palace FC","Everton FC","Wolverhampton Wanderers FC","Nottingham Forest FC","Leicester City FC","Ipswich Town FC","Southampton FC"]},
    "PD": {name:"🇪🇸 La Liga", avg:9.5, teams:["Real Madrid CF","FC Barcelona","Atlético de Madrid","Girona FC","Real Sociedad","Athletic Club","Real Betis","Valencia CF","Sevilla FC","Villarreal CF","CA Osasuna","Getafe CF","RC Celta de Vigo","RCD Mallorca","Rayo Vallecano","UD Las Palmas","Deportivo Alavés","CD Leganés","Real Valladolid CF","RCD Espanyol de Barcelona"]},
    "SA": {name:"🇮🇹 Serie A", avg:9.0, teams:["Inter Milano","AC Milan","Juventus FC","Atalanta BC","AS Roma","SS Lazio","SSC Napoli","ACF Fiorentina","Torino FC","Bologna FC 1909","Genoa CFC","AC Monza","Hellas Verona FC","US Lecce","Udinese Calcio","Cagliari Calcio","Empoli FC","Parma Calcio 1913","Como 1907","Venezia FC"]},
    "BL1": {name:"🇩🇪 Bundesliga", avg:9.8, teams:["FC Bayern München","Bayer 04 Leverkusen","Borussia Dortmund","RB Leipzig","VfB Stuttgart","Eintracht Frankfurt","SC Freiburg","TSG Hoffenheim","SV Werder Bremen","1. FC Heidenheim 1846","FC Augsburg","VfL Wolfsburg","1. FSV Mainz 05","Borussia Mönchengladbach","1. FC Union Berlin","VfL Bochum 1848","FC St. Pauli","Holstein Kiel"]},
    "FL1": {name:"🇫🇷 Ligue 1", avg:9.3, teams:["Paris Saint-Germain","AS Monaco FC","Lille OSC","OGC Nice","Olympique Lyonnais","RC Lens","Olympique de Marseille","Stade Reims","Stade Rennais FC","Toulouse FC","Montpellier HSC","RC Strasbourg","Le Havre AC","FC Nantes","Angers SCO","AJ Auxerre","AS Saint-Étienne"]},
    "DED": {name:"🇳🇱 Eredivisie", avg:9.6, teams:["PSV Eindhoven","Feyenoord","Ajax","AZ Alkmaar","FC Twente","FC Utrecht","Sparta Rotterdam","Go Ahead Eagles","NEC Nijmegen","Fortuna Sittard","sc Heerenveen","PEC Zwolle","Almere City FC","Heracles Almelo","RKC Waalwijk","Willem II","NAC Breda","FC Groningen"]},
    "JPL": {name:"🇧🇪 Jupiler Pro League", avg:9.4, teams:["Club Brugge","Anderlecht","Antwerp","Genk","Gent","Union SG","Cercle Brugge","Mechelen","Standard Liège","Westerlo","OH Leuven","Sint-Truiden","Charleroi","Kortrijk","Beerschot","Dender"]},
    "ELC": {name:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship", avg:9.7, teams:["Leeds United","Burnley FC","Sheffield United","Sunderland AFC","West Bromwich Albion","Middlesbrough FC","Norwich City","Coventry City","Hull City","Watford FC","Swansea City","Preston North End","Bristol City","Millwall FC","Blackburn Rovers","QPR","Stoke City","Sheffield Wednesday","Plymouth Argyle","Luton Town","Derby County","Oxford United","Portsmouth FC","Cardiff City"]},
    "BSA": {name:"🇧🇷 Brasileirão", avg:9.4, teams:["Palmeiras","Flamengo","Botafogo","Atlético Mineiro","São Paulo","Internacional","Fluminense","Grêmio","Cruzeiro","Fortaleza","Red Bull Bragantino","Athletico Paranaense","Vasco da Gama","Corinthians","Bahia","Cuiabá","Vitória","Juventude","Criciúma","Atlético Goianiense"]},
    "MXL": {name:"🇲🇽 Liga MX", avg:8.5, teams:["América","Cruz Azul","Tigres UANL","Monterrey","Guadalajara","Toluca FC","Pumas UNAM","Pachuca","León","Santos Laguna","Atlas FC","Necaxa","Tijuana","Atlético San Luis","Juárez","Mazatlán FC","Puebla FC","Querétaro FC"]},
    "MLS": {name:"🇺🇸 MLS", avg:9.0, teams:["Inter Miami CF","Columbus Crew","LAFC","LA Galaxy","FC Cincinnati","Real Salt Lake","Seattle Sounders","New York City FC","New York Red Bulls","Orlando City SC","Charlotte FC","Houston Dynamo","Minnesota United","Portland Timbers","Colorado Rapids","Vancouver Whitecaps","Philadelphia Union","Atlanta United","Austin FC","FC Dallas","Nashville SC","St. Louis City","Chicago Fire","CF Montréal","Toronto FC","D.C. United","New England Revolution","Sporting KC","San Jose Earthquakes"]}
};

// FACTORES DE POTENCIA DE CORNERS (Simplificado para la lógica)
const POWER = {
    "Manchester City FC": 7.5, "Liverpool FC": 7.2, "Arsenal FC": 6.8, "Real Madrid CF": 6.5, "FC Barcelona": 6.3, "FC Bayern München": 7.0, "Paris Saint-Germain": 6.4, "Inter Milano": 6.0, "Palmeiras": 6.1, "América": 5.8
};

function init() {
    const ls = document.getElementById('league-select');
    const apiDot = document.getElementById('api-dot');
    const apiText = document.getElementById('api-text');

    // Simulación de fallo de API para activar Modo Local inmediatamente
    setTimeout(() => {
        apiDot.classList.add('error');
        apiText.innerText = "MODO LOCAL ACTIVO";
        ls.innerHTML = '<option value="">Selecciona Liga</option>';
        for(let id in LIGAS_OFFLINE) {
            let opt = document.createElement('option');
            opt.value = id;
            opt.innerText = LIGAS_OFFLINE[id].name;
            ls.appendChild(opt);
        }
    }, 1000);
}

document.getElementById('league-select').onchange = function() {
    const id = this.value;
    const h = document.getElementById('home-team');
    const a = document.getElementById('away-team');
    if(!id) return;
    h.disabled = false; a.disabled = false;
    h.innerHTML = ""; a.innerHTML = "";
    LIGAS_OFFLINE[id].teams.sort().forEach(t => {
        h.add(new Option(t, t));
        a.add(new Option(t, t));
    });
};

function poisson(k, lambda) {
    return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
}

function factorial(n) {
    if (n === 0) return 1;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
}

function calcular() {
    const ligaId = document.getElementById('league-select').value;
    const home = document.getElementById('home-team').value;
    const away = document.getElementById('away-team').value;
    const out = document.getElementById('output');

    if(!ligaId) return alert("Selecciona una liga");

    // LÓGICA DE CÁLCULO
    const ligaAvg = LIGAS_OFFLINE[ligaId].avg;
    const pHome = POWER[home] || (ligaAvg / 2);
    const pAway = POWER[away] || (ligaAvg / 2.2);
    const lambdaTotal = pHome + pAway;

    // Calcular Probabilidades Over
    let probOver85 = 0;
    for(let i=0; i<=8; i++) probOver85 += poisson(i, lambdaTotal);
    probOver85 = (1 - probOver85) * 100;

    let probOver95 = 0;
    for(let i=0; i<=9; i++) probOver95 += poisson(i, lambdaTotal);
    probOver95 = (1 - probOver95) * 100;

    out.innerHTML = `
        <div class="res-card">
            <div style="color:var(--muted); font-size:0.7rem;">PROMEDIO ESTIMADO</div>
            <div class="val">${lambdaTotal.toFixed(1)} CORNERS</div>
        </div>
        <div class="res-card">
            <div style="color:var(--muted); font-size:0.7rem;">OVER 8.5 CORNERS</div>
            <div class="val" style="color:var(--yellow)">${probOver85.toFixed(1)}%</div>
        </div>
        <div class="res-card">
            <div style="color:var(--muted); font-size:0.7rem;">OVER 9.5 CORNERS</div>
            <div class="val">${probOver95.toFixed(1)}%</div>
        </div>
        <div class="res-card" style="background:rgba(61,214,140,0.1); border-color:var(--green)">
            <div style="font-weight:bold; color:var(--green)">VERDICTO</div>
            <div style="font-size:1.2rem; margin-top:5px;">${probOver85 > 75 ? 'ALTA PROBABILIDAD' : 'RIESGO MEDIO'}</div>
        </div>
    `;
}

window.onload = init;
</script>

</body>
</html>
