<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data.Predict · PRO v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --card: rgba(16, 20, 32, 0.55);
            --card2: rgba(22, 27, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f8;
            --muted: #7b8aa6;
            --accent: #ff4d5a;
            --accent-glow: rgba(255, 77, 90, 0.5);
            --yellow: #ffb627;
            --yellow-glow: rgba(255, 182, 39, 0.5);
            --green: #2ecc71;
            --green-glow: rgba(46, 204, 113, 0.5);
            --blue: #4dabf7;
            --purple: #9775fa;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; padding: 20px 15px 60px;
            position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(255, 77, 90, 0.12) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(46, 204, 113, 0.08) 0%, transparent 50%),
            radial-gradient(circle at 50% 10%, rgba(77, 171, 247, 0.06) 0%, transparent 60%);
            z-index: 0; animation: bgPulse 12s ease-in-out infinite alternate;
        }
        @keyframes bgPulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
        .particles {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
            radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3), transparent),
            radial-gradient(1.5px 1.5px at 70% 30%, rgba(255,255,255,0.5), transparent),
            radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3), transparent),
            radial-gradient(2px 2px at 15% 85%, rgba(255,182,39,0.4), transparent),
            radial-gradient(1px 1px at 55% 45%, rgba(46,204,113,0.4), transparent);
            background-size: 200% 200%; animation: particleDrift 30s linear infinite;
        }
        @keyframes particleDrift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 900px) {
            .container {
                max-width: 780px;
            }
            .logo {
                font-size: 3.8rem;
            }
            .card, .header, .bets-section {
                padding: 26px;
            }
            .market-card {
                grid-template-columns: 60px 1fr 70px 90px;
            }
        }

        .header {
            background: rgba(20, 25, 40, 0.5); backdrop-filter: blur(25px); border-radius: var(--radius-lg);
            padding: 28px 20px 20px; margin-bottom: 8px; border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .header::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,77,90,0.3), transparent, rgba(46,204,113,0.3), transparent);
            animation: rotateGlow 12s linear infinite; opacity: 0.4;
        }
        @keyframes rotateGlow { to { transform: rotate(360deg); } }
        .header>* { position: relative; z-index: 1; }
        .logo {
            font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 5px;
            color: white; line-height: 1; text-shadow: 0 0 30px var(--accent-glow);
            background: linear-gradient(135deg, #ffffff 0%, #ff8a95 50%, #ffffff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block; padding: 4px 14px; background: rgba(255, 77, 90, 0.1);
            border: 1px solid rgba(255, 77, 90, 0.3); border-radius: 20px; font-size: 0.65rem;
            font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase;
            backdrop-filter: blur(10px); margin: 0 4px;
        }
        .badge-api {
            display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.6rem;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            backdrop-filter: blur(10px); margin: 0 4px; cursor: pointer; transition: all 0.3s ease;
        }
        .badge-api.online {
            background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: var(--green);
        }
        .badge-api.offline {
            background: rgba(255, 77, 90, 0.1); border: 1px solid rgba(255, 77, 90, 0.3); color: var(--accent);
        }
        .badge-api:hover { transform: scale(1.05); }
        .card {
            background: rgba(20, 25, 40, 0.45); backdrop-filter: blur(20px); border-radius: var(--radius-lg);
            padding: 22px; border: 1px solid rgba(255, 255, 255, 0.06); margin-bottom: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .api-status {
            font-size: 0.65rem; padding: 10px 12px; border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.03); margin-top: 8px; display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; border: 1px solid rgba(255,255,255,0.06);
        }
        .api-status.online { color: var(--green); border: 1px solid rgba(46,204,113,0.2); background: rgba(46,204,113,0.05); }
        .api-status.offline { color: var(--accent); border: 1px solid rgba(255,77,90,0.2); background: rgba(255,77,90,0.05); }
        .api-status-icon { font-size: 1.2rem; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .api-status-text { flex: 1; }
        .api-retry-btn {
            padding: 4px 10px; font-size: 0.65rem; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .api-retry-btn:hover { background: rgba(46,204,113,0.25); color: var(--green); }
        .diag-panel {
            background: rgba(20,25,40,0.6); border: 1px solid rgba(77,171,247,0.3);
            border-radius: var(--radius-md); padding: 12px; margin-top: 8px;
            font-size: 0.65rem; color: var(--muted); max-height: 150px; overflow-y: auto;
        }
        .diag-line { display: flex; gap: 6px; padding: 2px 0; font-family: 'Courier New', monospace; }
        .diag-icon { min-width: 20px; }
        .diag-text { flex: 1; word-break: break-all; }

        .league-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
        .league-pill {
            padding: 6px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.72rem; font-weight: 700;
            cursor: pointer; transition: all 0.25s ease; backdrop-filter: blur(5px);
        }
        .league-pill:hover { border-color: var(--accent); color: var(--text); background: rgba(255,77,90,0.1); transform: translateY(-2px); }
        .league-pill.active { background: linear-gradient(135deg, rgba(255,77,90,0.25), rgba(77,171,247,0.2)); border-color: var(--accent); color: white; }

        select {
            width: 100%; padding: 12px 15px; border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.1); background: rgba(20,25,40,0.4);
            backdrop-filter: blur(15px); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
        }

        input.team-search {
            width: 100%;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(20,25,40,0.4);
            backdrop-filter: blur(15px);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
        }
        input.team-search::placeholder {
            color: var(--muted);
        }

        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .market-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
        .mkt-toggle {
            padding: 6px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.7rem; font-weight: 700;
            cursor: pointer; transition: all 0.25s ease;
        }
        .mkt-toggle.on { background: rgba(46,204,113,0.2); border-color: rgba(46,204,113,0.5); color: var(--green); }
        .mkt-toggle.unavailable { opacity: 0.4; pointer-events: none; text-decoration: line-through; }

        .calc-btn {
            width: 100%; padding: 16px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, var(--accent), #ff6b7a);
            color: white; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px;
            margin-top: 18px; cursor: pointer; box-shadow: 0 8px 30px rgba(255,77,90,0.4);
        }
        .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .bets-fab {
            position: fixed; right: 18px; bottom: 22px; width: 58px; height: 58px; border-radius: 50%;
            border: 1px solid rgba(77,171,247,0.4); background: linear-gradient(135deg, #2a3550, #1a2236);
            box-shadow: 0 8px 26px rgba(0,0,0,0.5), 0 0 0 1px rgba(77,171,247,0.15);
            cursor: pointer; z-index: 500; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .bets-fab:hover { transform: scale(1.08); box-shadow: 0 10px 30px rgba(77,171,247,0.35); }
        .bets-fab .fab-badge {
            position: absolute; top: -3px; right: -3px; background: var(--accent); color: white;
            font-size: 0.65rem; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
            font-family: 'DM Sans', sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .bets-modal-backdrop {
            position: fixed; inset: 0; background: rgba(5,7,14,0.6); backdrop-filter: blur(2px);
            z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
        }
        .bets-modal-backdrop.open { opacity: 1; pointer-events: auto; }
        .bets-modal-sheet {
            position: fixed; left: 0; right: 0; bottom: 0; margin: 0 auto; width: 100%; max-width: 500px;
            background: rgba(14,18,30,0.98); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
            border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            z-index: 999; max-height: 82vh; display: flex; flex-direction: column;
            transform: translateY(105%); transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
        }
        .bets-modal-sheet.open { transform: translateY(0); }
        @media (min-width: 900px) { .bets-modal-sheet { max-width: 780px; } }
        .bets-modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 3px; margin: 10px auto 2px; flex-shrink: 0; }
        .bets-modal-header {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 10px 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
        }
        .bets-modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 1.5px; }
        .bets-modal-close {
            background: rgba(255,255,255,0.08); border: none; color: var(--text);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; flex-shrink: 0;
        }
        .bets-modal-close:hover { background: rgba(255,77,90,0.25); }
        .bets-modal-body { padding: 14px 20px 26px; overflow-y: auto; }

        .match-header {
            background: rgba(20,25,40,0.5); backdrop-filter: blur(25px); border-radius: var(--radius-lg);
            padding: 22px 18px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 14px;
        }
        .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
        .team-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: white; text-align: center; }

        .result-boxes { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin-top: 16px; }
        .result-box {
            background: rgba(20,25,40,0.3); border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md); padding: 12px 8px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .rb-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }

        .result-save-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
            color: #e0e4f0; padding: 6px 12px; border-radius: 20px; cursor: pointer;
            font-size: 0.7rem; font-weight: 700; transition: all 0.2s ease; white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .result-save-btn:hover { background: rgba(46,204,113,0.25); border-color: rgba(46,204,113,0.6); color: var(--green); }

        .section-header { display: flex; align-items: center; gap: 10px; margin: 18px 0 10px; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; }
        .section-lambda { margin-left: auto; font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; color: var(--muted); }
        .section-lambda span { color: var(--yellow); }
        .section-header:hover .section-lambda {
            color: var(--text) !important;
        }

        .market-card {
            background: rgba(20,25,40,0.3); border-radius: var(--radius-md); padding: 14px 16px;
            margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.06);
            display: grid; grid-template-columns: 44px 1fr 48px 80px; align-items: center; gap: 10px;
        }
        .market-card.high { border-left: 3px solid var(--green); }
        .market-card.mid { border-left: 3px solid var(--yellow); }
        .market-card.low { border-left: 3px solid var(--accent); }
        .line-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: white; min-width: 44px; }
        .bar-wrap { flex: 1; }
        .bar-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 5px; overflow: hidden; margin-bottom: 4px; }
        .bar-fill { height: 100%; border-radius: 5px; transition: width 1.5s ease; }
        .pct-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; text-align: right; min-width: 48px; }

        .save-bet-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
            color: var(--muted); padding: 6px 10px; border-radius: 20px; cursor: pointer;
            font-size: 0.7rem; font-weight: 700; transition: all 0.2s ease; white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .save-bet-btn:hover { background: rgba(46,204,113,0.2); border-color: rgba(46,204,113,0.5); color: var(--green); }
        .save-bet-btn.saved { background: rgba(46,204,113,0.25); border-color: rgba(46,204,113,0.6); color: var(--green); }

        .recomendacion {
            background: rgba(20,25,40,0.5); border: 1px solid rgba(46,204,113,0.3);
            border-radius: var(--radius-lg); padding: 22px 20px; margin-top: 8px; text-align: center;
        }
        .rec-main { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: white; }

        .bets-section { background: rgba(20,25,40,0.45); backdrop-filter: blur(20px); border-radius: var(--radius-lg); padding: 22px; margin-top: 14px; }
        .bets-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.7rem; color: var(--muted); }
        .bets-stats span { background: rgba(255,255,255,0.04); padding: 5px 10px; border-radius: 14px; }
        .bet-item { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
        .bet-item.won { border-left: 3px solid var(--green); background: rgba(46,204,113,0.06); }
        .bet-item.lost { border-left: 3px solid var(--accent); background: rgba(255,77,90,0.06); }
        .bet-actions button {
            padding: 5px 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04); color: var(--muted); cursor: pointer; font-size: 0.62rem; font-weight: 700;
        }
        .btn-won:hover { background: rgba(46,204,113,0.3); border-color: var(--green); color: var(--green); }
        .btn-lost:hover { background: rgba(255,77,90,0.3); border-color: var(--accent); color: var(--accent); }
        .btn-delete:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }

        .hidden { display: none; }
        .animate-in { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state { text-align: center; padding: 30px; }

        .clear-all-bets {
            background: rgba(255,77,90,0.15);
            border: 1px solid rgba(255,77,90,0.3);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s ease;
        }
        .clear-all-bets:hover {
            background: rgba(255,77,90,0.25);
            border-color: var(--accent);
        }

        .no-bets {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .league-pill, .mkt-toggle, .save-bet-btn, .result-save-btn {
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            .calc-btn {
                padding: 18px;
                font-size: 1.25rem;
            }
            .diag-panel {
                max-height: 110px;
                font-size: 0.6rem;
            }
            .market-card {
                grid-template-columns: 40px 1fr 44px 70px;
                padding: 12px;
            }
            .line-label {
                font-size: 1.2rem;
            }
            .pct-label {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <div class="header">
            <div class="logo">Data<span>Predict</span></div>
            <div class="badge">⚡ v2.9</div>
            <div class="badge-api offline" id="api-badge">🔗 API (---)</div>
        </div>

        <div class="card">
            <label>Liga / Competencia</label>
            <div class="league-pills" id="league-pills"></div>

            <div class="team-grid">
                <div>
                    <label>🏠 Local</label>
                    <input id="home-team-input" class="team-search" list="home-teams" placeholder="Escribe para buscar..." disabled />
                    <datalist id="home-teams"></datalist>
                </div>
                <div>
                    <label>✈️ Visitante</label>
                    <input id="away-team-input" class="team-search" list="away-teams" placeholder="Escribe para buscar..." disabled />
                    <datalist id="away-teams"></datalist>
                </div>
            </div>

            <span class="markets-label">Mercados a calcular</span>
            <div class="market-toggles" id="market-toggles"></div>

            <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>

            <div class="api-status" id="api-status">
                <span class="api-status-icon">🔄</span>
                <span class="api-status-text">Inicializando...</span>
            </div>
            <div class="diag-panel" id="diag-panel">
                <div class="diag-line"><span class="diag-icon">ℹ️</span><span class="diag-text">Iniciando diagnóstico...</span></div>
            </div>
        </div>

        <button class="bets-fab" id="bets-shortcut-btn" title="Ver mis apuestas guardadas">
            📓
            <span class="fab-badge" id="bets-count-badge">0</span>
        </button>

        <div class="bets-modal-backdrop" id="bets-modal-backdrop"></div>
        <div class="bets-modal-sheet" id="bets-modal-sheet">
            <div class="bets-modal-handle"></div>
            <div class="bets-modal-header">
                <span class="bets-modal-title">📓 Mis Apuestas Guardadas</span>
                <button class="bets-modal-close" id="bets-modal-close">✕</button>
            </div>
            <div class="bets-modal-body" id="saved-bets-container"></div>
        </div>

        <div id="results" class="hidden">
            <div id="loading-indicator" class="card loading-state">
                <div class="spinner"></div>
                <div>Calculando modelo con datos...</div>
            </div>

            <div id="output" class="hidden">
                <div id="match-header-container"></div>
                <div id="all-markets-container"></div>
                <div id="recomendacion-container"></div>
                <p class="disclaimer" style="text-align:center;color:var(--muted);font-size:0.6rem;margin-top:20px;">
                    Data.Predict v3.0 · Dixon‑Coles · Córneres realistas · Datos vía API Bzzoiro + Local · Estimaciones estadísticas, no garantías
                </p>
            </div>
        </div>

    // Helper genérico con timeout y manejo de error uniforme para toda la API v2.
    async function apiGet(path) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);
        let response;
        try {
            response = await fetch(`${API_BASE}${path}`, {
                method: 'GET',
                headers: { 'Authorization': `Token ${API_KEY}` },
                signal: controller.signal
            });
        } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') throw new Error('TIMEOUT');
            throw err;
        }
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status} en ${path}`);
        return response.json();
    }

        const statusEl = document.getElementById('api-status');
        const badgeEl = document.getElementById('api-badge');

        try {
            // Endpoint real, liviano y sin parámetros obligatorios: sirve como "ping".
            await apiGet('/events/live/');
            apiOnline = true;
            statusEl.innerHTML = '<span class="api-status-icon">✅</span><span class="api-status-text">API Bzzoiro conectada</span>';
            statusEl.className = 'api-status online';
            badgeEl.classList.remove('offline');
            badgeEl.classList.add('online');
            badgeEl.textContent = '🔗 API ONLINE';

            const errorMsg = error.message;

            statusEl.innerHTML = `<span class="api-status-icon">⚠️</span><span class="api-status-text">Bzzoiro no disponible (${errorMsg})</span><button class="api-retry-btn" onclick="testApiConnection()">Reintentar</button>`;
            statusEl.className = 'api-status offline';
            badgeEl.classList.remove('online');
            badgeEl.classList.add('offline');
            badgeEl.textContent = '🔗 API OFFLINE';

            addDiagLog('❌', `Bzzoiro no disponible: ${errorMsg}`);
            if (errorMsg.includes('401') || errorMsg.includes('403')) {
                addDiagLog('🔑', 'Revisa tu API_KEY: regístrate en sports.bzzoiro.com/register/');
            }
            if (errorMsg.includes('Failed to fetch') || errorMsg.includes('TIMEOUT')) {
                addDiagLog('🌐', 'Puede ser CORS (bloqueo del navegador) o falta de red, no solo la API');
            }
            addDiagLog('📊', 'Usando datos locales (fallback)');
        }
    }

    // Busca el team_id de Bzzoiro a partir del nombre local del equipo.
    async function findTeamId(name) {
        if (teamIdCache[name] !== undefined) return teamIdCache[name];
        try {
            const data = await apiGet(`/teams/?name=${encodeURIComponent(name)}&limit=5`);
            const results = data.results || [];
            if (!results.length) { teamIdCache[name] = null; return null; }
            const lower = name.toLowerCase();
            const exact = results.find(t =>
                (t.name || '').toLowerCase() === lower || (t.short_name || '').toLowerCase() === lower
            );
            const id = (exact || results[0]).id;
            teamIdCache[name] = id;
            return id;
        } catch (err) {
            addDiagLog('❌', `Buscando equipo "${name}": ${err.message}`);
            return null;
        }
    }

    // Busca, entre los próximos partidos del equipo local, el que sea contra el visitante.
    async function findUpcomingEvent(homeId, awayId) {
        const fmt = d => d.toISOString().slice(0, 10);
        const today = fmt(new Date());
        const future = fmt(new Date(Date.now() + 21 * 24 * 60 * 60 * 1000));
        // CORRECCIÓN: el sub-recurso real de Bzzoiro es /fixtures/, no /matches/ (por eso
        // salían los 404 en el panel de diagnóstico). Sin filtros de fecha, la API ya
        // devuelve por defecto una ventana de ahora−3h a ahora+7d, pero mandamos date_from/
        // date_to explícitos para cubrir un rango más amplio (hasta 21 días) y encontrar
        // partidos programados con más antelación.
        const data = await apiGet(`/teams/${homeId}/fixtures/?date_from=${today}&date_to=${future}&limit=50`);
        const list = data.results || data.matches || [];
        return list.find(m => m.away_team_id === awayId || m.home_team_id === awayId) || null;
    }

    // Trae la predicción ML ya calculada por Bzzoiro para un evento (si existe).
    async function getPrediction(eventId) {
        try {
            return await apiGet(`/predictions/by-event/${eventId}/`);
        } catch (err) {
            try {
                const data = await apiGet(`/predictions/?event=${eventId}&limit=1`);
                return (data.results && data.results[0]) || null;
            } catch (err2) {
                addDiagLog('⚠️', `Sin predicción de Bzzoiro para event_id=${eventId}`);
                return null;
            }
        }
    }

    // Punto de entrada: resuelve equipos → evento → predicción real, con caché local.
    async function fetchMatchDataFromAPI(leagueId, homeTeam, awayTeam) {
        if (!apiOnline) return null;

        const cachedData = getApiCache(leagueId, homeTeam, awayTeam);
        if (cachedData) return cachedData;

        try {
            const [homeId, awayId] = await Promise.all([findTeamId(homeTeam), findTeamId(awayTeam)]);
            if (!homeId || !awayId) {
                addDiagLog('⚠️', 'No se encontró team_id de Bzzoiro para uno o ambos equipos');
                return null;
            }

            const event = await findUpcomingEvent(homeId, awayId);
            if (!event) {
                addDiagLog('⚠️', 'No hay un partido próximo entre estos equipos en la API (puede que aún no esté programado)');
                return null;
            }

            const pred = await getPrediction(event.id);
            if (!pred || !pred.markets) {
                addDiagLog('⚠️', 'Evento encontrado pero sin predicción ML todavía');
                return null;
            }

            const result = {
                source: 'bzzoiro',
                event_id: event.id,
                expected_goals: pred.markets.expected_goals || null,   // { home, away }
                match_result: pred.markets.match_result || null,        // { prob_home, prob_draw, prob_away }
                over_under: pred.markets.over_under || null,            // { prob_over_15, prob_over_25, prob_over_35 }
                btts: pred.markets.btts || null                         // { prob_yes }
            };

            setApiCache(leagueId, homeTeam, awayTeam, result);
            addDiagLog('📡', `Predicción Bzzoiro: xG ${result.expected_goals?.home ?? '?'} - ${result.expected_goals?.away ?? '?'}`);
            return result;
        } catch (error) {
            addDiagLog('❌', `Error API: ${error.message}`);
            return null;
        }
    }

    // ========== FUNCIONES MATEMÁTICAS ==========
    function plattCalibrate(raw, type) {
        const p = Math.max(0.001, Math.min(0.999, raw / 100));
        const logit = Math.log(p / (1 - p));
        const params = PLATT_PARAMS[type] || { A: 0.93, B: -0.04 };
        const calibrated = 1 / (1 + Math.exp(-(params.A * logit + params.B)));
        return Math.min(98, Math.max(2, calibrated * 100));
    }
    
    function poissonExact(lambda, k) { 
        if (k < 0) return 0;
        if (k === 0) return Math.exp(-lambda);
        let t = Math.exp(-lambda); 
        for (let i = 0; i < k; i++) t *= lambda / (i + 1); 
        return t; 
    }
    
    function poissonProb(lambda, k) { 
        let p = Math.exp(-lambda), t = p; 
        for (let i = 1; i <= k; i++) { t *= lambda / i; p += t; } 
        return p; 
    }
    
    function poissonOver(lambda, th) { 
        return Math.min(98, Math.max(2, (1 - poissonProb(lambda, Math.floor(th))) * 100)); 
    }
    
    function negBinExact(mu, r, k) {
        if (k < 0) return 0;
        if (k === 0) return Math.pow(r / (r + mu), r);
        const p = r / (r + mu);
        let logComb = 0;
        for (let i = 1; i <= k; i++) {
            logComb += Math.log(r + i - 1) - Math.log(i);
        }
        const logP = logComb + r * Math.log(p) + k * Math.log(1 - p);
        return Math.exp(logP);
    }
    
    function negBinOver(mu, th, r) { 
        const k = Math.floor(th); 
        let cdf = 0; 
        for (let i = 0; i <= k; i++) cdf += negBinExact(mu, r, i); 
        return Math.min(98, Math.max(2, (1 - cdf) * 100)); 
    }
    
    function dixonColesTau(x, y, lH, lA, rho) { 
        if (x === 0 && y === 0) return 1 - (lH * lA * rho);
        if (x === 0 && y === 1) return 1 + (lH * rho);
        if (x === 1 && y === 0) return 1 + (lA * rho);
        if (x === 1 && y === 1) return 1 - rho;
        return 1; 
    }
    
    function calcBTTS(lH, lA, leagueKey) { 
        const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; 
        const p00 = poissonExact(lH, 0) * poissonExact(lA, 0) * dixonColesTau(0, 0, lH, lA, rho);
        const pHome0 = poissonExact(lH, 0);
        const pAway0 = poissonExact(lA, 0);
        const btts = 1 - pHome0 - pAway0 + p00;
        return Math.min(98, Math.max(2, btts * 100)); 
    }
    
    function calcResultProbs(lH, lA, leagueKey) { 
        const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; 
        let pH = 0, pD = 0, pA = 0, total = 0; 
        for (let h = 0; h <= 10; h++) { 
            for (let a = 0; a <= 10; a++) { 
                let p = poissonExact(lH, h) * poissonExact(lA, a); 
                if (h <= 1 && a <= 1) p *= dixonColesTau(h, a, lH, lA, rho); 
                total += p;
                if (h > a) pH += p; 
                else if (h === a) pD += p; 
                else pA += p; 
            } 
        }
        const sum = (pH + pD + pA) || 1;
        return { home: +((pH / sum) * 100).toFixed(1), draw: +((pD / sum) * 100).toFixed(1), away: +((pA / sum) * 100).toFixed(1) }; 
    }
    
    function colorFor(p) { return p >= 65 ? 'var(--green)' : p >= 42 ? 'var(--yellow)' : 'var(--accent)'; }
    function cardClassFor(p) { return p >= 65 ? 'high' : p >= 42 ? 'mid' : 'low'; }

    function normalizeCornersAvg(v) {
        const n = Number(v);
        if (!Number.isFinite(n) || n <= 0) return null;
        return n;
    }

    function canUseWC26(home, away) {
        return !WC26_STATE.blocked || (WC26_STATE.activeTeams.includes(home) && WC26_STATE.activeTeams.includes(away));
    }

    // ========== SISTEMA DE APUESTAS ==========
    const STORAGE_KEY = 'dataPredict_bets_v30';
    const OLD_STORAGE_KEYS = ['dataPredict_bets_v28']; // versiones previas, para migrar sin perder nada
    function migrateOldBetsIfNeeded() {
        try {
            if (localStorage.getItem(STORAGE_KEY)) return; // ya migrado o ya tiene datos propios
            for (const oldKey of OLD_STORAGE_KEYS) {
                const raw = localStorage.getItem(oldKey);
                if (!raw) continue;
                const oldBets = JSON.parse(raw) || [];
                if (!oldBets.length) continue;
                // Los datos viejos no tenían cuota/stake: se agregan como null/1 para que el
                // tracker los pueda mostrar igual (solo sin ROI hasta que se les ponga cuota).
                const migrated = oldBets.map(b => ({ cuota: null, stake: 1, ...b }));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
                addDiagLog('♻️', `Migradas ${migrated.length} apuestas guardadas de una versión anterior`);
                return;
            }
        } catch (e) {
            addDiagLog('⚠️', `No se pudieron migrar apuestas antiguas: ${e.message}`);
        }
    }
    function getSavedBets() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; } }
    function saveBetsToStorage(bets) { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); }
    function addBet(betData) { const bets = getSavedBets(); betData.id = Date.now(); betData.fecha = new Date().toISOString(); betData.status = 'pending'; bets.unshift(betData); saveBetsToStorage(bets); return betData; }
    function updateBetStatus(betId, newStatus) { const bets = getSavedBets(); const bet = bets.find(b => b.id === betId); if (bet) { bet.status = newStatus; saveBetsToStorage(bets); renderSavedBets(); } }
    function deleteBet(betId) { let bets = getSavedBets(); bets = bets.filter(b => b.id !== betId); saveBetsToStorage(bets); renderSavedBets(); }
    function clearAllBets() { if (confirm('¿Eliminar TODAS las apuestas?')) { saveBetsToStorage([]); renderSavedBets(); } }

    // Edición de cuota SIN usar prompt()/alert(): algunos navegadores y vistas previas en
    // iframe bloquean esos diálogos del sistema en silencio, lo que hacía parecer que el
    // botón "no hacía nada". En su lugar, mostramos un input editable dentro de la misma fila.
    let editingOddsId = null;
    function startEditOdds(betId) { editingOddsId = betId; renderSavedBets(); }
    function cancelEditOdds() { editingOddsId = null; renderSavedBets(); }
    function saveEditOdds(betId) {
        const inputEl = document.getElementById(`odds-input-${betId}`);
        const errEl = document.getElementById(`odds-error-${betId}`);
        if (!inputEl) return;
        const cuota = parseFloat(inputEl.value.replace(',', '.'));
        if (!Number.isFinite(cuota) || cuota <= 1) {
            if (errEl) errEl.textContent = 'Cuota inválida (debe ser un número mayor a 1)';
            return;
        }
        const bets = getSavedBets();
        const bet = bets.find(b => b.id === betId);
        if (bet) {
            bet.cuota = +cuota.toFixed(2);
            saveBetsToStorage(bets);
        }
        editingOddsId = null;
        renderSavedBets();
    }

    function guardarApuesta(mercado, pick, probabilidad) {
        if (!currentMatchHome || !currentMatchAway || !currentLeagueKey) { alert('Primero calcula un partido.'); return; }
        // La apuesta se guarda sin cuota; se añade después con el ✏️ de la lista (edición
        // en línea, sin prompt()) para que funcione igual en cualquier navegador/visor.
        addBet({ partido: `${currentMatchHome} vs ${currentMatchAway}`, liga: currentLeagueKey, ligaNombre: currentMatchLeagueName, mercado, pick, probabilidad, cuota: null, stake: 1 });
        setTimeout(() => {
            document.querySelectorAll('.save-bet-btn, .result-save-btn').forEach(b => {
                if (b.dataset.mercado === mercado && b.dataset.pick === pick) {
                    b.classList.add('saved');
                    b.textContent = '✅ Guardado';
                    setTimeout(() => {
                        b.classList.remove('saved');
                        b.textContent = '💾 Guardar';
                    }, 1500);
                }
            });
        }, 50);
        renderSavedBets();
    }

    function renderSavedBets() {
        const container = document.getElementById('saved-bets-container');
        const countBadge = document.getElementById('bets-count-badge');
        if (!container) return;
        const bets = getSavedBets();
        const stats = { total: bets.length, won: bets.filter(b => b.status === 'won').length, lost: bets.filter(b => b.status === 'lost').length, pending: bets.filter(b => b.status === 'pending').length };
        const resolved = stats.won + stats.lost;
        const winRate = resolved > 0 ? (stats.won / resolved) * 100 : 0;
        // Punto de equilibrio: la cuota promedio mínima que necesitas, dado tu % de acierto
        // real, para no perder dinero a largo plazo (cuota_equilibrio = 1 / winRate).
        const breakeven = winRate > 0 ? 1 / (winRate / 100) : null;

        // Ganancia/pérdida real: solo se puede calcular sobre apuestas resueltas (won/lost)
        // que además tienen una cuota registrada. stake fijo de 1 unidad por defecto.
        const settledWithOdds = bets.filter(b => (b.status === 'won' || b.status === 'lost') && Number.isFinite(b.cuota));
        let netProfit = 0, staked = 0, avgOddsSum = 0;
        settledWithOdds.forEach(b => {
            const stake = Number.isFinite(b.stake) ? b.stake : 1;
            staked += stake;
            netProfit += b.status === 'won' ? stake * (b.cuota - 1) : -stake;
            avgOddsSum += b.cuota;
        });
        const roi = staked > 0 ? (netProfit / staked) * 100 : null;
        const avgOdds = settledWithOdds.length ? avgOddsSum / settledWithOdds.length : null;

        if (countBadge) countBadge.textContent = stats.total;

        let html = '';
        if (bets.length) {
            html += `<div class="bets-stats"><span>📊 Total: <strong>${stats.total}</strong></span><span class="stat-win">✅ ${stats.won}</span><span class="stat-lose">❌ ${stats.lost}</span><span class="stat-pending">⏳ ${stats.pending}</span>${resolved ? `<span>🎯 ${winRate.toFixed(0)}%</span>` : ''}</div>`;
            if (settledWithOdds.length) {
                const profitColor = netProfit > 0 ? 'var(--green)' : (netProfit < 0 ? 'var(--accent)' : 'var(--muted)');
                html += `<div class="bets-stats">
                    <span style="color:${profitColor}">💰 ${netProfit >= 0 ? '+' : ''}${netProfit.toFixed(2)}u</span>
                    <span style="color:${profitColor}">📈 ROI ${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%</span>
                    <span>🎲 cuota prom. ${avgOdds.toFixed(2)}</span>
                    ${breakeven ? `<span>⚖️ equilibrio ${breakeven.toFixed(2)}</span>` : ''}
                </div>`;
                if (breakeven && avgOdds < breakeven) {
                    html += `<div class="no-bets" style="color:var(--accent);padding:0 4px 10px;">⚠️ Tu cuota promedio (${avgOdds.toFixed(2)}) está por debajo de tu punto de equilibrio (${breakeven.toFixed(2)}): con tu % de acierto actual, en el largo plazo esto pierde dinero aunque ganes más apuestas de las que pierdes.</div>`;
                }
            } else if (resolved) {
                html += `<div class="no-bets" style="padding:0 4px 10px;">Añade la cuota (✏️) en tus apuestas resueltas para ver ganancia real y ROI, no solo % de acierto.</div>`;
            }
            bets.forEach(b => {
                const cls = b.status === 'won' ? 'won' : b.status === 'lost' ? 'lost' : 'pending';
                const emoji = b.status === 'won' ? '✅' : b.status === 'lost' ? '❌' : '⏳';
                const stakeB = Number.isFinite(b.stake) ? b.stake : 1;
                const betProfit = (b.status === 'won' || b.status === 'lost') && Number.isFinite(b.cuota)
                    ? (b.status === 'won' ? stakeB * (b.cuota - 1) : -stakeB)
                    : null;
                const cuotaLabel = Number.isFinite(b.cuota) ? `@${b.cuota.toFixed(2)}` : 'sin cuota';
                const profitLabel = betProfit !== null
                    ? `<span style="color:${betProfit >= 0 ? 'var(--green)' : 'var(--accent)'}">${betProfit >= 0 ? '+' : ''}${betProfit.toFixed(2)}u</span>`
                    : '';
                const isEditingOdds = editingOddsId === b.id;
                const oddsControl = isEditingOdds
                    ? `<span style="display:inline-flex;align-items:center;gap:4px;">
                            <input type="number" step="0.01" min="1.01" id="odds-input-${b.id}" value="${Number.isFinite(b.cuota) ? b.cuota : ''}" placeholder="1.85"
                                style="width:56px;padding:3px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(20,25,40,0.6);color:var(--text);font-size:0.7rem;" />
                            <button onclick="saveEditOdds(${b.id})" title="Guardar cuota" style="background:rgba(46,204,113,0.2);border:1px solid rgba(46,204,113,0.5);color:var(--green);border-radius:10px;padding:2px 7px;font-size:0.65rem;cursor:pointer;">✓</button>
                            <button onclick="cancelEditOdds()" title="Cancelar" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:var(--muted);border-radius:10px;padding:2px 7px;font-size:0.65rem;cursor:pointer;">✕</button>
                            <span id="odds-error-${b.id}" style="color:var(--accent);font-size:0.6rem;"></span>
                       </span>`
                    : `${cuotaLabel} ${profitLabel}`;
                html += `<div class="bet-item ${cls}"><div class="bet-info"><div class="bet-match">${b.partido}</div><div class="bet-detail">${b.ligaNombre} · ${b.mercado} · ${b.pick} ${emoji} · ${oddsControl}</div><div class="bet-prob" style="color:${colorFor(b.probabilidad)}">${b.probabilidad.toFixed(0)}%</div></div><div class="bet-actions">${isEditingOdds ? '' : `<button class="btn-pending" onclick="startEditOdds(${b.id})" title="Editar cuota">✏️</button>`}${b.status !== 'won' ? `<button class="btn-won" onclick="updateBetStatus(${b.id},'won')">✅</button>` : ''}${b.status !== 'lost' ? `<button class="btn-lost" onclick="updateBetStatus(${b.id},'lost')">❌</button>` : ''}${b.status !== 'pending' ? `<button class="btn-pending" onclick="updateBetStatus(${b.id},'pending')">⏳</button>` : ''}<button class="btn-delete" onclick="deleteBet(${b.id})">🗑️</button></div></div>`;
            });
            html += `<button class="clear-all-bets" onclick="clearAllBets()">🗑️ Eliminar todas</button>`;
        } else {
            html += `<div class="no-bets" style="text-align:center;padding:20px;color:var(--muted);">📭 Sin apuestas. Usa 💾 <strong>Guardar</strong> en cualquier mercado.</div>`;
        }
        container.innerHTML = html;
    }

    // ========== CÁLCULO PRINCIPAL ==========
    document.getElementById('calc-btn').onclick = async () => {
        const home = document.getElementById('home-team-input').value.trim();
        const away = document.getElementById('away-team-input').value.trim();

        if (!currentLeagueKey) { alert('Selecciona liga'); return; }
        if (currentLeagueKey === 'WC26' && !canUseWC26(home, away)) { alert('WC26 está bloqueado fuera de las selecciones activas del estado actual del torneo.'); return; }
        if (!home || !away) { alert('Selecciona equipos'); return; }
        if (home === away) { alert('Equipos diferentes'); return; }

        const db = getLeagueTeamDb(currentLeagueKey);
        if (!db[home] || !db[away]) {
            alert('Uno o ambos equipos no existen en esta liga.');
            return;
        }

        currentMatchHome = home;
        currentMatchAway = away;
        currentMatchLeagueName = LIGAS[currentLeagueKey].name;

        const btn = document.getElementById('calc-btn');
        btn.disabled = true;
        btn.textContent = '🔄 CALCULANDO...';

        try {
            addDiagLog('📈', `Calculando: ${home} vs ${away}`);
            
            let apiData = null;
            if (apiOnline) {
                apiData = await fetchMatchDataFromAPI(currentLeagueKey, home, away);
            }

            const liga = LIGAS[currentLeagueKey];
            // Los ratings locales (hStr/aStr) siempre se calculan: la API de Bzzoiro no
            // entrega goles esperados de 1er tiempo ni de córneres, así que esos dos mercados
            // siempre usan el motor local. Lo que sí puede venir de la API son los goles
            // esperados (xG) totales de la predicción ML real, que son mejores que nuestra
            // estimación local cuando están disponibles.
            const hStr = db[home] || { atk: 1, def: 1 };
            const aStr = db[away] || { atk: 1, def: 1 };
            const baseGoals = liga.goalsAvg / 2;
            const hAdv = HOME_ADVANTAGE[currentLeagueKey] || 1.08;

            let lH, lA, usedApiGoals = false;
            if (apiData && apiData.expected_goals && Number.isFinite(apiData.expected_goals.home) && Number.isFinite(apiData.expected_goals.away)) {
                addDiagLog('📡', 'Usando xG real de la predicción ML de Bzzoiro');
                lH = +apiData.expected_goals.home.toFixed(2);
                lA = +apiData.expected_goals.away.toFixed(2);
                usedApiGoals = true;
            } else {
                addDiagLog('📊', 'Usando modelo local (ratings de ataque/defensa)');
                lH = +(baseGoals * hStr.atk * aStr.def * hAdv).toFixed(2);
                lA = +(baseGoals * aStr.atk * hStr.def).toFixed(2);
            }
            const lHT = +((baseGoals * hStr.atk * aStr.def * hAdv * 0.40) + (baseGoals * aStr.atk * hStr.def * 0.40)).toFixed(2);

            const leagueCornersAvg = Number(liga.cornAvg);
            // Mejora: los córneres no solo suben con más ataque, sino también cuando el rival
            // tiene una defensa más floja (def > 1 = defensa débil = más presión sostenida =
            // más córneres concedidos). Antes solo se usaba el promedio de ataque; ahora se
            // combina con el promedio de "def" de ambos equipos para reflejar eso.
            const attackPressure = (hStr.atk + aStr.atk) / 2;
            const defenseWeakness = (hStr.def + aStr.def) / 2;
            const lCornRaw = leagueCornersAvg * ((attackPressure + defenseWeakness) / 2);
            const lCorn = +Math.min(11.0, Math.max(8.0, lCornRaw)).toFixed(2);
            const cornR = liga.cornR || 18; // Bzzoiro no expone un parámetro de dispersión de córneres

            addDiagLog('✅', `Cálculo completado: lCorn=${lCorn}, cornR=${cornR}`);

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('loading-indicator').classList.remove('hidden');
            document.getElementById('output').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('loading-indicator').classList.add('hidden');
                document.getElementById('output').classList.remove('hidden');

                document.getElementById('match-header-container').innerHTML = `
                    <div class="match-header animate-in">
                        <div style="text-align:center;font-size:0.7rem;color:var(--muted);">${liga.name} ${apiOnline ? '📡' : '📊'}</div>
                        <div class="teams-row"><div class="team-side"><div class="team-name">${home}</div></div><div class="vs-center">VS</div><div class="team-side"><div class="team-name">${away}</div></div></div>
                    </div>`;

                let hPN, dPN, aPN;
                if (apiData && apiData.match_result) {
                    // La API ya entrega probabilidades calibradas por su propio modelo ML
                    // (CatBoost); son mejores que re-derivarlas nosotros desde xG + Poisson.
                    addDiagLog('📡', 'Usando 1X2 calibrado de Bzzoiro');
                    hPN = +apiData.match_result.prob_home.toFixed(1);
                    dPN = +apiData.match_result.prob_draw.toFixed(1);
                    aPN = +apiData.match_result.prob_away.toFixed(1);
                } else {
                    const rp = calcResultProbs(lH, lA, currentLeagueKey);
                    const hP = +plattCalibrate(rp.home, 'resultado').toFixed(1), dP = +plattCalibrate(rp.draw, 'resultado').toFixed(1), aP = +plattCalibrate(rp.away, 'resultado').toFixed(1);
                    const resultSum = (hP + dP + aP) || 1;
                    hPN = +(hP * 100 / resultSum).toFixed(1);
                    dPN = +(dP * 100 / resultSum).toFixed(1);
                    aPN = +(aP * 100 / resultSum).toFixed(1);
                }

                document.getElementById('match-header-container').innerHTML += `
                    <div class="result-boxes animate-in">
                        <div class="result-box">
                            <div class="rb-label">LOCAL</div>
                            <div class="rb-pct" style="color:${colorFor(hPN)}">${hPN}%</div>
                            <button class="result-save-btn" data-mercado="Resultado" data-pick="Local" onclick="guardarApuesta('Resultado','Local',${hPN.toFixed(0)})">💾 Guardar</button>
                        </div>
                        <div class="result-box">
                            <div class="rb-label">X</div>
                            <div class="rb-pct" style="color:var(--yellow)">${dPN}%</div>
                            <button class="result-save-btn" data-mercado="Resultado" data-pick="Empate" onclick="guardarApuesta('Resultado','Empate',${dPN.toFixed(0)})">💾 Guardar</button>
                        </div>
                        <div class="result-box">
                            <div class="rb-label">VISIT</div>
                            <div class="rb-pct" style="color:${colorFor(aPN)}">${aPN}%</div>
                            <button class="result-save-btn" data-mercado="Resultado" data-pick="Visitante" onclick="guardarApuesta('Resultado','Visitante',${aPN.toFixed(0)})">💾 Guardar</button>
                        </div>
                    </div>`;

                let html = '';
                const l = lH + lA;
                const apiOU = apiData && apiData.over_under;
                // Estas variables se calculan una sola vez aquí y se reutilizan tal cual en el
                // bloque de "mejor pick" más abajo. Antes el pick se recalculaba por separado
                // con solo el modelo local, así que si la API estaba activa el número mostrado
                // en la tarjeta del mercado y el de "mejor pick" podían no coincidir.
                let g15 = null, g25 = null, btts = null, g05 = null;

                if (activeMarkets.goles) {
                    g15 = apiOU ? Math.min(98, Math.max(2, apiOU.prob_over_15)) : plattCalibrate(poissonOver(l, 1.5), 'goals15');
                    g25 = apiOU ? Math.min(98, Math.max(2, apiOU.prob_over_25)) : plattCalibrate(poissonOver(l, 2.5), 'goals25');
                    html += `<div class="section-header"><span class="section-title">⚽ GOLES TOTALES</span><span class="section-lambda">${apiOU ? 'xG API' : 'λ'} <span>${l.toFixed(2)}</span></span></div>
                        <div class="market-card ${cardClassFor(g15)}"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15}" style="background:${colorFor(g15)};"></div></div></div><div class="pct-label" style="color:${colorFor(g15)}">${g15.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Goles +1.5" data-pick="Over" onclick="guardarApuesta('Goles +1.5','Over',${g15.toFixed(0)})">💾 Guardar</button></div>
                        <div class="market-card ${cardClassFor(g25)}"><div class="line-label">+2.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g25}" style="background:${colorFor(g25)};"></div></div></div><div class="pct-label" style="color:${colorFor(g25)}">${g25.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Goles +2.5" data-pick="Over" onclick="guardarApuesta('Goles +2.5','Over',${g25.toFixed(0)})">💾 Guardar</button></div>`;
                }
                if (activeMarkets.ht) {
                    // HT siempre local: Bzzoiro no separa expected_goals por 1er tiempo.
                    g05 = plattCalibrate(poissonOver(lHT, 0.5), 'goals_ht05');
                    const g15ht = plattCalibrate(poissonOver(lHT, 1.5), 'goals_ht15');
                    html += `<div class="section-header"><span class="section-title">⏱ 1er TIEMPO</span><span class="section-lambda">λ <span>${lHT}</span></span></div>
                        <div class="market-card ${cardClassFor(g05)}"><div class="line-label">+0.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g05}" style="background:${colorFor(g05)};"></div></div></div><div class="pct-label" style="color:${colorFor(g05)}">${g05.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="HT +0.5" data-pick="Over" onclick="guardarApuesta('HT +0.5','Over',${g05.toFixed(0)})">💾 Guardar</button></div>
                        <div class="market-card ${cardClassFor(g15ht)}"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15ht}" style="background:${colorFor(g15ht)};"></div></div></div><div class="pct-label" style="color:${colorFor(g15ht)}">${g15ht.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="HT +1.5" data-pick="Over" onclick="guardarApuesta('HT +1.5','Over',${g15ht.toFixed(0)})">💾 Guardar</button></div>`;
                }
                if (activeMarkets.btts) {
                    btts = (apiData && apiData.btts && Number.isFinite(apiData.btts.prob_yes))
                        ? Math.min(98, Math.max(2, apiData.btts.prob_yes))
                        : plattCalibrate(calcBTTS(lH, lA, currentLeagueKey), 'btts');
                    html += `<div class="section-header"><span class="section-title">🤝 AMBOS MARCAN</span></div>
                        <div class="market-card ${cardClassFor(btts)}"><div class="line-label">BTTS</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${btts}" style="background:${colorFor(btts)};"></div></div></div><div class="pct-label" style="color:${colorFor(btts)}">${btts.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="BTTS" data-pick="Sí" onclick="guardarApuesta('BTTS','Sí',${btts.toFixed(0)})">💾 Guardar</button></div>`;
                }
                if (activeMarkets.corn) {
                    html += `<div class="section-header"><span class="section-title">⬡ CÓRNERES TOTALES</span><span class="section-lambda">μ <span>${lCorn.toFixed(1)}</span> (r=${cornR})</span></div>`;
                    [7.5, 8.5, 9.5, 10.5].forEach(line => {
                        const corn = plattCalibrate(negBinOver(lCorn, line, cornR), 'corners');
                        html += `<div class="market-card ${cardClassFor(corn)}"><div class="line-label">+${line}</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${corn}" style="background:${colorFor(corn)};"></div></div></div><div class="pct-label" style="color:${colorFor(corn)}">${corn.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Corners +${line}" data-pick="Over" onclick="guardarApuesta('Corners +${line}','Over',${corn.toFixed(0)})">💾 Guardar</button></div>`;
                    });
                }

                document.getElementById('all-markets-container').innerHTML = html;

                const g15Rec = g15, g25Rec = g25, bttsRec = btts, g05htRec = g05;

                let bestPick = null;
                let bestProb = -1;

                if (activeMarkets.goles) {
                    if (g15Rec > 60 && g15Rec > bestProb) { bestPick = 'OVER 1.5'; bestProb = g15Rec; }
                    if (g25Rec > 60 && g25Rec > bestProb) { bestPick = 'OVER 2.5'; bestProb = g25Rec; }
                }
                if (activeMarkets.btts && bttsRec > 60 && bttsRec > bestProb) { bestPick = 'BTTS SÍ'; bestProb = bttsRec; }
                if (activeMarkets.ht && g05htRec > 60 && g05htRec > bestProb) { bestPick = 'HT OVER 0.5'; bestProb = g05htRec; }
                if (activeMarkets.corn) {
                    const cornLines = [7.5, 8.5, 9.5, 10.5];
                    for (const line of cornLines) {
                        const cornProb = plattCalibrate(negBinOver(lCorn, line, cornR), 'corners');
                        if (cornProb > 60 && cornProb > bestProb) {
                            bestPick = `CORNERS +${line}`;
                            bestProb = cornProb;
                        }
                    }
                }
                if (!bestPick) {
                    bestPick = 'SIN PICK';
                    bestProb = 0;
                }

                document.getElementById('recomendacion-container').innerHTML = `
                    <div class="recomendacion animate-in">
                        <div style="font-size:0.7rem;color:var(--muted);margin-bottom:6px;">🎯 MEJOR PICK</div>
                        <div class="rec-main" style="color:${colorFor(bestProb)}">${bestPick}</div>
                        <div style="font-size:1.2rem;font-family:'Bebas Neue';color:${colorFor(bestProb)};margin-top:4px;">${bestProb.toFixed(0)}%</div>
                        <div style="font-size:0.65rem;color:var(--muted);margin-top:8px;">Basado en todas las líneas calculadas</div>
                    </div>`;
                
                renderSavedBets();
                setTimeout(() => document.querySelectorAll('.bar-fill').forEach(b => { if (b.dataset.target) b.style.width = b.dataset.target + '%'; }), 50);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                btn.disabled = false;
                btn.textContent = 'CALCULAR PROBABILIDADES';
            }, 800);
        } catch (error) {
            console.error('Error en cálculo:', error);
            addDiagLog('❌', `Error: ${error.message}`);
            btn.disabled = false;
            btn.textContent = 'CALCULAR PROBABILIDADES';
            alert('Error al calcular.');
        }
    };

    // ========== INICIALIZACIÓN ==========
    document.addEventListener('DOMContentLoaded', async () => {
        addDiagLog('🚀', 'Data.Predict PRO v3.0');
        addDiagLog('🔍', 'Bzzoiro Sports Data API');
        migrateOldBetsIfNeeded();
        renderLeaguePills();
        renderMarketToggles();
        const firstPill = document.querySelector('.league-pill');
        if (firstPill) {
            const key = firstPill.getAttribute('data-key');
            selectLeague(key, null);
        }
        renderSavedBets();

        document.getElementById('bets-shortcut-btn').onclick = openBetsModal;
        document.getElementById('bets-modal-close').onclick = closeBetsModal;
        document.getElementById('bets-modal-backdrop').onclick = closeBetsModal;

        addDiagLog('🔌', 'Conectando a Bzzoiro...');
        await testApiConnection();
    });
</script></document_content>
</html>
