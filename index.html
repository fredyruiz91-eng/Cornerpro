<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FutPredict Pro Elite v12.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
/* Se mantiene tu diseño original con el efecto de fuego */
:root {
  --bg: #030712; --bg2: #0d1117; --card: #111827; --border: #1f2937;
  --accent: #00ff87; --accent2: #00c6ff; --gold: #fbbf24; --danger: #f43f5e;
  --dim: #6b7280; --text: #f9fafb; --font-title: 'Bebas Neue', cursive; --font-body: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }
.wrap { max-width: 480px; margin: 0 auto; padding: 0 16px; }
.header { padding: 20px 0; text-align: center; }
.logo-text { font-family: var(--font-title); font-size: 52px; letter-spacing: 5px; background: linear-gradient(135deg, #ff4500, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,69,0,0.5)); }
.tabs { display: flex; background: var(--card); border-radius: 14px; padding: 4px; margin: 15px 0; border: 1px solid var(--border); }
.tab { flex: 1; padding: 12px; background: none; border: none; color: var(--dim); font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
.tab.active { background: rgba(0,255,135,0.1); color: var(--accent); border: 1px solid rgba(0,255,135,0.2); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
label { font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin: 15px 0 8px; }
select { width: 100%; padding: 15px; background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: 14px; font-family: var(--font-body); font-weight: 600; outline: none; transition: 0.3s; }
select:focus { border-color: var(--accent); }
.season-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; padding: 6px 14px; border-radius: 20px; margin-top: 10px; }
.season-tag.ok { background: rgba(0,255,135,0.1); color: var(--accent); }
.season-tag.wait { background: rgba(251,191,36,0.1); color: var(--gold); }
.btn-main { width: 100%; padding: 20px; margin-top: 20px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--accent), #00c6a0); color: #000; font-family: var(--font-title); font-size: 22px; cursor: pointer; transition: 0.3s; }
.btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
.result-section { display: none; margin-top: 10px; }
.result-section.visible { display: block; animation: fadeInUp 0.5s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.teams-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
.t-box { flex: 1; text-align: center; }
.t-logo { width: 80px; height: 80px; background: var(--bg2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 1px solid var(--border); }
.t-logo img { width: 50px; height: 50px; object-fit: contain; }
.t-name { font-family: var(--font-title); font-size: 16px; color: #fff; }
.prob-row { margin-bottom: 15px; }
.prob-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; font-weight: 700; }
.bar-bg { height: 10px; background: var(--bg2); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
.grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
.s-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; }
.s-label { font-size: 9px; color: var(--dim); margin-bottom: 5px; font-weight: 800; }
.s-val { font-family: var(--font-title); font-size: 24px; }
.rec-card { border-radius: 20px; padding: 20px; text-align: center; border: 2px solid rgba(0,255,135,0.2); background: linear-gradient(180deg, rgba(0,255,135,0.05) 0%, transparent 100%); }
.rec-tip { font-family: var(--font-title); font-size: 26px; color: var(--accent); margin: 5px 0; }
.spinner { width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
  <div class="header"><div class="logo-text">FUTPREDICT ELITE</div></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('predictor',this)">Analizador</button>
    <button class="tab" onclick="showTab('historial',this)">Historial</button>
  </div>

  <div id="tab-predictor">
    <div class="card">
      <label>Seleccionar Competición</label>
      <select id="liga" onchange="conectarLiga(this.value)">
        <option value="">Elegir liga...</option>
        <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
        <option value="140">La Liga 🇪🇸</option>
        <option value="135">Serie A 🇮🇹</option>
        <option value="78">Bundesliga 🇩🇪</option>
        <option value="61">Ligue 1 🇫🇷</option>
        <option value="239">Liga BetPlay 🇨🇴</option>
        <option value="262">Liga MX 🇲🇽</option>
      </select>
      <div id="tag" class="season-tag" style="display:none"></div>

      <label>Equipo Local</label>
      <select id="local" disabled><option>Cargando equipos...</option></select>

      <label>Equipo Visitante</label>
      <select id="visitante" disabled><option>Cargando equipos...</option></select>

      <button id="btn" class="btn-main" disabled onclick="procesarAnalisis()">ANALIZAR PARTIDO</button>
    </div>

    <div id="resultado" class="result-section">
      <div class="card">
        <div class="teams-header">
          <div class="t-box"><div class="t-logo"><img id="imgL" src=""></div><div id="txtL" class="t-name"></div></div>
          <div style="font-family:var(--font-title); font-size:24px; color:var(--accent)">VS</div>
          <div class="t-box"><div class="t-logo"><img id="imgV" src=""></div><div id="txtV" class="t-name"></div></div>
        </div>

        <div class="prob-row">
          <div class="prob-info"><span>LOCAL</span><span id="vL">0%</span></div>
          <div class="bar-bg"><div id="bL" class="bar-fill" style="background:var(--accent)"></div></div>
        </div>
        <div class="prob-row">
          <div class="prob-info"><span>EMPATE</span><span id="vE">0%</span></div>
          <div class="bar-bg"><div id="bE" class="bar-fill" style="background:var(--dim)"></div></div>
        </div>
        <div class="prob-row">
          <div class="prob-info"><span>VISITANTE</span><span id="vV">0%</span></div>
          <div class="bar-bg"><div id="bV" class="bar-fill" style="background:var(--accent2)"></div></div>
        </div>

        <div class="grid-stats">
          <div class="s-box"><div class="s-label">AMBOS MARCAN</div><div id="sAmbos" class="s-val" style="color:var(--accent)">0%</div></div>
          <div class="s-box"><div class="s-label">Goles +2.5</div><div id="sOver" class="s-val" style="color:var(--gold)">0%</div></div>
        </div>

        <div class="rec-card">
          <div class="s-label">PICK DE ALTA CONFIANZA</div>
          <div id="pick" class="rec-tip">—</div>
          <div id="riesgo" style="font-size:10px; font-weight:800; color:var(--dim)">ANALIZANDO MERCADO...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-historial" style="display:none; padding:20px; text-align:center; color:var(--dim)">
    Próximamente: Historial en la nube.
  </div>
</div>

<script>
const KEY = "3d62e7e48993262cddf921e75fcb4ea8be6f70be";
const BASE = "https://v3.football.api-sports.io";

let db = {};
let ligaActual = '';
let anioActual = 2026;

// --- MEJORA: BUSCADOR INTELIGENTE DE TEMPORADA ---
async function conectarLiga(id) {
  if(!id) return;
  const tag = document.getElementById('tag');
  const btn = document.getElementById('btn');
  tag.style.display = 'inline-flex';
  tag.className = 'season-tag wait';
  tag.innerHTML = '<span class="spinner"></span> Sincronizando API...';

  // Intentamos 2025 (temporada europea activa) o 2026
  const anios = [2026, 2025, 2024];
  let listo = false;

  for(let a of anios) {
    try {
      const r = await fetch(`${BASE}/standings?league=${id}&season=${a}`, {headers: {"x-apisports-key": KEY}});
      const d = await r.json();
      if(d.response && d.response.length > 0) {
        anioActual = a;
        mapearEquipos(d.response[0].league.standings.flat());
        listo = true; break;
      }
    } catch(e) { console.log("Error en año " + a); }
  }

  if(listo) {
    tag.className = 'season-tag ok';
    tag.innerHTML = '✓ Temporada ' + anioActual + ' Conectada';
    btn.disabled = false;
    document.getElementById('local').disabled = false;
    document.getElementById('visitante').disabled = false;
  } else {
    tag.className = 'season-tag error';
    tag.innerHTML = '✗ Error de conexión';
  }
}

function mapearEquipos(lista) {
  db = {};
  const selL = document.getElementById('local');
  const selV = document.getElementById('visitante');
  selL.innerHTML = selV.innerHTML = "";

  lista.forEach(t => {
    db[t.team.name] = {
      id: t.team.id,
      logo: t.team.logo,
      atk: (t.all.goals.for / t.all.played) || 1.1,
      def: (t.all.goals.against / t.all.played) || 1.1,
      form: t.form || 'WWDDD'
    };
    let opt = new Option(t.team.name, t.team.name);
    selL.add(opt.cloneNode(true));
    selV.add(opt);
  });
}

// --- MEJORA: MOTOR DE PREDICCIÓN OPTIMIZADO ---
function procesarAnalisis() {
  const nL = document.getElementById('local').value;
  const nV = document.getElementById('visitante').value;
  if(nL === nV) return alert("Selecciona equipos distintos");

  const L = db[nL];
  const V = db[nV];

  // 1. Cálculo de Poisson con Factor de Forma Reciente
  const fL = calcularPesoForma(L.form);
  const fV = calcularPesoForma(V.form);

  const expL = (L.atk * V.def * 1.15) * fL; // 1.15 es ventaja local promedio
  const expV = (V.atk * L.def) * fV;

  // 2. Probabilidades
  let pL = (expL / (expL + expV + 0.5)) * 100;
  let pV = (expV / (expL + expV + 0.5)) * 100;
  let pE = 100 - pL - pV;

  // 3. Probabilidad Ambos Marcan (Basada en promedio de goles esperados)
  const btts = (1 - (1/expL)) * (1 - (1/expV)) * 100;
  const over25 = ((expL + expV) / 4) * 100;

  // Renderizar UI
  document.getElementById('resultado').classList.add('visible');
  document.getElementById('imgL').src = L.logo;
  document.getElementById('imgV').src = V.logo;
  document.getElementById('txtL').innerText = nL;
  document.getElementById('txtV').innerText = nV;

  document.getElementById('vL').innerText = pL.toFixed(1) + '%';
  document.getElementById('vE').innerText = pE.toFixed(1) + '%';
  document.getElementById('vV').innerText = pV.toFixed(1) + '%';
  document.getElementById('bL').style.width = pL + '%';
  document.getElementById('bE').style.width = pE + '%';
  document.getElementById('bV').style.width = pV + '%';

  document.getElementById('sAmbos').innerText = Math.min(btts + 20, 95).toFixed(0) + '%';
  document.getElementById('sOver').innerText = Math.min(over25 + 15, 88).toFixed(0) + '%';

  // 4. Recomendación Inteligente (Value Bet)
  let pick = "Doble Oportunidad L o E";
  let riesgo = "Riesgo: MEDIO";

  if(pL > 60) { pick = "Gana Local (1) 💎"; riesgo = "Riesgo: BAJO"; }
  else if(pV > 60) { pick = "Gana Visitante (2) 🚀"; riesgo = "Riesgo: BAJO"; }
  else if(btts > 65) { pick = "Ambos Marcan (SI) ⚽"; riesgo = "Riesgo: MEDIO"; }
  else if(pE > 35) { pick = "Empate o Visitante (X2) 🛡️"; riesgo = "Riesgo: BAJO"; }

  document.getElementById('pick').innerText = pick;
  document.getElementById('riesgo').innerText = riesgo;
}

// Factor de peso: los últimos partidos valen más que los primeros
function calcularPesoForma(str) {
  const pts = { 'W': 1.2, 'D': 1.0, 'L': 0.7 };
  const arr = str.split('').slice(-5);
  let suma = 0;
  let pesos = [0.1, 0.15, 0.2, 0.25, 0.3]; // El último vale 30% del total
  arr.forEach((char, i) => {
    suma += (pts[char] || 1) * pesos[i];
  });
  return suma;
}

function showTab(id, b) {
  document.getElementById('tab-predictor').style.display = id === 'predictor' ? 'block' : 'none';
  document.getElementById('tab-historial').style.display = id === 'historial' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  b.classList.add('active');
}
</script>
</body>
</html>
