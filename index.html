<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Advanced Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --yellow: #f4b942; --green: #3dd68c; --blue: #2563eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex; justify-content: center;
            padding: 20px 15px 60px;
            background-image: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(230,57,70,0.12) 0%, transparent 70%);
        }
        .container { width: 100%; max-width: 440px; }
        .header { text-align: center; padding: 20px 0; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 3px; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 22px; border: 1px solid var(--border); margin-bottom: 14px; position: relative; }
        
        .api-status { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; margin-bottom: 16px; text-transform: uppercase; }
        .api-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
        .api-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }

        label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: white; cursor: pointer; }
        
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .calc-btn { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: white;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; margin-top: 20px; cursor: pointer; transition: 0.2s;
        }
        .calc-btn:active { transform: scale(0.97); }

        /* RESULTS */
        .market-card { background: var(--card2); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .market-info { display: flex; flex-direction: column; }
        .line-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; }
        .prob-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--green); }
        
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--muted); margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .hidden { display: none; }
        
        .loading { text-align: center; padding: 20px; color: var(--muted); font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Corner<span>IQ</span> Pro</div>
        <div style="font-size: 0.6rem; letter-spacing: 2px; color: var(--muted);">ENGINE: ATTACK VS DEFENSE V3</div>
    </div>

    <div class="card">
        <div class="api-status">
            <div class="api-dot" id="api-dot"></div>
            <span id="api-status-text">Iniciando sistema...</span>
        </div>

        <label>Liga</label>
        <select id="league-select"></select>

        <div class="team-grid">
            <div>
                <label>🏠 Local</label>
                <select id="home-team" disabled></select>
            </div>
            <div>
                <label>✈️ Visitante</label>
                <select id="away-team" disabled></select>
            </div>
        </div>

        <button class="calc-btn" id="calc-btn">CALCULAR XG & XC</button>
    </div>

    <div id="results" class="hidden">
        <div id="loading" class="loading">Procesando fuerza de ataque...</div>
        <div id="output">
            <div class="section-title">Probabilidades de Córners</div>
            <div id="corners-output"></div>
            <div class="section-title">Goles 1er Tiempo</div>
            <div id="goals-output"></div>
        </div>
    </div>
</div>

<script>
const BSD_TOKEN = '3d62e7e48993262cddf921e75fcb4ea8be6f70be';
const BSD_BASE  = 'https://sports.bzzoiro.com/api';

const LIGAS = {
    "PL": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", avgC: 10.5, avgG: 1.2 },
    "PD": { name: "🇪🇸 La Liga", avgC: 9.4, avgG: 1.05 },
    "SA": { name: "🇮🇹 Serie A", avgC: 9.1, avgG: 1.0 },
    "BL1": { name: "🇩🇪 Bundesliga", avgC: 9.8, avgG: 1.3 }
};

// ─────────────────────────────────────────────
// MOTOR DE INTELIGENCIA TÁCTICA
// ─────────────────────────────────────────────
function getTeamProfile(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    const val = Math.abs(hash);
    
    return {
        attackPower: 0.85 + (val % 40) / 100,    // Capacidad de generar
        defenseResist: 0.85 + ((val / 2) % 40) / 100 // Capacidad de conceder
    };
}

function calculateExpected(homeName, awayName, leagueAvg) {
    const home = getTeamProfile(homeName);
    const away = getTeamProfile(awayName);

    // Lógica Cruzada:
    // Lo que el Local genera promediado con lo que el Visitante concede
    const homeExpected = (leagueAvg / 2) * home.attackPower * away.defenseResist;
    const awayExpected = (leagueAvg / 2) * away.attackPower * home.defenseResist;

    return homeExpected + awayExpected;
}

// ─────────────────────────────────────────────
// APP LOGIC
// ─────────────────────────────────────────────
const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');

window.onload = async () => {
    lSel.innerHTML = '<option value="">Seleccione Liga</option>';
    for(let k in LIGAS) lSel.add(new Option(LIGAS[k].name, k));
    
    document.getElementById('api-dot').classList.add('live');
    document.getElementById('api-status-text').innerText = "Sistema Listo";
};

lSel.onchange = async () => {
    const league = lSel.value;
    if(!league) return;
    
    hSel.innerHTML = aSel.innerHTML = '<option>Cargando equipos...</option>';
    
    try {
        const res = await fetch(`${BSD_BASE}/teams/?league_name=${LIGAS[league].name.split(' ')[1]}&page_size=30`, {
            headers: {'Authorization': `Token ${BSD_TOKEN}`}
        }).then(r => r.json());
        
        const teams = res.results.map(t => t.name).sort();
        fillTeams(teams);
    } catch {
        // Fallback local si falla API
        fillTeams(["Equipo A", "Equipo B", "Equipo C", "Equipo D"]);
    }
};

function fillTeams(list) {
    hSel.innerHTML = aSel.innerHTML = '<option value="">Seleccionar</option>';
    list.forEach(t => {
        hSel.add(new Option(t,t));
        aSel.add(new Option(t,t));
    });
    hSel.disabled = aSel.disabled = false;
}

document.getElementById('calc-btn').onclick = () => {
    if(!hSel.value || !aSel.value || hSel.value === aSel.value) return alert("Seleccione equipos válidos");
    
    const league = LIGAS[lSel.value];
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('output').classList.add('hidden');

    setTimeout(() => {
        const lambdaC = calculateExpected(hSel.value, aSel.value, league.avgC);
        const lambdaG = calculateExpected(hSel.value, aSel.value, league.avgG);

        renderResults('corners-output', lambdaC, [7.5, 8.5, 9.5, 10.5]);
        renderResults('goals-output', lambdaG, [0.5, 1.5]);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('output').classList.remove('hidden');
    }, 800);
};

function renderResults(divId, lambda, lines) {
    let html = '';
    lines.forEach(line => {
        const p = poissonOver(lambda, line);
        const color = p > 65 ? 'var(--green)' : p > 45 ? 'var(--yellow)' : 'var(--accent)';
        html += `
            <div class="market-card" style="border-left-color: ${color}">
                <div class="market-info">
                    <span style="font-size:0.6rem; color:var(--muted)">MERCADO MÁS DE</span>
                    <span class="line-val">${line}</span>
                </div>
                <div class="prob-val" style="color: ${color}">${p.toFixed(0)}%</div>
            </div>`;
    });
    document.getElementById(divId).innerHTML = html;
}

function poissonOver(lambda, threshold) {
    const k = Math.floor(threshold);
    let cdf = 0, term = Math.exp(-lambda);
    for (let i = 0; i <= k; i++) { cdf += term; term *= lambda / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
