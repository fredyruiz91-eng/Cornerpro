    // ========== CARGA DESDE LOCALSTORAGE ==========
    function loadSavedData() {
        for (let key of Object.keys(LIGAS)) {
            const savedDB = localStorage.getItem(`team_db_${key}`);
            const savedAvg = localStorage.getItem(`goals_avg_${key}`);
            if (savedDB && savedAvg) {
                try {
                    TEAM_STRENGTH_DB[key] = JSON.parse(savedDB);
                    LIGAS[key].goalsAvg = parseFloat(savedAvg);
                } catch(e) {}
            }
        }
    }

    // ========== API ==========
    async function apiFetch(endpoint) {
        const url = API_BASE + endpoint;
        const response = await fetch(url, {
            headers: { 'x-apisports-key': API_KEY }
        });
        if (!response.ok) {
            const errBody = await response.text();
            let msg = `Error ${response.status}`;
            if (response.status === 401) msg = 'API Key inválida o expirada';
            else if (response.status === 403) msg = 'Acceso denegado (plan insuficiente o límite excedido)';
            else if (response.status === 429) msg = 'Demasiadas peticiones. Espera un minuto.';
            throw new Error(msg + (errBody ? ' - ' + errBody.substring(0,100) : ''));
        }
        return response.json();
    }

    async function updateLeagueData(leagueKey, showAlert = true) {
        if (isUpdating) return;
        if (!API_KEY) { if(showAlert) alert('API key no configurada'); return; }
        const leagueId = LEAGUE_IDS[leagueKey];
        if (!leagueId) { if(showAlert) alert('Liga no soportada en API'); return; }

        isUpdating = true;
        document.getElementById('api-text').textContent = '⏳ Conectando...';
        document.getElementById('api-dot').classList.add('warning');

        try {
            // 1. Equipos
            const teamsRes = await apiFetch(`/teams?league=${leagueId}&season=${CURRENT_SEASON}`);
            const teams = teamsRes.response;

            const teamStats = {};
            let totalGoals = 0, totalMatches = 0;

            // 2. Estadísticas por equipo
            for (let t of teams) {
                const statsRes = await apiFetch(`/teams/statistics?league=${leagueId}&season=${CURRENT_SEASON}&team=${t.team.id}`);
                const stats = statsRes.response;
                const played = stats.fixtures.played.total;
                if (played === 0) continue;

                const goalsFor = stats.goals.for.total.total;
                const goalsAgainst = stats.goals.against.total.total;
                const avgFor = goalsFor / played;
                const avgAgainst = goalsAgainst / played;

                const name = normalizeName(t.team.name);
                teamStats[name] = { avgFor, avgAgainst, played };
                totalGoals += goalsFor;
                totalMatches += played;
            }

            if (totalMatches === 0) throw new Error('No hay partidos jugados en esta temporada.');
            const leagueAvg = totalGoals / totalMatches;

            // Construir nueva DB
            const newDB = {};
            for (let [name, data] of Object.entries(teamStats)) {
                newDB[name] = {
                    atk: +(data.avgFor / leagueAvg).toFixed(3),
                    def: +(data.avgAgainst / leagueAvg).toFixed(3)
                };
            }

            // Actualizar globales
            TEAM_STRENGTH_DB[leagueKey] = newDB;
            LIGAS[leagueKey].goalsAvg = +leagueAvg.toFixed(2);

            // Guardar en localStorage
            localStorage.setItem(`team_db_${leagueKey}`, JSON.stringify(newDB));
            localStorage.setItem(`goals_avg_${leagueKey}`, leagueAvg.toFixed(2));
            localStorage.setItem(`last_update_${leagueKey}`, Date.now().toString());

            document.getElementById('api-text').textContent = '✅ Datos actualizados (2026)';
            document.getElementById('api-dot').classList.remove('warning');
            if (showAlert) alert(`${LIGAS[leagueKey].name} actualizado. Media: ${leagueAvg.toFixed(2)} goles/partido`);

            loadTeams(leagueKey);
        } catch (error) {
            console.error(error);
            let userMsg = error.message;
            if (error instanceof TypeError && error.message === 'Failed to fetch') {
                userMsg = 'Error de conexión. Posible bloqueo CORS. Usa el proxy o carga un JSON.';
            }
            document.getElementById('api-text').textContent = '❌ Fallo actualización';
            document.getElementById('api-dot').classList.add('warning');
            if (showAlert) alert('Error: ' + userMsg);
        } finally {
            isUpdating = false;
        }
    }

    // ========== CARGA MANUAL DE JSON ==========
    function handleFileUpload(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                // Esperamos un objeto con formato: { leagueKey: { teams: {...}, goalsAvg: 2.85 } }
                for (let [key, value] of Object.entries(data)) {
                    if (LIGAS[key] && value.teams && value.goalsAvg) {
                        TEAM_STRENGTH_DB[key] = value.teams;
                        LIGAS[key].goalsAvg = value.goalsAvg;
                        localStorage.setItem(`team_db_${key}`, JSON.stringify(value.teams));
                        localStorage.setItem(`goals_avg_${key}`, value.goalsAvg);
                        localStorage.setItem(`last_update_${key}`, Date.now().toString());
                    }
                }
                if (currentLeagueKey) loadTeams(currentLeagueKey);
                alert('Datos cargados correctamente desde JSON.');
                document.getElementById('api-text').textContent = '📂 Datos desde archivo';
                document.getElementById('api-dot').classList.remove('warning');
            } catch (err) {
                alert('Error al leer el archivo JSON: ' + err.message);
            }
        };
        reader.readAsText(file);
    }
