<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data.Predict · PRO v2.6 COMPLETO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --card: rgba(16, 20, 32, 0.55);
            --card2: rgba(22, 27, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f8;
            --muted: #7b8aa6;
            --accent: #ff4d5a;
            --accent-glow: rgba(255, 77, 90, 0.5);
            --yellow: #ffb627;
            --yellow-glow: rgba(255, 182, 39, 0.5);
            --green: #2ecc71;
            --green-glow: rgba(46, 204, 113, 0.5);
            --blue: #4dabf7;
            --purple: #9775fa;
            --purple-glow: rgba(151, 117, 250, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-bg-strong: rgba(255, 255, 255, 0.06);
            --text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --win: #2ecc71;
            --lose: #ff4d5a;
            --pending: #ffb627;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 15px 60px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(255, 77, 90, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(46, 204, 113, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(77, 171, 247, 0.06) 0%, transparent 60%);
            z-index: 0;
            animation: bgPulse 12s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 30% 70%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 70% 30%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 90% 60%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(2px 2px at 15% 85%, rgba(255, 182, 39, 0.4), transparent),
                radial-gradient(1px 1px at 55% 45%, rgba(46, 204, 113, 0.4), transparent);
            background-size: 200% 200%;
            animation: particleDrift 30s linear infinite;
        }
        @keyframes particleDrift {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }
        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 28px 20px 20px;
            margin-bottom: 8px;
            background: rgba(20, 25, 40, 0.5);
            backdrop-filter: blur(25px);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 77, 90, 0.3), transparent, rgba(46, 204, 113, 0.3), transparent);
            animation: rotateGlow 12s linear infinite;
            opacity: 0.4;
        }
        @keyframes rotateGlow {
            to {
                transform: rotate(360deg);
            }
        }
        .header>* {
            position: relative;
            z-index: 1;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.2rem;
            letter-spacing: 5px;
            color: white;
            line-height: 1;
            text-shadow: 0 0 30px var(--accent-glow), 0 2px 10px rgba(0, 0, 0, 0.6);
            background: linear-gradient(135deg, #ffffff 0%, #ff8a95 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .logo span {
            -webkit-text-fill-color: transparent;
            background: linear-gradient(135deg, var(--accent), #ff8a95);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .badge {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(255, 77, 90, 0.1);
            border: 1px solid rgba(255, 77, 90, 0.3);
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 77, 90, 0.15);
            margin: 0 4px;
        }
        .card {
            background: rgba(20, 25, 40, 0.45);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .api-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }
        .api-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.8);
        }
        .league-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .league-pill {
            padding: 6px 13px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
        }
        .league-pill:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(255, 77, 90, 0.1);
            transform: translateY(-2px);
        }
        .league-pill.active {
            background: linear-gradient(135deg, rgba(255, 77, 90, 0.25), rgba(77, 171, 247, 0.2));
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(255, 77, 90, 0.3);
        }
        label {
            display: block;
            margin: 14px 0 5px;
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(20, 25, 40, 0.4);
            backdrop-filter: blur(15px);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 77, 90, 0.15);
        }
        select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .team-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .markets-label {
            display: block;
            margin: 14px 0 8px;
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 700;
        }
        .market-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .mkt-toggle {
            padding: 6px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
        }
        .mkt-toggle.on {
            background: rgba(46, 204, 113, 0.2);
            border-color: rgba(46, 204, 113, 0.5);
            color: var(--green);
        }
        .mkt-toggle.unavailable {
            opacity: 0.25;
            cursor: not-allowed;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            border: none;
            background: linear-gradient(135deg, var(--accent), #ff6b7a);
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-top: 18px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 77, 90, 0.4);
            text-transform: uppercase;
        }
        .calc-btn:hover {
            transform: translateY(-3px);
        }
        .loading-state {
            text-align: center;
            padding: 32px;
            color: var(--muted);
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .match-header {
            background: rgba(20, 25, 40, 0.5);
            backdrop-filter: blur(25px);
            border-radius: var(--radius-lg);
            padding: 22px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .teams-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
        }
        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .team-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: white;
            text-align: center;
        }
        .vs-center {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .result-boxes {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            margin-top: 16px;
        }
        .result-box {
            background: rgba(20, 25, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            padding: 12px 8px;
            text-align: center;
        }
        .rb-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .rb-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 10px;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--text);
        }
        .section-lambda {
            margin-left: auto;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .section-lambda span {
            color: var(--yellow);
        }
        .market-card {
            background: rgba(20, 25, 40, 0.3);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 10px;
        }
        .market-card.high {
            border-left: 3px solid var(--green);
        }
        .market-card.mid {
            border-left: 3px solid var(--yellow);
        }
        .market-card.low {
            border-left: 3px solid var(--accent);
        }
        .line-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: white;
            min-width: 44px;
        }
        .bar-wrap {
            flex: 1;
        }
        .bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 1.5s ease;
        }
        .bar-sub {
            font-size: 0.62rem;
            color: var(--muted);
        }
        .pct-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            text-align: right;
            min-width: 48px;
        }
        .save-bet-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--muted);
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .save-bet-btn:hover {
            background: rgba(46, 204, 113, 0.2);
            border-color: rgba(46, 204, 113, 0.5);
            color: var(--green);
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.2);
        }
        .save-bet-btn.saved {
            background: rgba(46, 204, 113, 0.25);
            border-color: rgba(46, 204, 113, 0.6);
            color: var(--green);
            animation: savedPulse 0.6s ease;
        }
        @keyframes savedPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }
        .recomendacion {
            background: rgba(20, 25, 40, 0.5);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            margin-top: 8px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .rec-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: white;
        }
        /* Sección de Apuestas Guardadas */
        .bets-section {
            background: rgba(20, 25, 40, 0.45);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .bets-section .section-title {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .bets-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.5px;
        }
        .bets-stats span {
            background: rgba(255, 255, 255, 0.04);
            padding: 5px 10px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .bets-stats .stat-win {
            color: var(--green);
        }
        .bets-stats .stat-lose {
            color: var(--accent);
        }
        .bets-stats .stat-pending {
            color: var(--yellow);
        }
        .bet-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }
        .bet-item.won {
            border-left: 3px solid var(--green);
            background: rgba(46, 204, 113, 0.06);
        }
        .bet-item.lost {
            border-left: 3px solid var(--accent);
            background: rgba(255, 77, 90, 0.06);
        }
        .bet-item.pending {
            border-left: 3px solid var(--yellow);
        }
        .bet-info {
            font-size: 0.75rem;
            line-height: 1.5;
        }
        .bet-info .bet-match {
            font-weight: 700;
            color: var(--text);
            font-size: 0.8rem;
        }
        .bet-info .bet-detail {
            color: var(--muted);
            font-size: 0.68rem;
        }
        .bet-info .bet-prob {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .bet-actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .bet-actions button {
            padding: 5px 10px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            cursor: pointer;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .bet-actions .btn-won:hover {
            background: rgba(46, 204, 113, 0.3);
            border-color: var(--green);
            color: var(--green);
        }
        .bet-actions .btn-lost:hover {
            background: rgba(255, 77, 90, 0.3);
            border-color: var(--accent);
            color: var(--accent);
        }
        .bet-actions .btn-delete:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        .bet-actions .btn-pending:hover {
            background: rgba(255, 182, 39, 0.3);
            border-color: var(--yellow);
            color: var(--yellow);
        }
        .no-bets {
            text-align: center;
            color: var(--muted);
            font-size: 0.75rem;
            padding: 20px;
            opacity: 0.6;
        }
        .clear-all-bets {
            display: block;
            margin: 10px auto 0;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 77, 90, 0.3);
            background: rgba(255, 77, 90, 0.08);
            color: var(--accent);
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .clear-all-bets:hover {
            background: rgba(255, 77, 90, 0.2);
            border-color: var(--accent);
        }
        .disclaimer {
            text-align: center;
            color: var(--muted);
            font-size: 0.6rem;
            margin-top: 20px;
            opacity: 0.5;
        }
        .hidden {
            display: none;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-in {
            animation: fadeUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <div class="header">
            <div class="logo">Data<span>Predict</span></div>
            <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
                <div class="badge">⚡ v2.6 COMPLETO</div>
            </div>
        </div>
        <div class="card">
            <div class="api-status">
                <div class="api-dot"></div>
                <span>🟢 LISTO - Base de Datos Local Completa</span>
            </div>
            <label>Liga / Competencia</label>
            <div class="league-pills" id="league-pills"></div>

            </div>

            <div class="market-toggles" id="market-toggles"></div>

            </div>
        </div>
    </div>

    <script>
        const LIGAS = {
            "PL": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", goalsAvg: 2.85, negBinR: 5.4, markets: { goles: true, ht: true, btts: true,
                    corn: true } },
            "BL1": { name: "🇩🇪 Bundesliga", goalsAvg: 3.00, negBinR: 5.9, markets: { goles: true, ht: true, btts: true,
                    corn: true } },
            "SA": { name: "🇮🇹 Serie A", goalsAvg: 2.65, negBinR: 7.1, markets: { goles: true, ht: true, btts: false,
                corn: true } },

        // ==================== SISTEMA DE APUESTAS GUARDADAS ====================
        const STORAGE_KEY = 'dataPredict_bets_v26';

        function getSavedBets() {

                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveBetsToStorage(bets) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
            } catch (e) {
                // localStorage lleno o no disponible
            }
        }

        function addBet(betData) {
            const bets = getSavedBets();
            betData.id = Date.now();
            betData.fecha = new Date().toISOString();
            betData.status = 'pending';
            bets.unshift(betData);
            saveBetsToStorage(bets);
            renderSavedBets();
            return betData;
        }

        function updateBetStatus(betId, newStatus) {
            const bets = getSavedBets();
            const bet = bets.find(b => b.id === betId);
            if (bet) {
                bet.status = newStatus;
                saveBetsToStorage(bets);
                renderSavedBets();
            }
        }

        function deleteBet(betId) {
            let bets = getSavedBets();
            bets = bets.filter(b => b.id !== betId);
            saveBetsToStorage(bets);
            renderSavedBets();
        }

            const won = bets.filter(b => b.status === 'won').length;
            const lost = bets.filter(b => b.status === 'lost').length;
            const pending = bets.filter(b => b.status === 'pending').length;
            const resolved = won + lost;
            const winRate = resolved > 0 ? Math.round((won / resolved) * 100) : 0;
            return { total, won, lost, pending, winRate };
        }

        function guardarApuesta(mercado, pick, probabilidad) {

        // ==================== FIN SISTEMA DE APUESTAS ====================

        function plattCalibrate(raw, type) {
            const p = Math.max(0.001, Math.min(0.999, raw / 100));
            const logit = Math.log(p / (1 - p));
            const params = PLATT_PARAMS[type] || { A: 0.93, B: -0.04 };
            const calibrated = 1 / (1 + Math.exp(-(params.A * logit + params.B)));
            return Math.min(98, Math.max(2, calibrated * 100));
        }

        function poissonExact(lambda, k) { let t = Math.exp(-lambda); for (let i = 0; i < k; i++) t *= lambda / (i +
            1); return t; }

        function poissonProb(lambda, k) { let p = Math.exp(-lambda),
            t = p; for (let i = 1; i <= k; i++) { t *= lambda / i;
            p += t; } return p; }

        function poissonOver(lambda, th) { return Math.min(98, Math.max(2, (1 - poissonProb(lambda, Math.floor(th))) *
            100)); }

        function negBinExact(mu, r, k) { const p = r / (r + mu); let logP = 0; for (let i = 0; i < k; i++) logP += Math
                .log(r + i) - Math.log(i + 1);
            logP += r * Math.log(p) + k * Math.log(1 - p); return Math.exp(logP); }

        function negBinOver(mu, th, r = 6.0) { const k = Math.floor(th); let cdf = 0; for (let i = 0; i <= k; i++) cdf +=
                negBinExact(mu, r, i); return Math.min(98, Math.max(2, (1 - cdf) * 100)); }

        function dixonColesTau(x, y, lH, lA, rho) { if (x === 0 && y === 0) return 1 - lH * lA * rho; if (x === 0 && y ===
                1) return 1 + lH * rho; if (x === 1 && y === 0) return 1 + lA * rho; if (x === 1 && y === 1) return 1 -
                rho; return 1; }

        function calcBTTS(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; const
            p00 = poissonExact(lH, 0) * poissonExact(lA, 0) * dixonColesTau(0, 0, lH, lA, rho); return Math.min(98, Math
                .max(2, (1 - Math.exp(-lH) - Math.exp(-lA) + p00) * 100)); }

        function calcResultProbs(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default;
            let pH = 0,
                pD = 0,
                pA = 0; for (let h = 0; h <= 10; h++) { for (let a = 0; a <= 10; a++) { let p = poissonExact(lH, h) *
                    poissonExact(lA, a); if (h <= 1 && a <= 1) p *= dixonColesTau(h, a, lH, lA, rho); if (h > a) pH +=
                    p;
                else if (h === a) pD += p;
                else pA += p; } } const t = pH + pD + pA; return { home: +(pH / t * 100).toFixed(1), draw: +(pD / t * 100)
                    .toFixed(1), away: +(pA / t * 100).toFixed(1) }; }

        function colorFor(p) { return p >= 65 ? 'var(--green)' : p >= 42 ? 'var(--yellow)' : 'var(--accent)'; }

        function cardClassFor(p) { return p >= 65 ? 'high' : p >= 42 ? 'mid' : 'low'; }

                    html +=

                    html +=

                    cornLines.forEach(line => {

                    // Si corn está desactivado para la liga, igual mostramos una sección mínima
                    html +=
                        `<div class="section-header animate-in"><span class="section-title">⬡ CORNERS TOTALES</span></div>
                        <div style="text-align:center;color:var(--muted);font-size:0.7rem;padding:8px;">⚠️ Mercado no disponible para esta liga</div>`;
                }

                document.getElementById('all-markets-container').innerHTML = html;
                const l15 = lH + lA;
                const probG15 = plattCalibrate(poissonOver(l15, 1.5), 'goals15');
                document.getElementById('recomendacion-container').innerHTML =
                    `<div class="recomendacion animate-in"><div class="rec-main" style="color:${colorFor(probG15)}">OVER 1.5</div></div>`;

                // Renderizar apuestas guardadas
                renderSavedBets();

                outEl.classList.remove('hidden');
                setTimeout(() => document.querySelectorAll('.bar-fill').forEach(bar => { const t = bar.dataset
                        .target; if (t) bar.style.width = t + '%'; }), 50);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 800);
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderLeaguePills();
            renderMarketToggles();
            // Inicializar con Premier League seleccionada
            const plPill = document.querySelector('.league-pill');
            if (plPill) {
                currentLeagueKey = 'PL';
                plPill.classList.add('active');
                const liga = LIGAS['PL'];
                activeMarkets = { goles: liga.markets.goles, ht: liga.markets.ht, btts: liga.markets.btts, corn: liga
                        .markets.corn };
                renderMarketToggles();
                loadTeams('PL');
            }
            // Renderizar apuestas guardadas al cargar
            renderSavedBets();
        });
    </script>
</body>
</html>
