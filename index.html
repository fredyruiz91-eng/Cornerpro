<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Líneas y Semáforo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942; --red: #ff4d4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; text-align: center; margin-bottom: 20px; color: white; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select, button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; cursor: pointer; font-size: 0.95rem; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; margin-top: 20px; color: white; transition: 0.3s; width: 100%; }
        .calc-btn:active { transform: scale(0.98); }
        .market-header { font-family: 'Bebas Neue', sans-serif; color: var(--accent); margin: 20px 0 8px; font-size: 1.2rem; border-left: 4px solid var(--accent); padding-left: 12px; }
        
        .market-row { 
            border-bottom: 2px solid var(--border); 
            padding: 14px 5px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: border-color 0.4s ease;
        }
        .market-row:last-child { border-bottom: none; }
        
        .market-name { font-weight: 500; font-size: 1rem; color: #fff; }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; }
        .status { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 12px; font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">CORNER<span>IQ</span> PRO</div>

    <div class="card">
        <label>Competición</label>
        <select id="league-select"></select>

        <label>Equipo Local</label>
        <select id="home-team"></select>

        <label>Equipo Visitante</label>
        <select id="away-team"></select>

        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
        <div id="status" class="status">Cargando base de datos...</div>
    </div>

    <div id="results" class="hidden">
        <div class="card">
            <div class="market-header">Mercado de Córners</div>
            <div id="corners-markets"></div>
            
            <div class="market-header" style="margin-top: 30px;">Mercado de Goles</div>
            <div id="goals-markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

const LIGAS = {
    "PD": { name: "🇪🇸 La Liga", id: "PD", avgC: 9.5, avgG: 1.05, teams: ["Alavés", "Athletic Club", "Atlético Madrid", "FC Barcelona", "Celta Vigo", "Espanyol", "Getafe", "Girona", "Las Palmas", "Leganés", "Levante UD", "Mallorca", "Osasuna", "Rayo Vallecano", "Real Betis", "Real Madrid", "Real Oviedo", "Real Sociedad", "Sevilla FC", "Valencia CF", "Valladolid", "Villarreal"] },
    "PL": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", id: "PL", avgC: 10.1, avgG: 1.15, teams: ["Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton", "Chelsea", "Crystal Palace", "Everton", "Fulham", "Ipswich Town", "Leicester City", "Liverpool", "Man City", "Man United", "Newcastle", "Nott'm Forest", "Southampton", "Tottenham", "West Ham", "Wolves"] },
    "V1": { name: "🇩🇪 Bundesliga", id: "V1", avgC: 9.8, avgG: 1.35, teams: ["Bayer Leverkusen", "Bayern München", "Borussia Dortmund", "Eintracht Frankfurt", "Heidenheim", "Hoffenheim", "Holstein Kiel", "Mainz 05", "Mönchengladbach", "RB Leipzig", "SC Freiburg", "St. Pauli", "Stuttgart", "Union Berlin", "VfL Bochum", "VfL Wolfsburg", "Werder Bremen"] },
    "EEB": { name: "🇧🇷 Brasileirão", id: "EEB", avgC: 9.4, avgG: 0.95, teams: ["Athletico-PR", "Atlético-MG", "Bahia", "Botafogo", "Corinthians", "Criciúma", "Cruzeiro", "Cuiabá", "Flamengo", "Fluminense", "Fortaleza", "Grêmio", "Internacional", "Juventude", "Palmeiras", "RB Bragantino", "São Paulo", "Vasco da Gama", "Vitória"] }
};

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const status = document.getElementById('status');

window.onload = () => {
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
    loadTeams();
};

// Genera un multiplicador basado en el nombre del equipo para que los resultados varíen
function getTeamWeight(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    // Retorna un factor entre 0.85 y 1.15 de forma determinista
    return (Math.abs(hash % 30) / 100) + 0.85;
}

async function loadTeams() {
    const code = lSel.value;
    status.innerText = "⚡ Sincronizando...";
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!response.ok) throw new Error();
        const data = await response.json();
        renderTeams(data.teams.map(t => t.name));
        status.innerText = "🟢 Datos Live Activos";
    } catch (e) {
        renderTeams(LIGAS[code].teams);
        status.innerText = "🟡 Modo Respaldo Local";
    }
}

function renderTeams(teamList) {
    hSel.innerHTML = aSel.innerHTML = '';
    teamList.sort().forEach(name => {
        hSel.add(new Option(name, name));
        aSel.add(new Option(name, name));
    });
}

function getTrafficColor(p) {
    if (p >= 70) return 'var(--green)';
    if (p >= 50) return 'var(--yellow)';
    return 'var(--red)';
}

lSel.onchange = loadTeams;

document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    const weightHome = getTeamWeight(hSel.value);
    const weightAway = getTeamWeight(aSel.value);
    
    // Nueva Lógica: El promedio de la liga se ajusta según los equipos elegidos
    const dynamicAvgC = liga.avgC * weightHome * weightAway;
    const dynamicAvgG = liga.avgG * ((weightHome + weightAway) / 2);

    document.getElementById('results').classList.remove('hidden');

    // Corners con líneas de colores dinámicas
    let cHtml = '';
    [7.5, 8.5, 9.5].forEach(line => {
        const p = poisson(dynamicAvgC, Math.floor(line));
        const color = getTrafficColor(p);
        cHtml += `
            <div class="market-row" style="border-bottom-color: ${color}">
                <span class="market-name">+${line} Córners</span>
                <span class="pct" style="color:${color}">${p.toFixed(0)}%</span>
            </div>`;
    });
    document.getElementById('corners-markets').innerHTML = cHtml;

    // Goles con línea de color dinámica
    const pG = poisson(dynamicAvgG, 0);
    const colorG = getTrafficColor(pG);
    document.getElementById('goals-markets').innerHTML = `
        <div class="market-row" style="border-bottom-color: ${colorG}">
            <span class="market-name">+0.5 Goles HT</span>
            <span class="pct" style="color:${colorG}">${pG.toFixed(0)}%</span>
        </div>
    `;
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
