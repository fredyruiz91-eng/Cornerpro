<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - SemГЎforo & Equipos Completos</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942; --red: #ff4d4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; text-align: center; margin-bottom: 20px; color: white; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select, button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; cursor: pointer; font-size: 0.95rem; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; margin-top: 20px; color: white; transition: 0.3s; }
        .calc-btn:active { transform: scale(0.98); }
        .market-header { font-family: 'Bebas Neue', sans-serif; color: var(--accent); margin: 20px 0 8px; font-size: 1.2rem; border-left: 4px solid var(--accent); padding-left: 12px; }
        .market-card { background: var(--card2); padding: 14px 18px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .market-name { font-weight: 500; font-size: 1rem; color: #fff; }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; }
        .status { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 12px; font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">CORNER<span>IQ</span> PRO</div>

    <div class="card">
        <label>CompeticiГіn</label>
        <select id="league-select"></select>

        <label>Equipo Local</label>
        <select id="home-team"></select>

        <label>Equipo Visitante</label>
        <select id="away-team"></select>

        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
        <div id="status" class="status">Cargando base de datos...</div>
    </div>

    <div id="results" class="hidden">
        <div class="card">
            <div class="market-header">Mercado de CГіrners</div>
            <div id="corners-markets"></div>
            
            <div class="market-header">Mercado de Goles</div>
            <div id="goals-markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

// LISTA COMPLETA RESTAURADA DE TODAS LAS LIGAS Y EQUIPOS
const LIGAS = {
    "PD": { 
        name: "рџ‡Єрџ‡ё La Liga", id: "PD", avgC: 9.5, avgG: 1.05, 
        teams: ["AlavГ©s", "Athletic Club", "AtlГ©tico Madrid", "FC Barcelona", "Celta Vigo", "Espanyol", "Getafe", "Girona", "Las Palmas", "LeganГ©s", "Levante UD", "Mallorca", "Osasuna", "Rayo Vallecano", "Real Betis", "Real Madrid", "Real Oviedo", "Real Sociedad", "Sevilla FC", "Valencia CF", "Valladolid", "Villarreal"] 
    },
    "PL": { 
        name: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї Premier League", id: "PL", avgC: 10.1, avgG: 1.15, 
        teams: ["Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton", "Chelsea", "Crystal Palace", "Everton", "Fulham", "Ipswich Town", "Leicester City", "Liverpool", "Man City", "Man United", "Newcastle", "Nott'm Forest", "Southampton", "Tottenham", "West Ham", "Wolves"] 
    },
    "V1": { 
        name: "рџ‡©рџ‡Є Bundesliga", id: "V1", avgC: 9.8, avgG: 1.35, 
        teams: ["Bayer Leverkusen", "Bayern MГјnchen", "Borussia Dortmund", "Eintracht Frankfurt", "Heidenheim", "Hoffenheim", "Holstein Kiel", "Mainz 05", "MГ¶nchengladbach", "RB Leipzig", "SC Freiburg", "St. Pauli", "Stuttgart", "Union Berlin", "VfL Bochum", "VfL Wolfsburg", "Werder Bremen"] 
    },
    "SA": { 
        name: "рџ‡®рџ‡№ Serie A", id: "SA", avgC: 9.0, avgG: 1.0, 
        teams: ["Atalanta", "Bologna", "Cagliari", "Como", "Empoli", "Fiorentina", "Genoa", "Inter Milan", "Juventus", "Lazio", "Lecce", "Milan", "Monza", "Napoli", "Parma", "Roma", "Torino", "Udinese", "Venezia", "Verona"] 
    },
    "FL1": { 
        name: "рџ‡«рџ‡· Ligue 1", id: "FL1", avgC: 9.3, avgG: 1.1, 
        teams: ["Angers", "Auxerre", "Brest", "Le Havre", "Lille", "Lyon", "Marseille", "Monaco", "Montpellier", "Nantes", "Nice", "PSG", "Reims", "Rennes", "Saint-Г‰tienne", "Strasbourg", "Toulouse"] 
    },
    "DED": { 
        name: "рџ‡ірџ‡± Eredivisie", id: "DED", avgC: 9.6, avgG: 1.3, 
        teams: ["Ajax", "Almere City", "AZ Alkmaar", "Feyenoord", "Fortuna Sittard", "Go Ahead Eagles", "Groningen", "Heerenveen", "Heracles", "NAC Breda", "NEC Nijmegen", "PEC Zwolle", "PSV Eindhoven", "RKC Waalwijk", "Sparta Rotterdam", "Twente", "Utrecht", "Willem II"] 
    },
    "ELC": { 
        name: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї Championship", id: "ELC", avgC: 9.7, avgG: 1.1, 
        teams: ["Blackburn", "Burnley", "Cardiff", "Coventry", "Derby County", "Hull City", "Leeds United", "Luton Town", "Middlesbrough", "Millwall", "Norwich City", "Oxford United", "Plymouth", "Portsmouth", "Preston", "QPR", "Sheffield Utd", "Sheffield Wed", "Sunderland", "Swansea City", "Watford", "West Brom"] 
    },
    "PPL": { 
        name: "рџ‡µрџ‡№ Primeira Liga", id: "PPL", avgC: 9.1, avgG: 1.0, 
        teams: ["Arouca", "AVS", "Benfica", "Boavista", "Braga", "Casa Pia", "Estoril", "Estrela", "FamalicГЈo", "Farense", "Gil Vicente", "Moreirense", "Nacional", "Porto", "Rio Ave", "Santa Clara", "Sporting CP", "VitГіria SC"] 
    },
    "EEB": { 
        name: "рџ‡§рџ‡· BrasileirГЈo", id: "EEB", avgC: 9.4, avgG: 0.95, 
        teams: ["Athletico-PR", "AtlГ©tico-MG", "Bahia", "Botafogo", "Corinthians", "CriciГєma", "Cruzeiro", "CuiabГЎ", "Flamengo", "Fluminense", "Fortaleza", "GrГЄmio", "Internacional", "Juventude", "Palmeiras", "RB Bragantino", "SГЈo Paulo", "Vasco da Gama", "VitГіria"] 
    }
};

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const status = document.getElementById('status');

window.onload = () => {
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
    loadTeams();
};

async function loadTeams() {
    const code = lSel.value;
    status.innerText = "вљЎ Sincronizando con API...";
    
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!response.ok) throw new Error();
        const data = await response.json();
        renderTeams(data.teams.map(t => t.name));
        status.innerText = "рџџў Datos Actualizados (API Live)";
    } catch (e) {
        renderTeams(LIGAS[code].teams);
        status.innerText = "рџџЎ Modo Respaldo (Base de Datos Local)";
    }
}

function renderTeams(teamList) {
    hSel.innerHTML = aSel.innerHTML = '';
    teamList.sort().forEach(name => {
        hSel.add(new Option(name, name));
        aSel.add(new Option(name, name));
    });
}

// FunciГіn del SemГЎforo
function getTrafficColor(p) {
    if (p >= 75) return 'var(--green)';
    if (p >= 55) return 'var(--yellow)';
    return 'var(--red)';
}

lSel.onchange = loadTeams;

document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    document.getElementById('results').classList.remove('hidden');

    // CГіrners: 7.5, 8.5, 9.5
    let cHtml = '';
    [7.5, 8.5, 9.5].forEach(line => {
        const p = poisson(liga.avgC, Math.floor(line));
        cHtml += `
            <div class="market-card">
                <span class="market-name">+${line} CГіrners</span>
                <span class="pct" style="color:${getTrafficColor(p)}">${p.toFixed(0)}%</span>
            </div>`;
    });
    document.getElementById('corners-markets').innerHTML = cHtml;

    // Gol 1er Tiempo (+0.5 HT)
    const pG = poisson(liga.avgG, 0);
    document.getElementById('goals-markets').innerHTML = `
        <div class="market-card">
            <span class="market-name">+0.5 Goles HT (1er T)</span>
            <span class="pct" style="color:${getTrafficColor(pG)}">${pG.toFixed(0)}%</span>
        </div>
    `;
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
