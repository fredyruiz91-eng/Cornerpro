<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - Predictor Maestro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --yellow: #f4b942; --green: #3dd68c; --blue: #4a90d9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; padding: 20px 15px 60px;
            background-image: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(230,57,70,0.12) 0%, transparent 70%);
        }
        .container { width: 100%; max-width: 440px; }
        .header { text-align: center; padding: 30px 0 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 3px; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 22px; border: 1px solid var(--border); margin-bottom: 14px; position: relative; }
        label { display: block; margin: 14px 0 6px; color: var(--muted); font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        select { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: var(--text); appearance: none; cursor: pointer; }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .vs-divider { display: flex; align-items: center; justify-content: center; margin: 4px 0; color: var(--muted); font-family: 'Bebas Neue', sans-serif; gap: 10px; }
        .vs-divider::before, .vs-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .calc-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin-top: 18px; cursor: pointer; box-shadow: 0 4px 20px rgba(230,57,70,0.3); }
        .market-header { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--accent); margin: 20px 0 10px; letter-spacing: 1px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .market-card { background: var(--card); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; border: 1px solid var(--border); display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 14px; }
        .line-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; color: white; line-height: 1; }
        .line-label small { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.6rem; color: var(--muted); }
        .bar-bg { background: rgba(255,255,255,0.05); height: 7px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s ease-out; }
        .pct-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; text-align: right; }
        .hidden { display: none; }
        .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Corner<span>IQ</span> Pro</div>
    </div>

    <div class="card">
        <label>Liga / Competencia</label>
        <select id="league-select"></select>
        <div class="vs-divider">VS</div>
        <div class="team-grid">
            <div class="team-col"><label>🏠 Local</label><select id="home-team" disabled></select></div>
            <div class="team-col"><label>✈️ Visitante</label><select id="away-team" disabled></select></div>
        </div>
        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
    </div>

    <div id="results" class="hidden">
        <div id="loading-indicator" class="card" style="text-align:center;"><div class="spinner"></div>Analizando Data Histórica...</div>
        <div id="output" class="hidden">
            <div class="market-header">📊 Mercado de Córners</div>
            <div id="markets-container"></div>
            <div class="market-header">⚽ Goles Primer Tiempo (HT)</div>
            <div id="goals-ht-container"></div>
        </div>
    </div>
</div>

<script>
const LIGAS = {
    "PL":  { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League", avgC: 10.1, avgG: 1.15, teams: ["Manchester City FC","Arsenal FC","Liverpool FC","Aston Villa FC","Tottenham Hotspur FC","Chelsea FC","Newcastle United FC","Manchester United FC","West Ham United FC","Crystal Palace FC","Brighton & Hove Albion FC","AFC Bournemouth","Fulham FC","Wolverhampton Wanderers FC","Everton FC","Brentford FC","Nottingham Forest FC","Leicester City FC","Ipswich Town FC","Southampton FC"] },
    "CL":  { name: "🇪🇺 Champions League", avgC: 9.8, avgG: 1.25, teams: ["Real Madrid CF","Manchester City FC","FC Bayern München","PSG","Arsenal FC","Inter Milano","FC Barcelona","Borussia Dortmund","Atlético de Madrid","Juventus FC","AC Milan","Bayer 04 Leverkusen","Aston Villa FC","RB Leipzig","PSV Eindhoven","Sporting CP"] },
    "BL1": { name: "🇩🇪 Bundesliga", avgC: 9.8, avgG: 1.35, teams: ["FC Bayern München","Borussia Dortmund","Bayer 04 Leverkusen","RB Leipzig","VfB Stuttgart","Eintracht Frankfurt","SC Freiburg","TSG Hoffenheim","SV Werder Bremen","1. FC Heidenheim 1846","FC Augsburg","VfL Wolfsburg","1. FSV Mainz 05","Borussia Mönchengladbach","1. FC Union Berlin","VfL Bochum 1848","FC St. Pauli","Holstein Kiel"] },
    "PD":  { name: "🇪🇸 La Liga", avgC: 9.5, avgG: 1.05, teams: ["Real Madrid CF","FC Barcelona","Atlético de Madrid","Girona FC","Real Sociedad","Athletic Club","Real Betis","Valencia CF","Sevilla FC","Villarreal CF","CA Osasuna","Getafe CF","RC Celta de Vigo","RCD Mallorca","Rayo Vallecano","UD Las Palmas","Deportivo Alavés","CD Leganés","Real Valladolid CF","RCD Espanyol de Barcelona","Levante UD","Real Oviedo"] },
    "SA":  { name: "🇮🇹 Serie A", avgC: 9.0, avgG: 1.0, teams: ["Inter Milano","AC Milan","Juventus FC","Atalanta BC","AS Roma","SS Lazio","SSC Napoli","ACF Fiorentina","Torino FC","Bologna FC 1909","Genoa CFC","AC Monza","Hellas Verona FC","US Lecce","Udinese Calcio","Cagliari Calcio","Empoli FC","Parma Calcio 1913","Como 1907","Venezia FC"] },
    "FL1": { name: "🇫🇷 Ligue 1", avgC: 9.3, avgG: 1.1, teams: ["Paris Saint-Germain","AS Monaco FC","Stade Brestois 29","Lille OSC","OGC Nice","Olympique Lyonnais","RC Lens","Olympique de Marseille","Stade de Reims","Stade Rennais FC","Toulouse FC","Montpellier HSC","RC Strasbourg Alsace","Le Havre AC","FC Nantes","Angers SCO","AJ Auxerre","AS Saint-Étienne"] },
    "DED": { name: "🇳🇱 Eredivisie", avgC: 9.6, avgG: 1.3, teams: ["PSV Eindhoven","Feyenoord","FC Twente","AZ Alkmaar","Ajax","NEC Nijmegen","FC Utrecht","Sparta Rotterdam","Go Ahead Eagles","Fortuna Sittard","sc Heerenveen","PEC Zwolle","Almere City FC","Heracles Almelo","RKC Waalwijk","Willem II","NAC Breda","FC Groningen"] },
    "PPL": { name: "🇵🇹 Primeira Liga", avgC: 9.1, avgG: 1.0, teams: ["Sporting CP","SL Benfica","FC Porto","SC Braga","Vitória SC","Moreirense FC","FC Arouca","FC Famalicão","Casa Pia AC","SC Farense","Rio Ave FC","Gil Vicente FC","GD Estoril Praia","Estrela da Amadora","Boavista FC","CD Santa Clara","CD Nacional","AVS Futebol SAD"] },
    "BSA": { name: "🇧🇷 Brasileirão Serie A", avgC: 9.4, avgG: 0.95, teams: ["Palmeiras","Flamengo","Botafogo","Atlético Mineiro","São Paulo","Internacional","Fluminense","Grêmio","Cruzeiro","Fortaleza","Red Bull Bragantino","Athletico Paranaense","Vasco da Gama","Corinthians","Bahia","Cuiabá","Vitória","Juventude","Criciúma","Atlético Goianiense"] },
    "ELC": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship", avgC: 9.7, avgG: 1.1, teams: ["Leeds United","Burnley FC","Sheffield United","Luton Town","West Bromwich Albion","Norwich City","Hull City","Middlesbrough FC","Coventry City","Preston North End","Sunderland AFC","Swansea City","Watford FC","Bristol City","Queens Park Rangers","Stoke City","Sheffield Wednesday","Blackburn Rovers","Plymouth Argyle","Portsmouth FC","Derby County","Oxford United","Millwall FC","Cardiff City"] },
    "WC":  { name: "🌍 FIFA World Cup", avgC: 9.2, avgG: 1.0, teams: ["Argentina","Francia","Brasil","España","Inglaterra","Alemania","Portugal","Italia","Países Bajos","Croacia","Uruguay","Bélgica","Colombia","Marruecos","Japón","Senegal","Estados Unidos","México","Suiza","Corea del Sur"] },
    "EC":  { name: "🇪🇺 Euro Championship", avgC: 9.0, avgG: 0.95, teams: ["España","Inglaterra","Francia","Alemania","Portugal","Italia","Países Bajos","Suiza","Turquía","Austria","Bélgica","Dinamarca","Rumania","Eslovaquia","Georgia","Eslovenia","Ucrania","Polonia","República Checa","Escocia","Hungría","Croacia","Albania","Serbia"] }
};

const POWER = {
    "Manchester City FC": { c: 7.3, g: 0.8 }, "Arsenal FC": { c: 6.8, g: 0.7 },
    "Real Madrid CF": { c: 6.5, g: 0.75 }, "FC Barcelona": { c: 6.3, g: 0.8 },
    "Levante UD": { c: 5.2, g: 0.4 }, "Real Oviedo": { c: 4.8, g: 0.35 }
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const btn = document.getElementById('calc-btn');

window.onload = () => {
    lSel.innerHTML = '<option value="">— Seleccionar Liga —</option>';
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
};

lSel.onchange = () => {
    const code = lSel.value;
    if (!code) return;
    hSel.innerHTML = aSel.innerHTML = '<option value="">— Seleccionar —</option>';
    LIGAS[code].teams.sort().forEach(t => {
        hSel.add(new Option(t, t));
        aSel.add(new Option(t, t));
    });
    hSel.disabled = aSel.disabled = false;
};

btn.onclick = () => {
    if (!hSel.value || !aSel.value || hSel.value === aSel.value) return;
    const liga = LIGAS[lSel.value];
    
    // Cálculo de Lambdas (Media esperada)
    const getL = (team, type, base) => POWER[team] ? POWER[team][type] : (base / 2);
    const lamC = getL(hSel.value, 'c', liga.avgC) + getL(aSel.value, 'c', liga.avgC);
    const lamG = getL(hSel.value, 'g', liga.avgG) + getL(aSel.value, 'g', liga.avgG);

    document.getElementById('results').classList.remove('hidden');
    document.getElementById('output').classList.add('hidden');
    
    setTimeout(() => {
        document.getElementById('loading-indicator').classList.add('hidden');
        document.getElementById('output').classList.remove('hidden');
        
        // Render Córners
        let cHtml = '';
        [7.5, 8.5, 9.5, 10.5].forEach(line => cHtml += renderCard(line, poisson(lamC, Math.floor(line)), 'CÓRNERS'));
        document.getElementById('markets-container').innerHTML = cHtml;

        // Render Goles HT
        let gHtml = '';
        [0.5, 1.5].forEach(line => gHtml += renderCard(line, poisson(lamG, Math.floor(line)), 'GOLES HT'));
        document.getElementById('goals-ht-container').innerHTML = gHtml;
        
        // Animación de barras
        setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.w + '%'); }, 100);
    }, 800);
};

function renderCard(line, prob, label) {
    const color = prob > 65 ? 'var(--green)' : prob > 40 ? 'var(--yellow)' : 'var(--accent)';
    return `
        <div class="market-card">
            <div class="line-label">+${line}<small>${label}</small></div>
            <div class="bar-wrap">
                <div class="bar-bg"><div class="bar-fill" data-w="${prob}" style="background:${color}"></div></div>
            </div>
            <div class="pct-label" style="color:${color}">${prob.toFixed(0)}%</div>
        </div>`;
}
</script>
</body>
</html>
