<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerIQ Pro - API Verificada</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090d; --card: #10131a; --card2: #161b26; --border: #1e2535;
            --text: #e8eaf0; --muted: #5a6480; --accent: #e63946;
            --green: #3dd68c; --yellow: #f4b942;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .header { text-align: center; padding-bottom: 20px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: white; }
        .logo span { color: var(--accent); }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; color: var(--muted); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        select, button, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: white; font-family: inherit; margin-bottom: 10px; }
        .calc-btn { background: var(--accent); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; cursor: pointer; margin-top: 10px; }
        .market-card { background: var(--card2); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }
        .status-info { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><div class="logo">Corner<span>IQ</span> Pro</div></div>

    <div class="card">
        <label>COMPETICIÓN (ID ACTUALIZADO)</label>
        <select id="league-select"></select>

        <div id="team-selectors">
            <label>LOCAL</label>
            <select id="home-team"></select>
            <label>VISITANTE</label>
            <select id="away-team"></select>
        </div>

        <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>
        <div id="api-log" class="status-info">Estado: Listo</div>
    </div>

    <div id="results" class="hidden">
        <div id="output">
            <h3 style="font-family: 'Bebas Neue'; color: var(--accent); margin-bottom: 10px;">Predicción</h3>
            <div id="markets"></div>
        </div>
    </div>
</div>

<script>
const API_KEY = 'eaaa85924d5646b7afc2aa622e887f5c';
const BASE_URL = 'https://api.football-data.org/v4/';

// LIGAS CON LOS IDs DE TU IMAGEN
const LIGAS = {
    "WC":  { name: "🌍 Copa Mundial", id: "WC", avgC: 9.2, avgG: 1.0 },
    "CL":  { name: "🇪🇺 Champions League", id: "CL", avgC: 9.8, avgG: 1.25 },
    "V1":  { name: "🇩🇪 Bundesliga", id: "V1", avgC: 9.8, avgG: 1.35 },
    "DED": { name: "🇳🇱 Eredivisie", id: "DED", avgC: 9.6, avgG: 1.3 },
    "EEB": { name: "🇧🇷 Brasileirão Serie A", id: "EEB", avgC: 9.4, avgG: 0.95 },
    "PD":  { name: "🇪🇸 Primera División", id: "PD", avgC: 9.5, avgG: 1.05 },
    "FL1": { name: "🇫🇷 Liga 1", id: "FL1", avgC: 9.3, avgG: 1.1 },
    "ELC": { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 Campeonato (Championship)", id: "ELC", avgC: 9.7, avgG: 1.1 },
    "PPL": { name: "🇵🇹 Primera Liga", id: "PPL", avgC: 9.1, avgG: 1.0 },
    "CE":  { name: "🇪🇺 Eurocopa", id: "CE", avgC: 9.0, avgG: 0.95 },
    "SA":  { name: "🇮🇹 Serie A", id: "SA", avgC: 9.0, avgG: 1.0 }
};

const lSel = document.getElementById('league-select');
const hSel = document.getElementById('home-team');
const aSel = document.getElementById('away-team');
const log = document.getElementById('api-log');

window.onload = () => {
    for (let code in LIGAS) lSel.add(new Option(LIGAS[code].name, code));
    loadTeams();
};

async function loadTeams() {
    const code = lSel.value;
    log.innerText = "Estado: Consultando API...";
    hSel.innerHTML = aSel.innerHTML = '<option>Cargando...</option>';
    
    try {
        const response = await fetch(`${BASE_URL}competitions/${LIGAS[code].id}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });

        if (!response.ok) throw new Error("Error en respuesta");

        const data = await response.json();
        hSel.innerHTML = aSel.innerHTML = '';
        data.teams.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
            hSel.add(new Option(t.name, t.id));
            aSel.add(new Option(t.name, t.id));
        });
        log.innerText = "Estado: Datos Live listos";

    } catch (e) {
        log.innerText = "Estado: Error o Límite API. Usando manual.";
        // Si falla la API, permitimos que el usuario escriba o usamos genéricos
        hSel.innerHTML = aSel.innerHTML = '';
        const backups = ["Equipo A", "Equipo B", "Levante UD", "Real Oviedo"];
        backups.forEach(t => {
            hSel.add(new Option(t, t));
            aSel.add(new Option(t, t));
        });
    }
}

lSel.addEventListener('change', loadTeams);

document.getElementById('calc-btn').onclick = () => {
    const liga = LIGAS[lSel.value];
    const p85 = poisson(liga.avgC, 8);
    const pHT = poisson(liga.avgG, 0);

    document.getElementById('results').classList.remove('hidden');
    document.getElementById('markets').innerHTML = `
        <div class="market-card"><span>+8.5 CÓRNERS</span><span class="pct">${p85.toFixed(0)}%</span></div>
        <div class="market-card"><span>+0.5 GOLES HT</span><span class="pct">${pHT.toFixed(0)}%</span></div>
    `;
};

function poisson(l, k) {
    let cdf = 0, term = Math.exp(-l);
    for (let i = 0; i <= k; i++) { cdf += term; term *= l / (i + 1); }
    return Math.min(98, Math.max(2, (1 - cdf) * 100));
}
</script>
</body>
</html>
