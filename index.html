            diagLog.push({ icon, message, time: new Date().toLocaleTimeString() });

                panel.innerHTML = diagLog.map(d => 
                    `<div class="diag-line"><span class="diag-icon">${d.icon}</span><span class="diag-text">[${d.time}] ${d.message}</span></div>`

                    addDiagLog('📦', `Caché: ${key}`);

                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));

                addDiagLog('⚠️', `Error caché: ${e.message}`);
            }
            return null;

            try {
                const response = await new Promise((resolve, reject) => {
                    let timeoutId;
                    timeoutId = setTimeout(() => {
                        reject(new Error('TIMEOUT'));
                    }, API_TIMEOUT);

                    fetch(`${API_BASE}/?league=${leagueId}&home=${homeTeam}&away=${awayTeam}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Token ${API_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    })
                        .then(response => {
                            clearTimeout(timeoutId);
                            resolve(response);
                        })
                        .catch(error => {
                            clearTimeout(timeoutId);
                            reject(error);
                        });
                });

                if (!response.ok) {
                    addDiagLog('⚠️', `API error: HTTP ${response.status}`);
                    return null;
                }

                const data = await response.json();
                setApiCache(leagueId, homeTeam, awayTeam, data);
                addDiagLog('📡', `API: ${homeTeam} vs ${awayTeam}`);
                return data;
            } catch (error) {
                addDiagLog('❌', `Fetch error: ${error.message}`);
                return null;
            }
        }

        // ========== FUNCIONES MATEMÁTICAS ==========
        function plattCalibrate(raw, type) {
            const p = Math.max(0.001, Math.min(0.999, raw / 100));
            const logit = Math.log(p / (1 - p));
            const params = PLATT_PARAMS[type] || { A: 0.93, B: -0.04 };
            const calibrated = 1 / (1 + Math.exp(-(params.A * logit + params.B)));
            return Math.min(98, Math.max(2, calibrated * 100));
        }
        function poissonExact(lambda, k) { let t = Math.exp(-lambda); for (let i = 0; i < k; i++) t *= lambda / (i + 1); return t; }
        function poissonProb(lambda, k) { let p = Math.exp(-lambda), t = p; for (let i = 1; i <= k; i++) { t *= lambda / i; p += t; } return p; }
        function poissonOver(lambda, th) { return Math.min(98, Math.max(2, (1 - poissonProb(lambda, Math.floor(th))) * 100)); }
        function negBinExact(mu, r, k) { const p = r / (r + mu); let logP = 0; for (let i = 0; i < k; i++) logP += Math.log(r + i) - Math.log(i + 1); logP += r * Math.log(p) + k * Math.log(1 - p); return Math.exp(logP); }
        function negBinOver(mu, th, r) { const k = Math.floor(th); let cdf = 0; for (let i = 0; i <= k; i++) cdf += negBinExact(mu, r, i); return Math.min(98, Math.max(2, (1 - cdf) * 100)); }
        function dixonColesTau(x, y, lH, lA, rho) { if (x === 0 && y === 0) return 1 - lH * lA * rho; if (x === 0 && y === 1) return 1 + lH * rho; if (x === 1 && y === 0) return 1 + lA * rho; if (x === 1 && y === 1) return 1 - rho; return 1; }
        function calcBTTS(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; const p00 = poissonExact(lH, 0) * poissonExact(lA, 0) * dixonColesTau(0, 0, lH, lA, rho); return Math.min(98, Math.max(2, (1 - Math.exp(-lH) - Math.exp(-lA) + p00) * 100)); }
        function calcResultProbs(lH, lA, leagueKey) { const rho = DIXON_COLES_RHO[leagueKey] || DIXON_COLES_RHO.default; let pH = 0, pD = 0, pA = 0; for (let h = 0; h <= 10; h++) { for (let a = 0; a <= 10; a++) { let p = poissonExact(lH, h) * poissonExact(lA, a); if (h <= 1 && a <= 1) p *= dixonColesTau(h, a, lH, lA, rho); if (h > a) pH += p; else if (h === a) pD += p; else pA += p; } } const t = pH + pD + pA; return { home: +(pH / t * 100).toFixed(1), draw: +(pD / t * 100).toFixed(1), away: +(pA / t * 100).toFixed(1) }; }

        function colorFor(p) { return p >= 65 ? 'var(--green)' : p >= 42 ? 'var(--yellow)' : 'var(--accent)'; }
        function cardClassFor(p) { return p >= 65 ? 'high' : p >= 42 ? 'mid' : 'low'; }

        // ========== SISTEMA DE APUESTAS ==========
        const STORAGE_KEY = 'dataPredict_bets_v27';
        function getSavedBets() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; } }
        function saveBetsToStorage(bets) { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); }
        function addBet(betData) { const bets = getSavedBets(); betData.id = Date.now(); betData.fecha = new Date().toISOString(); betData.status = 'pending'; bets.unshift(betData); saveBetsToStorage(bets); renderSavedBets(); return betData; }
        function updateBetStatus(betId, newStatus) { const bets = getSavedBets(); const bet = bets.find(b => b.id === betId); if (bet) { bet.status = newStatus; saveBetsToStorage(bets); renderSavedBets(); } }
        function deleteBet(betId) { let bets = getSavedBets(); bets = bets.filter(b => b.id !== betId); saveBetsToStorage(bets); renderSavedBets(); }
        function clearAllBets() { if (confirm('¿Eliminar TODAS las apuestas?')) { saveBetsToStorage([]); renderSavedBets(); } }

        function guardarApuesta(mercado, pick, probabilidad) {
            if (!currentMatchHome || !currentMatchAway || !currentLeagueKey) { alert('Primero calcula un partido.'); return; }
            addBet({ partido: `${currentMatchHome} vs ${currentMatchAway}`, liga: currentLeagueKey, ligaNombre: currentMatchLeagueName, mercado, pick, probabilidad });
            setTimeout(() => document.querySelectorAll('.save-bet-btn, .result-save-btn').forEach(b => { if (b.dataset.mercado === mercado && b.dataset.pick === pick) { b.classList.add('saved'); b.textContent = '✅ Guardado'; setTimeout(() => { b.classList.remove('saved'); b.textContent = '💾 Guardar'; }, 1500); } }), 50);
        }

        function renderSavedBets() {
            const container = document.getElementById('saved-bets-container');
            if (!container) return;
            const bets = getSavedBets();
            const stats = { total: bets.length, won: bets.filter(b => b.status === 'won').length, lost: bets.filter(b => b.status === 'lost').length, pending: bets.filter(b => b.status === 'pending').length };
            const resolved = stats.won + stats.lost;
            const winRate = resolved > 0 ? Math.round((stats.won / resolved) * 100) : 0;
            let html = `<div class="bets-section animate-in"><div class="section-header"><span class="section-title">📋 Mis Apuestas Guardadas</span></div>`;
            if (bets.length) {
                html += `<div class="bets-stats"><span>📊 Total: <strong>${stats.total}</strong></span><span class="stat-win">✅ ${stats.won}</span><span class="stat-lose">❌ ${stats.lost}</span><span class="stat-pending">⏳ ${stats.pending}</span>${resolved ? `<span>🎯 ${winRate}%</span>` : ''}</div>`;
                bets.forEach(b => {
                    const cls = b.status === 'won' ? 'won' : b.status === 'lost' ? 'lost' : 'pending';
                    const emoji = b.status === 'won' ? '✅' : b.status === 'lost' ? '❌' : '⏳';
                    html += `<div class="bet-item ${cls}"><div class="bet-info"><div class="bet-match">${b.partido}</div><div class="bet-detail">${b.ligaNombre} · ${b.mercado} · ${b.pick} ${emoji}</div><div class="bet-prob" style="color:${colorFor(b.probabilidad)}">${b.probabilidad.toFixed(0)}%</div></div><div class="bet-actions">${b.status !== 'won' ? `<button class="btn-won" onclick="updateBetStatus(${b.id},'won')">✅</button>` : ''}${b.status !== 'lost' ? `<button class="btn-lost" onclick="updateBetStatus(${b.id},'lost')">❌</button>` : ''}${b.status !== 'pending' ? `<button class="btn-pending" onclick="updateBetStatus(${b.id},'pending')">⏳</button>` : ''}<button class="btn-delete" onclick="deleteBet(${b.id})">🗑️</button></div></div>`;
                });
                html += `<button class="clear-all-bets" onclick="clearAllBets()">🗑️ Eliminar todas</button>`;
            } else { html += `<div class="no-bets">📭 Sin apuestas. Usa 💾 <strong>Guardar</strong> en cualquier mercado.</div>`; }
            html += `</div>`; container.innerHTML = html;
        }

        // ========== INTERFAZ ==========
        function renderLeaguePills() {
            const c = document.getElementById('league-pills'); c.innerHTML = '';
            for (const [k, v] of Object.entries(LIGAS)) {
                const b = document.createElement('button');
                b.className = 'league-pill';
                b.textContent = v.name;
                b.setAttribute('data-key', k);
                b.onclick = (e) => selectLeague(k, e);
                c.appendChild(b);
            }
        }

        function renderMarketToggles() {
            const c = document.getElementById('market-toggles'); c.innerHTML = '';
            const liga = currentLeagueKey ? LIGAS[currentLeagueKey] : null;
            [{ key: 'goles', label: '⚽ Goles' }, { key: 'ht', label: '⏱ HT' }, { key: 'btts', label: '🤝 BTTS' }, { key: 'corn', label: '⬡ Corn' }].forEach(x => {
                const b = document.createElement('button'); b.className = 'mkt-toggle'; b.textContent = x.label;
                if (!liga || liga.markets[x.key]) {
                    if (activeMarkets[x.key]) b.classList.add('on');
                    b.onclick = () => { activeMarkets[x.key] = !activeMarkets[x.key]; b.classList.toggle('on'); };
                } else {
                    b.classList.add('unavailable');
                    activeMarkets[x.key] = false;
                }
                c.appendChild(b);
            });
        }

        function selectLeague(key, e) {
            if (currentLeagueKey === key) return;
            currentLeagueKey = key;
            document.querySelectorAll('.league-pill').forEach(p => p.classList.remove('active'));
            if (e && e.target) {
                e.target.classList.add('active');
            } else {
                const pill = document.querySelector(`.league-pill[data-key="${key}"]`);
                if (pill) pill.classList.add('active');
            }
            const liga = LIGAS[key];
            activeMarkets = { goles: liga.markets.goles, ht: liga.markets.ht, btts: liga.markets.btts, corn: liga.markets.corn };
            renderMarketToggles();
            loadTeams(key);
        }

        function loadTeams(key) {
            const h = document.getElementById('home-team'), a = document.getElementById('away-team');
            const teams = Object.keys(TEAM_STRENGTH_DB[key] || {}).sort();
            h.innerHTML = a.innerHTML = '<option>— Seleccionar —</option>';
            teams.forEach(n => { h.add(new Option(n, n)); a.add(new Option(n, n)); });
            h.disabled = a.disabled = false;
        }

        // ========== CÁLCULO PRINCIPAL ==========
        document.getElementById('calc-btn').onclick = async () => {
            const home = document.getElementById('home-team').value, away = document.getElementById('away-team').value;
            if (!currentLeagueKey) { alert('Selecciona liga'); return; }
            if (!home || !away) { alert('Selecciona equipos'); return; }
            if (home === away) { alert('Equipos diferentes'); return; }
            currentMatchHome = home; currentMatchAway = away; currentMatchLeagueName = LIGAS[currentLeagueKey].name;

            const btn = document.getElementById('calc-btn');
            btn.disabled = true;
            btn.textContent = '🔄 CALCULANDO...';

            try {
                addDiagLog('📈', `Calculando: ${home} vs ${away}`);
                
                let apiData = null;
                if (apiOnline) {
                    apiData = await fetchMatchDataFromAPI(currentLeagueKey, home, away);
                }

                const liga = LIGAS[currentLeagueKey];
                let hStr, aStr, baseGoals, hAdv;

                if (apiData && apiData.home && apiData.away) {
                    addDiagLog('📡', 'Usando datos API Bzzoiro');
                    hStr = { atk: apiData.home.attack || 1.0, def: apiData.home.defense || 1.0 };
                    aStr = { atk: apiData.away.attack || 1.0, def: apiData.away.defense || 1.0 };
                    baseGoals = apiData.league_goals_avg ? apiData.league_goals_avg / 2 : liga.goalsAvg / 2;
                    hAdv = apiData.home_advantage || HOME_ADVANTAGE[currentLeagueKey] || 1.08;
                } else {
                    addDiagLog('📊', 'Usando datos locales');
                    hStr = TEAM_STRENGTH_DB[currentLeagueKey][home] || { atk: 1, def: 1 };
                    aStr = TEAM_STRENGTH_DB[currentLeagueKey][away] || { atk: 1, def: 1 };
                    baseGoals = liga.goalsAvg / 2;
                    hAdv = HOME_ADVANTAGE[currentLeagueKey] || 1.08;
                }

                const lH = +(baseGoals * hStr.atk * aStr.def * hAdv).toFixed(2);
                const lA = +(baseGoals * aStr.atk * hStr.def).toFixed(2);
                const lHT = +((baseGoals * hStr.atk * aStr.def * hAdv * 0.40) + (baseGoals * aStr.atk * hStr.def * 0.40)).toFixed(2);
                const lCorn = +( (apiData && apiData.league_corners_avg) ? apiData.league_corners_avg / 2 : (liga.cornAvg * (hStr.atk + aStr.atk) / 2) ).toFixed(2);
                const cornR = (apiData && apiData.corners_r) ? apiData.corners_r : (liga.cornR || 18);

                addDiagLog('✅', `Cálculo completado`);

                document.getElementById('results').classList.remove('hidden');
                document.getElementById('loading-indicator').classList.remove('hidden');
                document.getElementById('output').classList.add('hidden');

                setTimeout(() => {
                    document.getElementById('loading-indicator').classList.add('hidden');
                    document.getElementById('output').classList.remove('hidden');

                    document.getElementById('match-header-container').innerHTML = `
                        <div class="match-header animate-in">
                            <div style="text-align:center;font-size:0.7rem;color:var(--muted);">${liga.name} ${apiOnline ? '📡' : '📊'}</div>
                            <div class="teams-row"><div class="team-side"><div class="team-name">${home}</div></div><div class="vs-center">VS</div><div class="team-side"><div class="team-name">${away}</div></div></div>
                        </div>`;
                    const rp = calcResultProbs(lH, lA, currentLeagueKey);
                    const hP = +plattCalibrate(rp.home, 'resultado').toFixed(1), dP = +plattCalibrate(rp.draw, 'resultado').toFixed(1), aP = +plattCalibrate(rp.away, 'resultado').toFixed(1);
                    document.getElementById('match-header-container').innerHTML += `
                        <div class="result-boxes animate-in">
                            <div class="result-box">
                                <div class="rb-label">LOCAL</div>
                                <div class="rb-pct" style="color:${colorFor(hP)}">${hP}%</div>
                                <button class="result-save-btn" data-mercado="Resultado" data-pick="Local" onclick="guardarApuesta('Resultado','Local',${hP.toFixed(0)})">💾 Guardar</button>
                            </div>
                            <div class="result-box">
                                <div class="rb-label">X</div>
                                <div class="rb-pct" style="color:var(--yellow)">${dP}%</div>
                                <button class="result-save-btn" data-mercado="Resultado" data-pick="Empate" onclick="guardarApuesta('Resultado','Empate',${dP.toFixed(0)})">💾 Guardar</button>
                            </div>
                            <div class="result-box">
                                <div class="rb-label">VISIT</div>
                                <div class="rb-pct" style="color:${colorFor(aP)}">${aP}%</div>
                                <button class="result-save-btn" data-mercado="Resultado" data-pick="Visitante" onclick="guardarApuesta('Resultado','Visitante',${aP.toFixed(0)})">💾 Guardar</button>
                            </div>
                        </div>`;

                    let html = '';
                    if (activeMarkets.goles) {
                        const l = lH + lA;
                        const g15 = plattCalibrate(poissonOver(l, 1.5), 'goals15'), g25 = plattCalibrate(poissonOver(l, 2.5), 'goals25');
                        html += `<div class="section-header"><span class="section-title">⚽ GOLES TOTALES</span><span class="section-lambda">λ <span>${l.toFixed(2)}</span></span></div>
                            <div class="market-card ${cardClassFor(g15)}"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15}" style="background:${colorFor(g15)};"></div></div></div><div class="pct-label" style="color:${colorFor(g15)}">${g15.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Goles +1.5" data-pick="Over" onclick="guardarApuesta('Goles +1.5','Over',${g15.toFixed(0)})">💾 Guardar</button></div>
                            <div class="market-card ${cardClassFor(g25)}"><div class="line-label">+2.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g25}" style="background:${colorFor(g25)};"></div></div></div><div class="pct-label" style="color:${colorFor(g25)}">${g25.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Goles +2.5" data-pick="Over" onclick="guardarApuesta('Goles +2.5','Over',${g25.toFixed(0)})">💾 Guardar</button></div>`;
                    }
                    if (activeMarkets.ht) {
                        const g05 = plattCalibrate(poissonOver(lHT, 0.5), 'goals_ht05'), g15 = plattCalibrate(poissonOver(lHT, 1.5), 'goals_ht15');
                        html += `<div class="section-header"><span class="section-title">⏱ 1er TIEMPO</span><span class="section-lambda">λ <span>${lHT}</span></span></div>
                            <div class="market-card ${cardClassFor(g05)}"><div class="line-label">+0.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g05}" style="background:${colorFor(g05)};"></div></div></div><div class="pct-label" style="color:${colorFor(g05)}">${g05.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="HT +0.5" data-pick="Over" onclick="guardarApuesta('HT +0.5','Over',${g05.toFixed(0)})">💾 Guardar</button></div>
                            <div class="market-card ${cardClassFor(g15)}"><div class="line-label">+1.5</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${g15}" style="background:${colorFor(g15)};"></div></div></div><div class="pct-label" style="color:${colorFor(g15)}">${g15.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="HT +1.5" data-pick="Over" onclick="guardarApuesta('HT +1.5','Over',${g15.toFixed(0)})">💾 Guardar</button></div>`;
                    }
                    if (activeMarkets.btts) {
                        const btts = plattCalibrate(calcBTTS(lH, lA, currentLeagueKey), 'btts');
                        html += `<div class="section-header"><span class="section-title">🤝 AMBOS MARCAN</span></div>
                            <div class="market-card ${cardClassFor(btts)}"><div class="line-label">BTTS</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${btts}" style="background:${colorFor(btts)};"></div></div></div><div class="pct-label" style="color:${colorFor(btts)}">${btts.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="BTTS" data-pick="Sí" onclick="guardarApuesta('BTTS','Sí',${btts.toFixed(0)})">💾 Guardar</button></div>`;
                    }
                    if (activeMarkets.corn) {
                        html += `<div class="section-header"><span class="section-title">⬡ CÓRNERES TOTALES</span><span class="section-lambda">μ <span>${lCorn.toFixed(1)}</span> (r=${cornR})</span></div>`;
                        [7.5, 8.5, 9.5, 10.5].forEach(line => {
                            const corn = plattCalibrate(negBinOver(lCorn, line, cornR), 'corners');
                            html += `<div class="market-card ${cardClassFor(corn)}"><div class="line-label">+${line}</div><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" data-target="${corn}" style="background:${colorFor(corn)};"></div></div></div><div class="pct-label" style="color:${colorFor(corn)}">${corn.toFixed(0)}%</div><button class="save-bet-btn" data-mercado="Corners +${line}" data-pick="Over" onclick="guardarApuesta('Corners +${line}','Over',${corn.toFixed(0)})">💾 Guardar</button></div>`;
                        });
                    }

                    document.getElementById('all-markets-container').innerHTML = html;
                    document.getElementById('recomendacion-container').innerHTML = `<div class="recomendacion animate-in"><div class="rec-main" style="color:${colorFor(plattCalibrate(poissonOver(lH+lA, 1.5), 'goals15'))}">OVER 1.5</div></div>`;
                    renderSavedBets();
                    setTimeout(() => document.querySelectorAll('.bar-fill').forEach(b => { if (b.dataset.target) b.style.width = b.dataset.target + '%'; }), 50);
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    btn.disabled = false;
                    btn.textContent = 'CALCULAR PROBABILIDADES';
                }, 800);
            } catch (error) {
                console.error('Error en cálculo:', error);
                addDiagLog('❌', `Error: ${error.message}`);
                btn.disabled = false;
                btn.textContent = 'CALCULAR PROBABILIDADES';
                alert('Error al calcular.');
            }
        };

        // ========== INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', async () => {
            addDiagLog('🚀', 'Data.Predict PRO v2.7 FINAL');
            addDiagLog('🔍', 'Bzzoiro Sports Data API');
            renderLeaguePills();
            renderMarketToggles();
            const firstPill = document.querySelector('.league-pill');
            if (firstPill) {
                const key = firstPill.getAttribute('data-key');
                selectLeague(key, null);
            }
            renderSavedBets();
            
            addDiagLog('🔌', 'Conectando a Bzzoiro...');
            await testApiConnection();
        });
    </script>
</body>
</html>
