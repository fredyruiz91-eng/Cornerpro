<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data.Predict · PRO v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <div class="header">
            <div class="logo">Data<span>Predict</span></div>
            <div class="badge">⚡ v3.0</div>
            <div class="badge-api offline" id="api-badge">🔗 API (---)</div>
        </div>

        <div class="card">
            <label>Liga / Competencia</label>
            <div class="league-pills" id="league-pills"></div>

            <div class="team-grid">
                <div>
                    <label>🏠 Local</label>
                    <input id="home-team-input" class="team-search" list="home-teams" placeholder="Escribe para buscar..." disabled />
                    <datalist id="home-teams"></datalist>
                </div>
                <div>
                    <label>✈️ Visitante</label>
                    <input id="away-team-input" class="team-search" list="away-teams" placeholder="Escribe para buscar..." disabled />
                    <datalist id="away-teams"></datalist>
                </div>
            </div>

            <span class="markets-label">Mercados a calcular</span>
            <div class="market-toggles" id="market-toggles"></div>

            <button class="calc-btn" id="calc-btn">CALCULAR PROBABILIDADES</button>

            <div class="api-status" id="api-status">
                <span class="api-status-icon">🔄</span>
                <span class="api-status-text">Inicializando...</span>
            </div>
            <div class="diag-panel" id="diag-panel">
                <div class="diag-line"><span class="diag-icon">ℹ️</span><span class="diag-text">Iniciando diagnóstico...</span></div>
            </div>
        </div>

        <button class="bets-fab" id="bets-shortcut-btn" title="Ver mis apuestas guardadas">
            📓
            <span class="fab-badge" id="bets-count-badge">0</span>
        </button>

        <div class="bets-modal-backdrop" id="bets-modal-backdrop"></div>
        <div class="bets-modal-sheet" id="bets-modal-sheet">
            <div class="bets-modal-handle"></div>
            <div class="bets-modal-header">
                <span class="bets-modal-title">📓 Mis Apuestas Guardadas</span>
                <button class="bets-modal-close" id="bets-modal-close">✕</button>
            </div>
            <div class="bets-modal-body" id="saved-bets-container"></div>
        </div>

        <div id="results" class="hidden">
            <div id="loading-indicator" class="card loading-state">
                <div class="spinner"></div>
                <div>Calculando modelo con datos...</div>
            </div>

            <div id="output" class="hidden">
                <div id="match-header-container"></div>
                <div id="all-markets-container"></div>
                <div id="recomendacion-container"></div>
                <p class="disclaimer" style="text-align:center;color:var(--muted);font-size:0.6rem;margin-top:20px;">
                    Data.Predict v3.0 · Dixon‑Coles · Córneres realistas · Datos vía API Bzzoiro + Local · Estimaciones estadísticas, no garantías
                </p>
            </div>
        </div>
    </div>

    <!--
        type="module" es lo que permite usar import/export entre archivos .js.
        REQUISITO: esto SOLO funciona si el archivo se sirve por http(s) — GitHub Pages
        funciona perfecto. Si lo abres haciendo doble clic (file://) el navegador bloquea
        los módulos por seguridad y la app se verá "rota". Para probarlo en tu compu usa
        un servidor local, por ejemplo: `npx serve .` o la extensión "Live Server" de VSCode.
    -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
